, nothing strong enough to give it any quality or long-term value. 7-8 are perversions, wild behavior, forbidden fruit. After all, this also holds true through the opposition, 7-6 is – let me try and experience something different, forbidden, deviant, something I haven't experienced with anyone before. That's why this relationship could be called more of a fling, an adventure, and not a marriage. And that's what it is. If you enter into a relationship like this with the intention, desire, and need to make something serious and lasting, you won't find that here. However, if we're talking about a fling, a combination that does have such aspects, 8-6 – a one-night stand, 7-6 – a short-term relationship, 7-8 – a sexual adventure, what kind of quality are we talking about? We can't. This is a secondary quality. It starts with a bang, and it ends with a bang. Here, we can't claim, like with 775, that there's absolutely nothing. There is definitely chemistry and attraction here. That's there, and no one can deny it. However, that chemistry will fade over time and won't allow us to move forward, especially since it's so turbulent and filled with not-insignificant arguments. There's no aggression here for anyone to get hurt. Here, the 7-8 are in conjunction, and it won't come to someone getting seriously hurt (there is still a 7-6 opposition here), but there will certainly be heated discussions through verbal communication due to lust, passion, and jealousy. 07/01/1986 – he exchanged wives and wives. Pythagoras 865, degrees 8-6 / 6-7 / 8-7. That 8-6 is in a square and 1k6, and in opposition 8-86.", "797": "The goal is the repayment of karma. Whenever we see karma being repaid, we should ask ourselves the question: in what way is that karma being repaid? Is it being repaid through the trials of the 4, through children, through schizophrenic schisms,...? It is good to also look at and analyze synastry through karmic numerology. No one pays off karma with a smile, because every karma carries some weight with it. The 7-7 opposition says that here, with a partner, one goes through nervous breakdowns and interference from the side. (A third party doesn't just interfere in this relationship; the person who feels sorry for the relationship does as well). Everyone is bothered by it; everyone wants to stick their nose into someone else's business, and anyone will be intrigued by such a relationship. However, they don't need someone from the outside to disrupt them, because they do it to themselves. Here, karma is being paid back in the worst possible way, and it's mental, and many people from this synastry come out psychologically disturbed. After all, through the conjunctions, we have a 7-9 in 9-7, which are aspects of betrayal, and it's betrayal at the worst possible level, causing a very bad psychological state for these people. But they also enter this relationship for the purpose of paying off karma. Once that karma is paid off, these relationships fall apart, with no prospect of the partners getting back together.", "819": "Here we have a healthy goal, a healthy foundation. At the end of the story is karma, or the repayment of karma. The fact that it's at the very end indicates that this relationship, at least at first, will last a bit longer. With this synastry, we can actually have beautiful, lasting, enduring, and very stable relationships and marriages. This is because an 8-1 is merging here, as a form of support and protection for the 8, which here only further strengthens this healthy foundation in the goal. This is followed by a 1-9, which is not like a 9-1 (it cannot establish a stable relationship). 1-9 says it's looking for an ideal, looking for its own fairytale, looking for someone to love on that most exalted level of a 9. If we look at these conjunctions, 8-1 and 1-9, they are good at first glance. Here we cannot interpret that someone will stab someone else in the back, because the 8ce is in the first house of the synastry, which means it is biorhythmic, and it acts protectively. It is, in fact, watching its back (9). Here we can say that the higher power of the 9 protects the back of this relationship, or that the dominance of the masculine principle, the 8 and the 1 (which is probably a man, although it could be a woman with a 1 and an 8), protects the back of that feminine principle, the number 9. This synastry will have trials throughout life. Of course, it must, because it is karmic, but it will successfully withstand all those karmic trials. This synastry is very high-quality and strong. It provides both emotion (the 9s) and the stability of a goal, passion, and protection from the 8ces. In fact, it doesn't present any major turbulence that couldn't be bridged and resolved. This synastry produces not only the most long-lasting, but also the highest-quality marriages. However, as always, you need to look at the verticals, because not everything will align. For example, 4+5 are two different worlds, and that vertical is not good.", "821": "The goal is strong – destiny. There are some friction points here (8-2), which the second conjunction, 2-1, also points to: a conflict between the masculine and feminine principles. However, the key thing about this 8-2 is that it isn't in opposition, because that would mean their relationship is constantly in conflict. We can say that 821 is a shade stronger than 819, because the goal is infused not only with a stable foundation but also with the destiny of the number 2, which is also an emotion—that certain fated, strong bond in the sense of a powerful emotion that happened and drew these two people together. In fact, that emotion is what carries this relationship. Because of that emotion, through the conjunction we see some friction, small arguments, which here are not in opposition and are not constant, not eternal. In opposition, there is a dominance of the masculine principle, which here is protective and doesn't allow things to get out of hand because of those petty squabbles and the occasional jealous scene, which all stem from emotion here, but it's not constant, not frequent, just there to remind us that we love each other. Here, it's usually the case that the masculine principle is dominant as the pillar of the home, and not just in terms of the material/financial aspect. That masculine principle is, in fact, the true head of the household. In most cases, it's a man, but there are exceptions when we're talking about a woman who is full of masculine principles. This synastry is very high-quality, leads to marriage, and if the vertical axis is strong, there is no divorce here.", "832": "The goal is the 3. There's chemistry, passion, madness, provocation, jealousy, possessiveness... It has to have all of that, and that passion is what drives this relationship. I can see it as the 8 protecting the 2, but how can she protect her when the 3 is going to fuel that storm. She might try, because she loves someone and that's just how it is, but this 3 will make sure that explosion is always strong in this relationship. The other side here is a hedonistic 8 towards the 3 and the 2 – money, finances, being well-off. Here, you can't say that someone is exploiting someone else, because that isn't seen through the opposition, but you can say that these people entered the relationship by doing something with money together, investing something together beforehand, doing business together,... They were brought together by some kind of business or financial foundation, and from that, passion and turmoil were born. Whether this synastry will last will be told by the vertical of the personal numbers. If the vertical is calmer, they will stay together regardless of that 3rd house turbulence, the 8th-2nd opposition, but also the conjunctions, where the 3rd house is connected with both the 8th and the 2nd houses. Both partners will try to be constantly passionate, bold, and impulsive. For a relationship like this to last, the vertical line must be calm. A 7+4 won't work, because they'll only stay together for three days; passion, emotions, and lust will tear them apart. The vertical axis must be not just good, but a calmer variant as well, for the partners to get something of better quality from this relationship. Here, we can't say that they will 100% break up, nor that they will 100% stay together for life. This is one of two or three synastry charts that require a compromise for a good vertical axis, where two calmer variants must come together so that the excessive passion of the 3 won't lead to the abnormal, or rather, to bitter arguments, which here can become a daily occurrence. An 8c in the biorhythm loves money, loves to indulge, and the 2 is materialistic by nature.", "843": "In any 8-4 synastry, all those karmic burdens that are present very often aren't because of the spouse, but rather due to life circumstances—whether financial, children, family, etc.—that prevent them from living in peace, as well as illnesses that can arise through karmic cleansings. What we can say for sure, drawing a parallel with 483, is that both speak of very harmonious marriages, strong as a rock, but that 843, because of the 4's purpose, has somewhat heavier karmic burdens. With 483, the karmic burdens are present at the beginning and, for the most part, manifest during the first few relationships. After that, they weaken, and only the 8 and the 3 remain. With 843, the 4 is in the goal, which means that throughout the entire relationship, much heavier karmic burdens accompany this partnership. This inevitably gives the relationship greater stability as the years go by, and the partners, through these trials, grow stronger and stronger, to the point where no one can shake them. They last longer and, generally, the masculine principle, most often the man, is the one who departs this world first. There are examples where women, after the man's passing, don't find another partner with whom they would feel such support, or they remain alone for years, and then after 10 or 15 years, they find a suitable partner. (Because there are examples of them becoming widows at a younger age as well).", "854": "Since 8-4 is in opposition, that's good (just as 584 is also good). However, with 854, it's in opposition, which means that throughout their entire life/relationship, there is that constant, protective bond between them. This is, in fact, the reason for the quality of this relationship and a stable marriage. Children are the focus. There isn't any excessive unconventionality here for the partners to be looking for God knows what (like they do in 753). Here, there's a lack of suffocation and freedom with the free time I get. Since children are the goal, this is a synastry with the greatest karmic burdens when it comes to children, especially sons. This is because children are the priority here, and through the conjunctions, there is not only a karmic burden (4) for the children (5), but also a karmic knot for the children (8-5). And that is the only way this karma is ultimately repaid here, through or in relation to children. This doesn't necessarily mean the partners won't have children. That depends on their core numbers. However, the synastry indicates they may have some problems with children, and the partners, as parents, are a part of that. 854 can also mean that the partners don't want children. So, the synastry itself is a sign to investigate further—squares, birth dates, partnership aspects, verticals, etc. That way, it will be determined what it is and to what extent.", "865": "This is a connection entered into by falling in love at first sight (8-6). The goal is marriage, a family, and the need to establish a shared family home, from which children will be born. Here we are talking about a number scope that had the need to get married without any calculations or calculations, but rather that true bond w hen they met awakened something in them that drew them together. The next conjunction, 6-5, gives this relationship that freedom, but also some flirting on the side. However, that flirtation isn't in opposition, so it can't threaten this relationship. If the vertical axis is good, these relationships can't be broken even in a hundred lifetimes. The 8-5 opposition indicates verbal sparring and some minor squabbles that occur in this relationship, which the 5th house itself ultimately makes the relationship dynamic. If we see the 5+9=5 vertical line, it's clear that this will last a lifetime and that the 5th house will be responsible for that sparring. The 9th house certainly won't be. In 90% of cases, a 865 synastry produces a son and a daughter. We will see in the partners' main numbers that the woman has a predisposition for a female child, and the man for a male child, so when they come together, they have both a son and a daughter. This synastry is excellent for a business relationship in general, as well as for the partners themselves.", "876": "876, 887, and 898 are three 8-com sinastry combinations that, unfortunately, have no perspective (along with 832). With 876, the goal is spirituality, and if we draw a parallel with 786, we can say that with 876 the turbulence is even slightly greater. This is because here there is an 8-7 aspect, which is an aspect of sexuality, lust, and passion, that continues the 7-6, which is an aspect of perversion. When these two aspects come together, it's clear that the relationship is only about one thing: sex, passion, and adventure, and that is what this relationship delivers. The 8-6 opposition shows the same thing. There is no conflict or aggression here, because 8-6 is not about that, especially since the biorhythmic 8ca is much, much calmer than the personal one. Here, we are actually talking about verbal conflicts, perhaps some arguments and harsh words that can be exchanged due to jealousy, passion, and excessive lust. This, in turn, leads to the partners becoming exhausted and unable to endure the relationship any longer after a certain period of time. This is an example of synastry where, let's say, you'll hear that one partner has gotten a restraining order... because they have so suffocated and burdened the other that they can no longer live together. It's a shame that excessive passion, and not true love, drives this relationship, and that cannot be a guarantee for the survival of this marriage, which is why they fall apart. The goal of 7ce drew them into marriage, but because of the influence of the other numbers, they still end up separating.", "887": "This is a volcano that is just waiting to erupt. People with 887 codes are like this. Many of them, because of the biorhythmic 8, will appear calm and composed. However, there isn't just one 8 at play here, and a person whose personal number is a 7 cannot be calm. It's only a matter of time before it escalates and shatters. It's like a mix of a bomb (8) and an explosion (7), like a mix of a volcano (8) and an explosion (7). That's how it is in this relationship, too. Passion is what drives this relationship, passion is what is in opposition. But, this passion when it erupts, and it doesn't erupt like an 86, but through ugly words, curses,... In this case, the best possible outcome is for the partners to separate and go their separate ways, before someone breaks the other's head or a fight breaks out. Here we have aggression, where there will be many examples not only of arguments, but also of physical assault. Such a synastry is not recommended for people with pathological numbers (0, 6-0, 2-0, 6-8). Run from this relationship, because someone could get hurt. Everything here is insane. First, there's wild sex, and then I'll curse you out for everything. All of this stems from the 8's excessive rebellion, her boldness, her abnormality, and her passion, and this relationship has no future.", "898": "Here the goal is to pay off karma, which is repaid through money. The hedonistic 8ca loves money. An 8 is attracted to an 8, so here someone is with someone else for money, and one person is severely exploiting the other. In the beginning, there is an 8-9 conjunction, and here we can say that someone was swayed by passion because they were protective. But in what way protective? We look at the 8-8 opposition, which says: They gave me an incredible amount, not just passion, but also financial security. However, in the continuation of the relationship, it's 9-8. This means the 9 is looking at the personal 8, and it says: Someone gave me a finger, but I want the whole hand, and I'll stab them in the back. To see who the culprit is here, you have to look at the vertical line. The horizontal line alone cannot show it. We'll have a handful of connections here where someone seriously took advantage of someone else; that is more than certain here. Since this is a repayment of karma, these connections can last 9, 10 years, and some even longer. Here, it's mostly the feminine principle that takes advantage of the masculine principle, because the feminine principle (9) is the one pursuing the goal. The masculine principle is in opposition and states that the masculine principle is the more financially dominant one here. This stab in the back doesn't just involve material exploitation; it also comes in the form of deception regarding the sexual/emotional relationship or other connection. To the list of secret relationships and dishonesty, in addition to 639, 898 should also be added.", "911": "A relationship that begins with paying off karma which, on the surface, provides a noble goal. Almost, because here we have the 9-1 aspect in conjunction, and we also have it in opposition. 9-1 is not the same as 1-9. 9-1 indicates that a stable relationship cannot be had. In terms of synastry, this relationship cannot be stable, which the two dominant 9-1 aspects also confirm. The 9-1 opposition indicates that the partners are dishonest with each other. There is no sincere emotion between them, and they, by their very natures, further complicate this relationship where, through the two 1s, we have ego and domination; there is no love, no emotion, but rather the people in this relationship are literally competing. The 9-1-1 is a karmic connection that is probably the shortest-lasting. A rough forecast says: 9 attaches to 3, 1 to 1, 1 to 1 = 5. This means that after five years, an awakening occurs, the people come to their senses, because by then the karma is already on its last breath (the 9 is the fog, the 1s are the eyes). People enter into such a relationship, which is obviously unstable, because it's a karmic one, but that 9, which is at the very beginning, doesn't allow the individuals to realistically see the relationship; instead, they lie to themselves. As if lying to themselves weren't enough, through opposition, they also deceive each other into thinking things will get better someday, when they never will. This relationship has absolutely no future.", "922": "It becomes clear after 6 years or when the 6th year begins (a 9 for a 3 + a 2 for a 3 or more). 922 code – someone who is a victim of intrigue their whole life (because of 92)", "933": "Here we have two great friends through opposition and two very, very great friends through conjunction. What we have in mind is not a storm, but a volcano of passion. Here, through opposition, stands friendship, support; there is no calculation, it is sincere. Through the 3-3 conjunction as well. However, as time goes on, that 3-3 just stays and stays and stays. That personal 3 is created by such characters, so we see that it's overemphasized. The 3 magnifies everything. Here, the emotions, passions, jealousy are exaggerated; possessiveness is exaggerated, a kind of madness on the horizon that leads to the breaking point in such relationships, and, in the end, one party says, 'I can't do this anymore.' And that's sad and tragic, because a genuine emotion drives this relationship, but it's far too turbulent; it's never calm. Here, there are no lies like with 922, no dishonesty like with 911, but there is this abnormal chemistry that prevents the partner from spending, at least, one normal day in their life, without friction and impulsive reactions. For that reason, unfortunately, these kinds of relationships and marriages break up in just as turbulent a way as they were, and this happens even after the karma has been paid off, which here can be after 13 or 23 years. The 9 attaches to the 3, and the 3 to the 10, which means that for the first time I see , but due to the influence of personal numbers, for some people it lasts a little longer (because of our other numbers), and so the turbulence can last for 23 years. However, when the 13th year hits, it means the karma has paid off a good part of the relationship, but that's when the turbulence really begins—jealous, possessive reactions where one side simply can't handle it. This could be the case where the partners are of different faiths or nationalities, or they live abroad.", "944": "It begins with the repayment of karma; the most powerful karma is the goal. The entire course of the relationship is karmic; the opposition is the repayment of karma, focused on karma. This cannot be avoided. Therefore, it's no surprise to see that with this synastry, marriages last 30, 40, 50 years. Such marriages can, and indeed do, become harmonious if the verticals are strong. If the verticals are weak, then we are talking about karma repayment in later years, and these are examples of people who separated in their 50s (55-56). In this synastry, we have the 9-4 aspect through both conjunction and opposition, and this aspect is called 'the shattering of dreams.' After xxx years, there are serious disappointments and things come to light. The 9th house is linked to the 3rd, and the 4th represents decades—overnight, the image we've had of someone for so many years changes.", "955": "This relationship, be it business, friendship, or emotional—it can't work! OK, maybe that karmic repayment will draw them into a relationship, and even a marriage where they'll have children, but the dishonesty, lies, deceptions, and manipulation involved are significant. And so is the ability to get out of such situations with perfect acting, using lies and colorful phrases. What happens when the karma starts to be repaid and it comes to a head? Two 5s are left, and the very purpose of a 5 is to live with someone as a partner. Karma is pulling me to stay with that person for a while longer, for the sake of the children, especially if they are still young. However, that married life is nothing like what it's supposed to be. They start living like roommates, like friends. It often even happens that they sleep in different rooms. Over time, the gap grows wider and wider, and these two people realize they aren't right for each other, so this relationship, like a 595, ends in a breakup. It's an example of synastry where we can't pull anything good for longevity, not even if the vertical is good. It has an expiration date; it has its reason for being, and that's just the way it is.", "966": "The goal is family karma, love, marriage, and family. In addition, all three numbers here are karmic, just a little different from one another. Here, that family karma indicates that we were once connected on that family level. With 966, intrigues can arise from the family, and there is an idealization of the partner. Here, we are talking about the search for a strong, sublime love. This is because, when the karma runs its course, the partners live out the 6-6 aspect, which, as a dominant 6c, says that someone truly loves another, that what is mine is mine alone and I won't give it to anyone—try to touch it and you'll be in for a fight. This is why 966 produces very harmonious marriages, which have their trials at the beginning of the relationship. These trials can last 3 to 5 years and are often marked by some interference from the outside, because someone is unhappy with our relationship. Usually, it's someone from the family, a mother or father. On the other hand, this beginning can also indicate that the partners were seeing each other in secret because one of them was already in a relationship at the time. When these karmic obstacles pass within that specific time frame, they are left at a 6-6 and continue to live this type of relationship. So, here we are talking about a karmic connection, which can very well lead to a sweet and long-lasting marriage.", "977": "This leads to marriage because of goal 7ce, which is very strong. But, here the partners are shown as very tense and barely get by. There will be some variations of good verticals that will sustain this relationship, but those are rare cases. Some strong spiritual bonds wanted these two to be together, but here there are oppositions that can lead to interference from the side, intrigue from the side and for someone to feel betrayed in this relationship, even if it's just in their head, and it is so, and any relationship that has a 9 or a 4, with a 7 or a 5, which are the numbers of children, gives certain karmic difficulties. These difficulties can manifest as the child having certain problems in life, or, if the partners' numbers indicate they cannot have children, then it means they will not have any children.", "988": "This synastry is similar to the 898 one. It's about passion and money, but here in the opposition, there is a 9-8 aspect, a backstabbing, because the 8 is at the end. There is an aspect of betrayal, which points to the 8ca, so inevitably, someone from this relationship will come out seriously disappointed, seriously betrayed. This simply has no future, but it will last a few years longer than the 898 because the 9ka is at the beginning and is very strong. However, this is a relationship that is accompanied by a financial/material note, which is presented here in a similar way as in 898, and that is with passion, not with love. Because of this, the moment the karma is paid off, such relationships end with aggression, arguments, and disappointment. Definitely not peacefully!", "999": "999 cannot be explained horizontally in terms of duration, as it can last a lifetime. It begins with the repayment of karma, and this same thing is present in both the target and the final number. Through opposition, it's pure karma. We're talking about relationships that are meant to happen. These are connections and relationships that one might say are undefined, steeped in secret affairs, ideals,... And all of that is true, but as soon as karma this strong is pulling, these two will definitely be together. With a vertical 3+6=9, they will very likely stay together, but there are very few verticals that create a 9 that are good, so most of them end in a breakup. A 1+8 won't last, a 2+7 won't last, a 4+5 won't last. If it's a 3+6, that means that person is my ideal, someone I love, respect, and will stay with for the rest of my life, and for whom I might turn a blind eye to certain things that will happen. However, when the verticals are bad, a relationship like this can also lead to completely undefined and secret relationships, which can lead to possibly the greatest disappointment we experience in life. Then, this is impossible to sustain. ADDED: Even after a breakup, they can, if they want to, remain supportive of each other, but because of the intensity of the passion/emotions and their passionate nature, they cannot renew their relationship. They also know that after a certain time (5 years), they will pine for that partner. The excessive and impulsive nature of two 3s ruins this relationship. Even when they're silent, there's a strange tension in the air with them – it's like a pull and push, a 'can we, or can't we.'"}, "ASPECTS": {"1-0": "0-1 Dramatic twists and turns in the marriage Severe crises, control, possessiveness, jealousy A turnaround as a result of that jealousy and control", "1-2": "2-1 Conflict between the masculine and feminine principles It is located in the square as a conflict between the father and mother Leaves a mark on the person's emotional life", "1-3": "3-1 For women, it shows the physical description of the man they will marry This is a good aspect and indicates an educated, eloquent, larger-built, well-situated, impulsive man, possibly of a different faith or nationality, with contacts abroad.", "1-6": "6-1 They see things through rose-colored glasses (1-eyes, 6-love, partner, all that is beautiful) They do not view their partner and the world realistically They have a hard time accepting criticism when they are wrong They know a lot about love and have a lot of love to give They unconsciously idealize everyone they love (family, partner, etc.). This leads to disappointment", "1-7": "7-1 Always looks for surprises from their partner, fun, freedom, and adrenaline They seek time for themselves and don't like to be smothered by their partner", "1-8": "8-1 Serious problems in emotional relationships for both men and women Women with 1-8 very consciously (1ca and 8ca are conscious and very purposeful numbers) like to nag, poke, and provoke They complain afterward that they are unhappy, but they are the ones to blame", "1-9": "are more emotionally fulfilled than 9-1 8 trine 9 – a taken man (01. 09 Pythagoras 189 – degree 8 trine 9)", "2-0": "0-2 Pathology in an emotional relationship Possessiveness, jealousy Jealous scenes Need for control", "2-4": "4-2 They only show emotion and tears when the situation is truly difficult. They are suspicious at the beginning of a relationship and need time to open up. They have a fear of rejection, so they wait and play it safe because they are insecure and don't believe in themselves. Often, by the time they let their guard down, the train has already passed They need to learn to react faster and to relax more easily in life, because they can miss out on a lot due to this tension and inner distrust.", "2-6": "It has its good and bad sides Indicates a good, careful, gentle, and sensitive person If it forms a combination with a 3, it indicates a fated partner (well-situated) It also indicates money and prosperity through a spouse, as well as well-being in terms of the support received from a spouse and family. If it is with malefics, it indicates losses experienced through love and marriage, meaning not only divorce, but also losses of property, lawsuits, and loss of a partner. With a 4, it can bring a solitary life, a weak bond for a quality marriage; these people find true love in older years; throughout life, they know they make mistakes and have failures The problem with 2-6 is that over time, they start to see their partner as a friend or companion. They know they don't have an excessive need for sex; sometimes they view sex as a matter of habit or routine.", "2-7": "produces very unpredictable people, especially if 2-7 aspects an 8 or 2-8 aspects a 7 Inconsistency in behavior – increased hysteria, fickle reactions, duplicity Often, with their rashness, they themselves tear down what could have been a quality relationship. They complain about their emotional lives, how they can't fulfill themselves, but the problem is within them Big gossipers Getting into an emotional relationship with them is a guaranteed disaster They can make life a living hell for others (partner/friends) Unpredictable man 4/27 – the aspect of impulsiveness (27), which the 4 can prolong and endure for a while, but it's only a matter of time before the 27 snaps; they can rein themselves in and delay something for their own good because they are intuitively aware", "2-8": "8-2 He is very direct and honest at first, if he is in love He's on an adrenaline rush at the beginning, eager to win her over If you don't reciprocate, they can be aggressive and very rough They are generally self-centered and can be selfish. They are in a perpetual struggle with a woman; constant arguments at home, constant fights He is always the top priority. A woman with 2-8, if she gets stubborn, can cause big problems for the opposite sex out of jealousy", "2-9": "9-2 Believes in romance, in a fairy tale (something like a 1-9, who seeks the ideal), but a 2-9 pathologically bonds to a partner if they love them You can't shake him off, he's like a burr", "6-0": "0-6) (6ca are born – 2, 7, 14, 19, 26 Men who love women who have something promiscuous about them They look for a mistress (a whore in bed), they look for a femme fatale They love passion, conflicts They like to stalk, they like confinement, pursuit They want the woman to get pregnant at all costs to keep her Pathology (0) in love (6) These cruel traits in a 6-0 only activate when he feels he's losing the woman, i.e., when he feels she's leaving him, and until then, everything is OK His specific trait is that he bonds very deeply and is possessive. A combination of love (6) and magnetism (0), so love for the given person becomes magic and they see nothing beyond it These are people who are bound to their partner by both hatred and passion; they see life in black and white. If he feels you're leaving him, he will fight until he buries you.. 0 where he lays his paw, the grass doesn't grow again Loves dangerously, loves jealous partners, and although they complain about it, they enjoy it because they believe jealousy is a sign of love They are interested in problematic and dangerous types", "6-1": "1-6 He/She looks for established and well-positioned partners First, they are drawn to attractiveness, looks, sophistication, being scented with perfume, tidiness, and style Second is status. When they love, they love with all their heart and soul They lavish praise on those they love This gives them a superficial impression. They present themselves as much stronger people than they are, and then people hurt them", "6-2": "2-6 A dreamer who is looking for romance and a partner who is family-oriented She looks for a person who is warm and shows that they care about their family members A woman with the 6-2 aspect likes bigger, muscular, strong men The first thing she notices is the chest and arms/hands She likes neat people They are sensitive people and you can easily hurt their feelings, but they are good at hiding those hurt feelings They know how to prolong their pleasure and enjoyment Sex isn't their top priority; family, warmth, and home are more important to them, as is starting a family. This postponement of pleasure manifests itself in that when they want something, they know how to act, how to get under your skin They know how to get what they want, but in a very polite, cultured, and calm way They know how to play the game of love They form close bonds with loved ones If they take a liking to you as a friend, they treat you as if you were a member of their family", "6-3": "if combined with a 9, gives the man a smaller financial gain through a woman", "6-4": "says that... love doesn't stand the test of time, meaning that over time love cools down, so they stay in the marriage out of habit or because of the children They always have this fear and tension present. They often find true love later in life This aspect is linked to an age difference, and they look for an older partner (but not when we also have a 7th – then they are attracted to both younger and older partners) Men with the 246/426 code have an older partner in their youth They don't admit it right away, but later (unless they have a 9 – with a 9, they never admit it)", "6-5": "is one of the strongest aspects of infidelity, i.e., playing on two fronts (double relationships), and they play it safe, so this ruins both for them because they like to weigh their options and calculate. They criticize the ones they love When they stop criticizing and telling you what's good for you, it's a sign that they've stopped loving you, that they've grown cold They aren't necessarily womanizers, but t stands. The woman they fall in love with is only an Amazon woman, and they can go completely crazy and lose their heads over her (if it's a trine, it's truly a fatal love).", "6-9": "9-6 Relationships with attached people and secret affairs we hide in People with this aspect are also characterized by platonic relationships and long-distance relationships They can fall in love without ever having seen their partner, just by corresponding and talking on the phone. It is important to know here that they choose for themselves unattainable loves, secret stories, secret affairs In the vast majority of cases, they meet their partner when the partner is already taken (married, engaged, or in a failing relationship) They react with a lot of emotion, but without thinking (they go with their heart and turn their brain off) The problem is that they don't see the other person's flaws, and you can't explain it to them. They get some kind of intoxication (9), some kind of blindness in love (6) This often leads to disappointment, as well as their partner disappearing without a trace These relationships last about 3 years In marriage, with this aspect, there is dishonesty between partners and secrets in their emotional lives. There are also concealments, which are not only related to the emotional life but also to other spheres (money, investments, etc.), which means that honesty is not at a very high level."}, "BIO": {"1": "Leader energy. {N} takes charge almost immediately, and people feel that authority before a word is spoken.", "2": "Emotional, fated energy. People feel something pulling them toward {N} — a deeply feeling nature that cares about both material security and emotional fulfilment.", "3": "Passion, love and attraction born immediately. With {N} the chemistry is felt on contact — turbulent at times, but always heartfelt.", "4": "A serious, composed presence. People sense they are dealing with someone measured and self-possessed; {N} takes time before deciding.", "5": "Neither fated nor karmic — a healthy, quality connection. {N} leads with intellect and communication.", "6": "Physical attraction and love born immediately. {N} is passionate, and connections like this most often end in marriage.", "7": "A spiritual pull — the sense of a higher power drawing things together. {N} carries a sensitive, unpredictable energy.", "8": "A stable, self-contained personality. {N} is cautious and needs time to open up, but builds something lasting once trust is earned.", "9": "Karmic energy — the deepest and most demanding of the stories. {N} loves in a way that asks much and gives much."}, "GEN": {"1": "{N} needs intelligence and eloquence in a partner, and cannot tolerate narrow-mindedness.", "2": "{N} needs emotional expression and visible care, and cannot tolerate coldness.", "3": "{N} dreams of unconditional love and the widest possible tolerance.", "4": "{N} seeks stability, shared values and honesty above all.", "5": "{N} loves an intelligent, communicative partner — and holds freedom sacred.", "6": "{N} adores beauty, harmony and refinement, and does not separate love from material comfort.", "7": "{N} wants intellectual depth and sincerity, and withdraws from anything shallow or dishonest.", "8": "{N} is drawn to strength and authority, and needs a protective figure to feel safe.", "9": "{N} is the essence of empathy, and needs someone they can trust completely."}, "LP": {"1": "Independence and leadership define {N}'s destiny.", "2": "Partnership and emotional depth — {N} grows through relationships.", "3": "Expansion, creativity and joy run through {N}'s path.", "4": "Structure, discipline and karma — for {N}, things come later, but they last.", "5": "Freedom, travel and change — {N} reinvents themselves more than once.", "6": "Love, family and responsibility are the heart of {N}'s path.", "7": "The unconventional path — {N}'s success comes from being different.", "8": "Power, achievement and material success shape {N}'s destiny. <script>
var ESSENCE={
0:"the deep well — old lessons, instinct, and a perspective most people lack",
1:"will and leadership — a need to feel free rather than commanded",
2:"feeling and instinct — sensing a room before a word is said",
3:"expression — made to talk, create, and lift the mood",
4:"the builder — a craving for stability, able to hold a life together",
5:"freedom and the senses — magnetic, restless, many-sided",
6:"love and responsibility — relationships are the point, though the grip can be too tight",
7:"the mind — a seeker whose gift is depth and whose wound is overthinking",
8:"quiet power — calm for a long time, then it moves with real force",
9:"the old soul — vision and compassion, dreaming further than they admit"
};
var COMPAT_URL="/compatibility.html"; // where the paid compatibility lives
function r(n){n=Math.abs(n);while(n>9)n=String(n).split('').reduce((s,d)=>s+(+d),0);return n;}
function codes(d,m,y){var bio=r(d+m);var gen=r(String(y).split('').reduce((s,x)=>s+(+x),0));var lp=r(bio+gen);return{bio,gen,lp};}
function pyramid(d,m,y){
  var base=(String(d).padStart(2,'0')+String(m).padStart(2,'0')+String(y)).split('').map(Number);
  var rows=[base],cur=base;
  while(cur.length>1){var nx=[];for(var i=0;i<cur.length-1;i++)nx.push(r(cur[i]+cur[i+1]));rows.push(nx);cur=nx;}
  var two=rows.find(x=>x.length===2);
  return{first:two?two[0]:cur[0],second:two?two[1]:cur[0],third:rows[rows.length-1][0]};
}
function fill(t,name){return t.replace(/\{N\}/g,name);}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');}
function parseDob(s){s=(s||'').trim();var iso=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);if(iso)return{d:+iso[3],mo:+iso[2],y:+iso[1]};var m=s.match(/(\d{1,2})\D+(\d{1,2})\D+(\d{4})/);if(!m)return null;return{d:+m[1],mo:+m[2],y:+m[3]};}

function render(name,d,m,y){
  var c=codes(d,m,y), py=pyramid(d,m,y), N=esc(name);
  var h='';
  h+='<div class="hero"><div class="wm">Occultics</div>'
   +'<div class="htitle">The Personality <em>Code</em></div>'
   +'<div class="hsub">A numeric portrait, read from the Occultics knowledge base</div>'
   +'<div class="triad">'+c.bio+' &middot; '+c.gen+' &middot; '+c.lp+'</div>'
   +'<div class="pyr">Pyramid <b>'+py.first+' &middot; '+py.second+' &middot; '+py.third+'</b></div>'
   +'<div class="name">'+N+'</div></div>';

  // first glance
  h+='<div class="sess"><div class="se">First Glance</div><div class="st">Your code, '+c.bio+'&middot;'+c.gen+'&middot;'+c.lp+'</div><div class="sb">'
   +'<p>Your three numbers come straight from your birth date. Your <b>biorhythm</b> ('+c.bio+') is the energy people feel from you and how you move through the world; your <b>generational</b> number ('+c.gen+') is what you need from the people closest to you; your <b>life path</b> ('+c.lp+') is the direction your life is built to take. Read together they are your Personality Code &mdash; '+c.bio+'&middot;'+c.gen+'&middot;'+c.lp+'.</p></div></div>';

  // biorhythm
  h+='<div class="sess"><div class="se">Biorhythm '+c.bio+'</div><div class="st">The energy you carry</div><div class="sb">'
   +'<p>'+fill(KB.BIO[c.bio],N)+'</p></div></div>';

  // generational / what you need
  h+='<div class="sess"><div class="se">Generational '+c.gen+'</div><div class="st">What you need</div><div class="sb">'
   +'<p>'+fill(KB.GEN[c.gen],N)+'</p></div></div>';

  // life path
  h+='<div class="sess"><div class="se">Life path '+c.lp+'</div><div class="st">Your direction</div><div class="sb">'
   +'<p>'+fill(KB.LP[c.lp],N)+'</p></div></div>';

  // pyramid
  h+='<div class="sess"><div class="se">Your Pyramid '+py.first+'&middot;'+py.second+'&middot;'+py.third+'</div><div class="st">The architecture of your life</div><div class="sb">'
   +'<p>Your pyramid reduces your whole birth date to three points &mdash; where you began, the work in the middle, and where you are heading.</p>'
   +'<div class="prow"><div class="pn">'+py.first+'</div><div><div class="pt">Where you began</div><p>You came in with '+ESSENCE[py.first]+'.</p></div></div>'
   +'<div class="prow"><div class="pn">'+py.second+'</div><div><div class="pt">The work of your life</div><p>The centre of your pyramid is '+ESSENCE[py.second]+' &mdash; the lesson you return to.</p></div></div>'
   +'<div class="prow"><div class="pn">'+py.third+'</div><div><div class="pt">Where you are heading</div><p>You are building toward '+ESSENCE[py.third]+'.</p></div></div>'
   +'</div></div>';

  // complete picture
  h+='<div class="sess"><div class="se">The Complete Picture</div><div class="st">All of it, together</div><div class="sb">'
   +'<p>You move through the world as a biorhythm '+c.bio+', you need a '+c.gen+' kind of love, and your life is built around the '+c.lp+' path &mdash; carried from where you began ('+py.first+') through the lesson at your centre ('+py.second+') toward where you are heading ('+py.third+'). This is your code in full.</p></div></div>';

  // upsell to paid compatibility
  h+='<div class="cta"><div class="h">Now decode a connection</div><p>Your Personality Code is the start. The Compatibility Code reads two birthdays together &mdash; how you met, what you build, and whether it lasts.</p><a href="'+COMPAT_URL+'">Reveal a Compatibility Code &rarr;</a></div>';

  document.getElementById('reading').innerHTML=h;
  document.getElementById('reading').classList.remove('hidden');
  document.getElementById('actions').classList.remove('hidden');
  document.getElementById('form').classList.add('hidden');
}
function fromForm(){
  var name=document.getElementById('nm').value||'You';
  var b=parseDob(document.getElementById('bd').value);
  if(!b){alert('Please enter your birthday as DD/MM/YYYY');return;}
  render(name,b.d,b.mo,b.y);
}
(function(){var p=new URLSearchParams(location.search);
  if(p.get('d')&&p.get('m')&&p.get('y')){render(p.get('n')||'You',+p.get('d'),+p.get('m'),+p.get('y'));}})();
</script>
