<style>*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Montserrat',sans-serif;background:#f5f0e8;color:#15171f;-webkit-font-smoothing:antialiased;line-height:1.78}

.foot{margin-top:40px;text-align:center;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#9ca3af}

.form h2{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:24px;color:#0a0e2e;margin-bottom:18px;text-align:center}
.row{display:flex;gap:12px;margin-bottom:14px}

  <div id="form" class="form">
    <h2>Your Personality Code — free</h2>
    <label>Name</label><div class="row"><input id="nm" placeholder="Name"></div>

</div>
<script>var V={"BIO_CHAR": {"1": "She tends to be dominant in a relationship, she drives the relationship and behaves accordingly. Unconsciously, she likes to have a lot of things in her hands and to show this dominant trait in the relationship as well.", "2": "The influence of the blocks and fears that a 2 feels manifests more strongly in biorhythmic 2s than in personal 2s. They will be exposed to much greater blocks than a 279, for example, compared to a 922 (which doesn't mean a 922 won't feel fears and blocks), but with a 27, there's an immediate self-sabotaging block, that great restlessness and inner conflict that is felt. That's why, in a relationship, a biorhythmic 2 will be indecisive, precisely because of that blockage in their character. They will behave accordingly—a bit of a balancer, a bit hesitant, indecisive, with a tension, restlessness, and the fear they carry within. If, for example, a biorhythmic 1 and a 2 get together in a relationship, the 1 will be in charge, and the 2 will feel some tension from the 1, a fear of opposing or defying them, and will have a feeling of indecisiveness within themselves.", "3": "In both codes and relationships, the 3 enters a relationship with passion. The 3 is described in horoscopes as passion. And many relationships that begin with a 3 started passionately, stormily, and sometimes quickly. There's an immediate chemistry. Whether that passion will last is shown by the other numbers. The biorhythmic 3 is sometimes much more heartfelt and impulsive than the personal 3. However, its great flaw in life is that many 3s tend to overestimate themselves, overestimate their abilities, and believe they can achieve, accomplish, and realize much more than they can objectively and physically. Because of this, it happens that they make empty promises. They think they can accomplish it, but a 3 often starts many things at once, spreading their energy across multiple fronts and not seeing many of them through to the end. They are aware of their mistakes, but their impulsive nature makes it hard for them to admit it. Then, she ends up blaming others for why she wasn't able to fulfill and complete them. With this behavior, a biorhythm 3 can cause problems in a relationship, especially if she runs into a partner who is bothered by this exaggeration, the over-promising, the excessive starting of things, and the failure to finish most of them. This is where communication problems and misunderstandings arise, which, of course, lead to emotional, impulsive outbursts that the 3 knows all too well how to start.", "4": "A 4 in the biorhythm, at first glance, indicates a serious person, and we can be very mistaken about this, because the 4 in the biorhythm puts on a mask. This mask gives that first impression of seriousness. It even happens that biorhythm 4s have somewhat more serious facial features. Their behavior in a relationship can be like they're keeping you on a back burner, as if they need more time to figure things out, to decide, to make the decision they have to make.", "5": "A Biorhythmic 5 tends to freedom, is an eternal child, and generally behaves that way in life. A 5 in the biorhythm can be happy in a relationship, but must find a partner who won't restrict them, who will understand their need for freedom, and who will be their equal in terms of character traits. A 5 in the biorhythm also indicates the talents a 5 can possess. Many biorhythmic 5s are extremely talented (even more so than is the case with personal 5s). Whether that talent is the one we have in our hands, or the one th s concerned with storytelling, communication, being a speaker, writer, pianist, etc., is individual and that will be told to us by the other two numbers in the code. Let's say, 562 – here the talent is: writing (5) emotions (2) with love (6), that is, emotions with love are translated into the written word. 5ces know that they transfer with their hands (5) onto paper (5), so there will be many writers, composers, etc. among them.", "6": "Her longing for love, for a family, and for starting a family is great, and she acts accordingly. However, 6ca knows that in life she can also be a great victim from giving herself to others. 617/674 – They are unhappy and long for love, but they give themselves to others their whole lives and tend to see themselves as victims. Other people will likely see them as charming and charismatic, but through their biorhythmic 6, they perceive themselves as a victim of their family and emotional life. A biorhythmic 6 needs a partner who will behave similarly to them and who will give them what they are looking for.", "7": "Biorhythmic 7s love freedom, are unpredictable, prone to mood swings, going from being withdrawn to having hysterical outbursts. This 7-ness madness is much more pronounced in the biorhythm than in the personal number. That is why a large number of biorhythmic 7cs tend to follow the path of spiritual growth, which is good for them. On this path, similar to the 5c, they must find their partner.", "8": "The biorhythmic 8ca is nonchalant about money, while the personal 8ca is a fighter, sharp and brave. The 8ca in the biorhythm provides a sense of ease, toning down the excessive passion of the personal 8ca. In the biorhythm, she is carefree, with a dose of hedonism and relaxation, and it's she who, because of that relaxed attitude, knows how to live off others and loves money—not to exploit anyone, but because life just arranges situations for her that way. It will be, let's say, 898, where the personal 8 is heartfelt and brave, while the biorhythmic 8 tends toward levity and hedonism, so 898 has a turbulent love and emotional life. So it happens that 898 gets divorced, and there's no 6/7. They nonchalantly enter and exit relationships because a biorhythmic 8 wants to enjoy themselves, and if I don't get that enjoyment, then you get in my way. The biorhythmic 8ca strives for that enjoyment and hedonistic behavior, which is why the 8ca also attaches itself to money. An 832 will be a much calmer variant than a 718/178.", "9": "Any numerological code that begins with a 9 produces the most persistent and stubborn people of all the other numerological variants. When a 9 in the biorhythm has its mind set on something, it is that way and cannot be otherwise. It will see it through to the end, regardless of whether it takes the long or short road, or uses harder or easier methods. We cannot compare a 292 with a 922. A 292 will be a softer two. 922 has a strong intuition, strong feelings, everything that represents a 2, but it's very persistent, that 2 doesn't hold it back as much, and it finds a way to get its own way. And there will be many biorhythm 9s who will charge headfirst to get what they want (some more, some less). Imagine how stubborn a 999 is. A biorhythmic 9 must find a partner in life with whom they can find common ground, who knows how to keep things in perspective, who knows how to rein things in, and with whom they can find a compromise."}, "BIO_SYN": {"2": "The 2 in a synastry signifies destiny and indicates that we are meeting for the first time in this life, and we cannot influence that. Synastry with a 2 is fated and based on emotion, especially those that begin with the 2. As the first number in a synastry chart, a 2 indicates that fated emotions developed first. If the 2 is in the destination (as a generational number), then it is pure destiny. When synastry begins with the number 2, these connections are fated and are based on emotion. However, this also means that the beginning is based on indecision and instability; it's possible that someone will suffer mentally the next day, have a crisis, be unhappy, or be mentally devastated. With a 2, there is always some kind of blockage, and the partners block each other.", "3": "Since the 3 is a 6 in miniature, it also speaks of emotions. However, unlike the 6, which is love at first sight, the 3 brings incredible passion, giving rise to the most turbulent relationships, filled with great love, chemistry, and attraction, because the 3 itself, especially in its biorhythm, behaves this way. However, where there is excessive passion, love, attraction, and strong emotions, there is also lust, so there will be relationships that start with passion, continue with passion, and end with someone getting beaten up! Synastry with a 3 is passionate, turbulent, jealous, and possessive. It's a fact that the relationship starts based on passion, but whether it continues that way depends on the other two numbers.", "4": "Relationships that begin with a 4 aren't started quickly or with passion. They indicate that a karmic connection is on the horizon, that karma is present at the very beginning of the relationship. The biorhythmic 4 indicates that karma is only present at the beginning of the relationship, or in the first few years, but that these difficulties and trials will not continue later on (if there are no more 4s in the synastry). Karmic relationships are very good and high-quality. Of 100% of them, 80% are good. These love stories have stability, durability, and quality. The 4 relates to our connection with a partner from a past life, so when they meet now, they have a feeling of recognition, and that karma is so strong it connects them instantly. The 6 speaks of karma on a family level, while the 4 speaks of karma on an emotional level. With a 9, karma is being paid off, and that's why there will be many synastry charts with a 9 that fall apart once that karma is paid off. In synastry, the 4 represents a purely karmic connection. With a sister, brother, friend, partner,... the 4 represents something long-term, high-quality, and provides the predisposition for something that lasts a lifetime. It is the only one in a synastry that gives that strongest quality to a relationship, and it doesn't just apply to duration, but also to love, respect, and support. Even if oppositions are seen (observing the partners in relation to each other, one versus the other, what they do in that relationship) a 4-1 or 4-2 (aspects of longevity), we get an indicator of that relationship's longevity. In synastry, the biurhythmic 4 also represents the age difference between partners. For example, a 46 is an aspect of a partner age difference, but it's because of the 4, not the 6. The 4 is the one that signifies age and indicates a difference, and next to it stands the number of family, love, and partners. That difference can be 5, 10, or perhaps 15 years. Also, the 4 indicates a possible physical separation between the partners. The 4 represents a boundary and represents the earth. That boundary (4) represents that distance, that physical separation between the partners in synastry. With a 4, you will also have a synastry where the partners are of different faiths and nationalities, and it doesn't necessarily have to be the number 3, as the number of faith and nation, that would indicate those differences. The 4 itself is responsible for this and leads to these differences. For example, a 459 synastry—the husband is in Switzerland, and the wife is here, even though there is no 3 or 6 anywhere. The 4 is karma and carries weight in all karmic relationships.", "5": "A relationship that starts with a 5 says that the partners had previously socialized (from a friendship), that they were in some kind of mutual circle, and then a love grew between them, or they entered the relationship through some casual flirting, some kind of arrangement, which they never suspected would become something serious. The 5 in the biorhythm can also indicate that the partners connected through work, friends, colleagues, or through socializing. Whether that initial flirtation, arrangement, or adventure will result in marriage, or if it will remain just a flirtation or an affair, is determined by the other two numbers. The most common form of affairs and extramarital relationships does indeed exist under the influence of 5ce.", "6": "The beginning of a synastry with a 6 means that family-level karma is present right at the start of the relationship, and this karma is by no means weak. It is weaker than a 4's, but it is strong enough. A 6 in synastry, especially at the beginning, has two variations. The first is that it signifies love and an automatic need to end such a relationship with marriage and the creation of a family ideal. There will be many examples (perhaps synastry charts with a 6 even predominate) that ended in marriage out of pure and true love. The second is that 6ca in synastry also signifies physical attraction, because 6ca is Venus—beautiful, charming, attractive,... This means that here we have an obligation to look at the other numbers and determine if we truly love someone and if that love is really strong enough to last a lifetime, or if we're just in some kind of a phase where we think we love someone, but in reality, we're just attracted to them, they're charming, they have that something about them that magnetically draws me in, and what I'll discover later isn't the case. In any case, this is a karmic connection, and in this instance, a physical attraction occurred at first sight. Someone physically won the other over (because of their physical appearance and the complete package they present), and alongside that attraction, love and a need to start a family and get married also happened immediately.", "7": "In the beginning of a synastry, 7c is thoughtlessness, turbulence, a nervous breakdown, and unpredictability, but it is also that spiritual link we must not forget, especially if it is in the destination, because the destination is the most important thing. Of the 9 combinations, 2 to 3 will survive, and the others won't. This is logical, because 7ca is a symbol of breakups and divorces.", "8": "In synastry, a start with an 8 indicates relationships where both partners work together to create something, where both partners contribute equally and earn a living in their shared life, wanting to create or build something. However, there will also be synastry with an 8th house where one party materially exploits the other and where someone is with someone else for money. In that case, great caution is required. An 8th house in synastry, wherever it is located, also indicates a potential for a break-up. Since 8ca is associated with 2.5, this means the partners will break up 2 to 3 times, but after that, things get sorted out, calm down, return to normal, and they stay together. In a synastry with 8ca, there are also infidelities, especially if 8ca is derived from 9ca. All arguments, disputes, and bitter quarrels will occur when the 8ca is in play and as a personal number. The first number, in combination with certain aspects, is associated with a protective and hedonistic approach, and in synastry, it is most prevalent in 8-1 and 8-9 aspects. This is especially true for oppositions, because it's not like the 1-8 opposition, which brings stings and provocations. Those provocations come from the latter 8ca. She is the provocateur. She is the one who likes to tease and poke. The biorhythmic 8c is a kitten compared to the personal 8c. She is nonchalant, relaxed, and hedonistic, and because of this, in opposition, she provides more of that protective aspect, where with the 8-1 and 8-9 aspects we speak of a kind of guardian angel role.", "9": "Relationships that begin with a 9 are karmic, where the 9 in the synastry is the repayment of karma. The moment that karma is repaid, these relationships fall apart. Out of 9 combinations, 5 to 6 will result in the partners separating after the karma is repaid. A 9 can be formed from the same or different biorhythm numbers, and in most cases, it leads to the same outcome. There is no difference in interpretation. If that biorhythm 9 is made up of two 9s, the relationship is a bit more difficult, because we have two stubborn people with whom we cannot make a compromise. Then the karmic repayment is at a somewhat more difficult level in terms of communication and forming the relationship, whereas it is much easier when the 9 is made up of different numbers. The beginning of a synastry with a 9 can also indicate entering into a secret relationship."}, "PSY": {"1": "1ca governs the absolutely conscious part of a person. A 1ca, in the sense of a personal 1ca, if the date is full of 1ca - these are people who, in most life situations, act and react very consciously. Everything is crystal clear to them, and if you hear a 1ca say she wasn't aware of a certain action or that she didn't do something intentionally, she's probably not telling the truth. This is because, in addition to being conscious, the 1ca always analyzes everything first and studies it very thoroughly. Whether or not this analysis goes to extremes depends on the 1ca.", "2": "The 2 is unconscious because they go by emotions and soul. A 2 will approach you unconsciously, with their soul, emotions, and heart. They don't think. She gathers and has certain information in her head that guides her by instinct and emotions, and in most life situations, she acts completely unconsciously (looking at her alone, without the other aspects). That's why you can't blame her. You need to find a happy medium with her if you want to forgive a Number 2 for certain things.", "6": "The 6c governs the unconscious part because it governs our desires, what we want. It does what it wants, based on how it feels in the moment, what feels good to it. The 6c will almost never intentionally hurt someone. It does everything from the perspective that something looks good to it, that it will also bring someone else joy, that they will like it. She never acts maliciously.", "8": "8ca is not consciously malicious. She governs our instinctive reactions, which are like a volcano. At some point, she might insult you, snap something off, or say something she doesn't mean (a bit like a 3) because she was having a bad day, and afterward, she'll repent and realize what she did.", "5": "5ca doesn't belong to the group of a person's unconscious actions, but it also doesn't belong to the group of conscious numbers. It's somewhere in between, somewhere in the middle. That's because 5ca is logic. 5ca processes information in her head, which is a matter of logic. She is the one responsible for processing and refining information, and in her number, she connects the conscious and the unconscious. That's why she belongs to the category of two-faced people. She will consciously and unconsciously connect them into one group, and you will end up with a 5c across from you who will think one thing today and another tomorrow. Today she'll tell you one thing, tomorrow another. She's not a 100% danger, but a certain degree of caution is necessary, even in communication and in how you interact with her, because she'll tell you something today, and then, five days later, she'll process that information, remember something, and tell you something different. It won't be as totally conscious as a 1c, nor as totally unconscious as a 2c, 6c, and 8c, but it will be processed to the last possible point.", "3": "The 3rd governs another category of a person's conscious actions, namely a fully conscious state, but a non-malicious one. The 3rd is the one that governs moral values, sincere values, so that even when she reacts toward other people, in 99% of cases, what she said is what she meant. Whether she offended you impulsively, in the moment, that happens very often. Whether she unloaded on you like a machine gun, it was exactly what she was thinking and it simply came out of her. Whether she regretted it afterward because of her big mouth is another matter.", "4": "The 4 is the most conscious number of all. It is at the top of the list of the most conscious people. The 4 owns up to the consequences and is the one who suffers the repercussions of its mistakes. When a 4, like a 1, says they weren't aware or didn't do something intentionally, they are lying. Everything they do, good or bad, they do so as consciously as possible. We can't put her in the same category as the 3, because the 3 will act impulsively, hastily, and quickly, but they will also think that way. The 4 will act after prolonged deliberation, and yet they will think that way. That is an absolutely huge difference.", "7": "The 7 is the number most susceptible to suggestion, both self-suggestion and suggestions from other people. That's something every 7 has to work on. It must free itself from forms and from what has been imposed on it through 'you must' or 'it's supposed to be this way.' The aspects 7-4 and 7-9 endure the greatest pressure to break free from forms. Other 7s manage somehow, but mostly in a negative way, through their impulsive reactions. 7-4s and 7-9s suffer from living by templates and forms of what must and should be, and thus create serious pressure for themselves. 7s experience a strong psychological terror from themselves and from other people, which brings them great psychological distress and a feeling that they are living a life that isn't their own, that something is suffocating and restraining them. 7s don't have any complex aspects. They have a hard time freeing themselves from the forms of 74/47, 79/97, 797, 977, 07.09, 09.07, personal 7ca. Any bad 7ca will free themselves from these forms by working on themselves, avoiding the suggestions of other people, turning to spiritual work and self-development, auto-suggestion, yoga, meditation, and motivational books.", "9": "The 9 escapes from problems and rarely tackles and confronts life's problems head-on. These escapes from problems create and lead to seriously bad states of the psyche, morbid dreams, and destructive states. Once a 9 enters these states, they can hardly get out of them. In these situations, she escapes into vices: cigarettes, alcohol, drugs. Like the 7, the 9 also needs to free herself from the life patterns that have been imposed on her. The 9 should be urged to face her problems, not run from them and rush headlong into ruin. The 9 knows what its problem is, but it stays silent, endures, and swallows it. It finds it hard to express it. Don't run from problems with the 9. Don't let any combination involving the 9 let problems pile up, because they will grow like wildfire and become the cause of depression, confusion, strange states of mind, and morbid thoughts. All of this happens when a 9 is allowed to stay silent, not defend themselves, and remain as they wish, but they don't want the problem to be solved; they run away from it.", "0": "0 gives rise to the most exclusive people. Caution is needed when dealing with these people, because 0 has exclusive moves in life, exclusive attitudes. With a 0, there is no middle ground. Something is either black or white. 0s are the people who psychically exhaust themselves the most. Of course, you should look at which aspects of a 0 are good and which are bad, but any person with a 0 will strive to, at least unconsciously, exhaust themselves to the maximum, which also leads to the 0 having no measure in life. Extremes occur where they will be screaming with happiness one day, and the next they will declare themselves the unluckiest person. They will either work themselves to death or do nothing at all. This extremism in their behavior, and their inability to take a break, weakens them energetically. When working with these people, you need to proceed slowly, to get under their skin, and then use positive attitudes and phrases to convince them to give up on some of their ideas, because when a 0 sets their mind on something, they push for it, even if it's harmful to them. It shouldn't do that, because the essence of a 0's mental stability, as well as greater happiness in life, is not to pursue something at any cost. That's why you need to find an approach with them, explain the mistakes they're consciously making, get them to question whether that's really the case, and never give them orders. You should never say 'you have to' or 'don't.' They should be prompted to ask themselves if they are right, to come to that conclusion on their own. After a few days, they will process it in their minds and understand on their own. So, their biggest mistake is this exclusivity, which leads to the realization of their good or bad sides absolutely at any cost."}, "PROF": {"0": "alchemists, tycoons, police officers, snipers (assassins), resuscitators, gravediggers, undertakers, usurers, psychiatrists, tax collectors, controllers, archaeologists, private detectives, intelligence agents, mine owner, gas station owner, pathologist, forensic expert, nuclear physicists, gynecologist (one who performs surgery/interventions), banker who originates loans, inspectors", "1": "actors, high-ranking officials, superiors, bosses, managers, directors, heads, owners of jewelry stores, courtiers (people close to power), presidents (of a country), deans of faculties, entrepreneurs, king (ruler)", "2": "healthcare workers, pulmonology, gynecology (obstetrics), people who work with or manage the masses (2 is the people, 0 is control.. there are also heads of state), all jobs related to water/liquids, water technology, technology faculties, those who work at pools, in laundries (any kind), production/sale of milk and dairy products (aspect 2 (milk) 3 (fat) – clotted cream, sheep cheese), production/sale of chicken and eggs, production/sale of vegetables (dominance of mushrooms), housewives, real estate agents, construction (2 and 4), hoteliers (2 is the 6th degree), all state institutions and everyone who works in state institutions, hydrometeorologists, caregivers", "3": "professors, people who can impart knowledge, economists, lawyers, judges, lawyers, highly educated people (328 doctor/medicine 3-highly educated people, 2-medicine, 8-uniform), philosophers, diplomatic services, sports equipment sellers, sports referee nd drug industries, ballerinas, modeling, photo models, psychologists, alternative medicine, herbalists, macrobiotics, homeopathy, acupuncture (98 - (8) needle), quantum medicine (79 – (7) denial Russia (9) alternative form of treatment), painters, sculptors, photographers, cameramen, artists, actors, beekeepers, sailors, anesthesiologist (89) PROFESSIONS BY CALDEANS 1 Private of any kind 1ce with PKK 8 or a mix of 8ca and 1ca + 8ca in the date indicates work in the military, in government/state institutions 1ce with PKK 4 or 2 + those numbers through the date gives professions in construction Research of Hermeticism and complete esoteric science (on a scientific basis), with an emphasis on astrology, numerology, chirology, tarot Creativity and originality: acting, painting, not so much singing and music Journalism, in the sense of working in radio and television Inventive note: programmers, IT specialists, design Professional athletes 2 Psychologists Esotericists (later in life) Theologians 2kes are strong in these areas Philosophers Spiritualists Poets Talent for writing Much fewer actors and dancers Architects All types of design Agriculture Mechanics Service activities: catering, hospitality Pharmacy, alcohol, non-alcoholic beverages Fuel and gasoline business Over time, they develop an interest in esotericism Herbalism, healing, nurses/technicians, alternative medicine 3 Any form of publishing All forms of commerce and marketing Tourism Philosophy Politics All aspects of religious, denominational, humanitarian institutions Medicine (but nurses/technicians) Law (attorneys and judges) Writers Painters Actors Dancers Stand-up comedians Hosts Cosmetics (any type of cosmetics), even the making and selling of cosmetic products Some sports coaches and driving instructors (these two fields are secondary) 4 Economics: banking, accounting, management, organization Right Agriculture Real Estate (all business related to real estate) Chemists Laboratory technicians, or bioc . This, as well as any other form of intentional pregnancy termination, is strictly forbidden for women with 0. Men with 0 must not: deny the child, or force their wife to have an abortion. They must also be careful in life with their parents and their partner. With a 0, there can also be a karmic burden from the grandmother, but the other numbers must confirm it. Otherwise, it's 100% passed from mother to daughter (if the mother has 0), but it is also seen in men, in the form of not having children For people who don't have 0, this newly created karma doesn't happen. 1ce KARMA: 1ca has the smallest and mildest karmic burdens 1ca does not have their own personal karma from a past life In a past life, 1c was a ruler, king, prince, etc. Because of that position in a past life and the function they had, 1c today strives to accomplish something in this life. 1ca today strives to achieve a position through her career. Status and reputation are important to her. 1ca is the father's karmic burden. These are dominant 1ces (through the date of birth, through numerical codes) 1s know they physically and character-wise resemble their father. That genetics inherited from the father's side is like a reminder of that karmic burden The heaviest karmic burdens from the father's side are from 1-4, 1-9, and secondarily 1-8 There will be situations such as the father abandoning the child, not being present for some reason, passing away early,... With karma 1ce, people know they have a tense relationship with their father, poor communication These are all manifestations of karma, because karma pulls a person and leads them to make mistakes. Many women have divorced because of karma from their fathers, many have lost their partners This karma brings women problems with men emotionally, but also with authority figures", "1": "Suffer it and don't allow yourself to react so you don't pile more karma on yourself. If he yells and says all sorts of things, he is adding karma to himself. Karma also tempts you to make a mistake On Sundays, call him, visit him, do something nice for him, help him If the father is not alive, do a good deed for old men on Sundays By neutralizing your father's karma, your emotional life improves and a bad relationship with authority figures is neutralized. 1ce know to specifically argue with their father on Sunday and then cut off contact Distance does not neutralize/reduce the karma of the 1ce", "2": "Twos were either explorers or engaged in some kind of magic in a past life: witches, warlocks, magicians, sorcerers The 2 was always a woman in that given incarnation who is karmically connected to this incarnation. These women were woven from emotion, and because of those emotions, they suffered too much in all areas of their lives. The 2s were guided by their hearts, and that existence in the past life was with the desire to help others. The hypersensitivity they felt drove them to help others with their gifts/magical formulas. However, by doing so, the 2 (in a square) did not help others and thus shouldered a serious personal karma. The greatest karmic burdens with the 2 are: 2-4, 2-9, 2-8 with a 4 The hypersensitivity in this life is not even 5% of what it was in that past life, but it was carried over into this life Every 2, in some way, was connected to their current mother in a past life In that past life, her mother was not a mother to her, but they had to be blood-related: an aunt, grandmother, or sister. In this life, 2 encounters that soul because of unresolved issues from a past life, and the numbers next to it show what kind of issues they are. 2 has more karmic burdens The mother's karmic burden. It indicates that 2ka's mother will have a difficult life, will suffer greatly, and will be sick with a serious illness. In the vast majority of cases (70-80%), this is breast or ovarian cancer (for this, the mother's date is required). The karma of the 2 and its karmic cleansing in this case is to be by the mother's side, to help her, and to take care of her during these difficult times. The life of a karmic 2 attracts life in unhealthy locations. This doesn't mean the person lives in a shack, but rather that the 2 attracts living in properties located on some underground water sources. This greatly affects the 2 and creates unhealthy living conditions for them, first in their family life, but also leading to mental instability. The 2 has the following karmic burdens: a problem in their home problem with emotions problem with the mother problem with pregnancy So, the 2 has both inherited karma (from the mother's side) and its own personal karma. Many 2s have not become mothers, even though they have a nice children's sector. The greater the karmic burden of a 2, the bigger the problem with pregnancy. They either don't become mothers or they struggle to get pregnant. The 2's day of karmic repayment is Monday They should mend their relationship with their mother and do a good deed for her on Mondays If the mother is not alive, help older women, exclusively on Mondays There are cases where 2s dedicate themselves to the nursing profession to neutralize that motherly karma. This is especially present with the 2-4 aspect. The 2 knows that on Mondays, they will argue with their mother, fall into a depression, or have a nervous breakdown, because the 2 has this karmic burden tied to hurt feelings Distance does not neutralize/reduce the 2's karma 3's KARMA: The 3 is the number that carries the greatest personal karma (10th position empty, then the 6) 3s were in a past life either conspirators (if they lived in a more recent period, politicians, judges) or lovers, concubines, prostitutes These karmic connections can also be seen through synastry If you have 3s in your synastry and you are the one suffering now, you were probably the partner who cheated on and hurt the other in a past life. Whether a 3 in a past life was an accomplice or a mistress is shown by the numbers next to it If a 6 is next to the 3, the person was 100% promiscuous. The first marriage a 3 has today is usually that karmic story left unresolved from a past life where the other party was hurt. Today, the 3 gets hurt and suffers a lot. If next to the 3 is a 9, a 1, a 5, and especially an 8, you were some kind of conspirator who cheated on 101 people Those who were mistresses go to extremes today. They are either totally asexual or promiscuous, at least for a period of their lives. They can party for 5-10 years, then go to the other extreme and become asexual. These s don't do this because of health problems or because they suffered in a past life, but exclusively due to the influence of karma that is now punishing them. This type of 3 suffers the most in life A 3 can have partners and relationships that are not karmic in nature (especially 3s who are conspirators) The 3 is the number that goes through the most betrayals, and this is a guilt it carries from a past life. This 3 suffers many romantic failures and divorces in life, all in search of their karmic stories through which they will pay off their karmic burden The 3 pays off its karmic burden, especially on Thursdays (but it can be on other days as well), by giving with both hands for more than half of its life (and some 3s their entire life). Many 3s give, suffer greatly, and get hurt because of unrequited love and unrequited friendship, because of their giving being completely unrequited The 3 will give 100% of themselves and receive 1% in return, and that's okay, because it is their karmic lesson and the way they pay off their personal karmic debt. Thursday is the day when the 3 gives the most selflessly, but it is also when the highest percentage of plots, setups, and sacrifices happen to it. A 3's greatest suffering, entrapment, and need to give is when the 3 is in a square KARMA of the 4: The 4 has two karmic burdens – personal karma and karma inherited from ancestors 4s created their personal karma in a past life by living very spiritually dirty, immorally, being unfaithful, without an ounce of honesty. Even if they went to church and prayed, they did it all without heart. Let's say, like today's 0/8 through their bad characteristics The 4 has similarities with the 1 because both 1s and 4s were in some important position in a past life. However, 1s didn't commit any great evil, and that's why they don't have personal karma 4s, like 1s, were seriously positioned and as judges, military leaders, colonels, generals,... 4s back then showed no emotion and performed those duties, as if their purpose in that life was to sow fear and terror all around them. It was enough for them to just look, and people would feel immense fear of them. For example, people who worked in concentration camps, people who killed, slaughtered, imprisoned people, made victims of those around them at every turn, were bloodthirsty,... 4s were ultra-cruel people, without a shred of emotion and incapable of feeling enjoyment in life 4s were selfish people. Like when we observe the 28 conjunction in men today 4s were people who didn't care about anyone and were always self-sufficient 4s were selfish and this is, probably, character-wise, the worst form of the past of all the karmic representatives The 4 also has an added karma, and that is the karma of the ancestors This ancestral karmic debt is mainly tied to their ancestors being present in a war, depending on the oppositions, and then, consciously or unconsciously, killing someone. These are also people whose families experienced murders or suicides, people who abandoned their children, who committed fratricide, blood feuds, etc. The 4 pays off its personal karma by helping sick people, but those who are so ill that they are on their deathbed. This also includes people who are homeless, poor, old, and very sick. The focus for the 4 is, therefore, on the elderly, the very sick, and people who are dying from severe, incurable diseases Like the 2s, many 4s will also feel a calling to work in healthcare. This is why the nurse aspect is a 24. Many with the codes 461/641/472/494 consider working in healthcare, as their karma draws them to help the elderly and sick and to assist them through their profession The 4 is the number that rules Saturday, which is also the day of Saturn. It is not good to start anything on a Saturday or to hold celebrations, weddings, etc. Also, for celebrations, one should not choose days when we have karmic burdens. The karma of a 4 is neutralized when helping the group of people mentioned on a Saturday. It often happens in the lives of 4s that they remain to care for their elderly, sick parents as part of repaying their karmic debt Fours, especially those born on the 4th of the month, even though they are reserved by nature, often pretend to be very smart, to know everything best, and lecture others, when in fact they should be careful about their own behavior. Every time a 4 behaves this way, it's karma speaking through them. This means something more, something hidden, is speaking from within them, regardless of the fact that the blow and punishment of karma occur shortly after, where they might suffer some damage. That boomerang, in fact, comes right back at them. The 4 should let dissenting opinions go, as this prevents them from accumulating karma. This is another piece of advice on how to break the 4's karma and prevent that influence from continuing. For the 4 to neutralize ancestral karma: On Saturdays, they should light a candle and say or think to themselves, \"I light this candle for all my deceased, so that their souls may go and find peace.\" To live at least 100 kilometers from their place of birth, and especially not to live in the ancestral home whose karma they carry, or in a house where an act was committed for which they carry that karma. In this way, the 4 protects itself and creates an aura of a good life. Numerology says that those ancestors whose karma we carry cannot find their peace, and that is why it is good to calculate that ancestor's incarnations. If there were, say, 11 or 12 incarnations (not the last 14 and 15—the greatest karmic burden is associated with the 12th and 13th incarnations), those karmic blows are then strongest on the souls of the descendants because of the need to purify that karma. It takes a very long time for these souls to find their peace; there is no other option, so descendants take on these karmic burdens of their ancestors.", "5": "5ce (personal/square) at the end of their past life, whatever they were involved in and whatever they did, ended up as wanderers with no one. This doesn't mean that 5ca wasn't married then and didn't have children and a family. It means that either she divorced or her children abandoned her,... 5ca, for these very reasons, in this life gets such a great urge for change, and she is indeed a symbol of change 5ca unconsciously feels that something must change in her life 5ca feels the need and the call to start a family, to have children, and this is that longing for a serious reform in this life. This is the call of a higher power, indicating that certain things must be set right in a specific way. There will be 5cas with greater burdens and 5cas with lesser burdens, with this or that manifestation of karmic difficulties. Not all will be the same Serious 5th house afflictions indicate a person who had a very difficult childhood, either in terms of growing up with their parents or in terms of challenging circumstances with schooling, socializing with peers, learning, or even education, related to memory and logic. In a secondary sense, 5ca indicates a bad relationship with a sibling (even if there are no 4-5 or 5-9 aspects) There will also be 5ca who have even lost a sibling, to lesser ones concerning communication problems and the inability to find common ground. 5ca is not a karma related to children, in the sense that one cannot have children Its karmic burden is associated with a difficult childhood and a bad relationship with a sibling, and sometimes with the general environment as well. Wednesday is the day ruled by 5ca/Mercury To overcome the karmic difficulties of 5ce, it is necessary on Wednesdays to help poor children or children in daycare, preschoolers, and elementary school students in the lower grades. 5ca can also make charitable donations to a daycare/elementary school. These donations can be in cash, but also in school supplies. Donations of clothing, shoes, toys, a coloring book, etc., can be made. Advice for 5ca is not to do themselves a disservice by giving their opinions/advice to others. Also, 5ca should not tell others their plans. This is important because it disrupts their energy for creation, achievement, and progress in life. 5ca should keep their opinion to themselves. It's best for 5c to say something neutral like, \"I hope everything will be okay/that a solution for your problem will be found,\" rather than starting to give advice and solve other people's problems. That only adds karma to themselves. 5c must learn to stop themselves from giving advice and to hold their tongue. It doesn't create a problem for the other numbers, but it does for 5ci, especially if it's in a square. When she learns that important lesson and finally shuts up, good and beautiful things start to happen to her. Karma of 6c: 6ca, in addition to 3ke, has serious personal karma 369, 336, 03.06, 3k6 – we might think how beautiful these codes and numbers are, what luck these people have in life, but in reality, we are talking about a person who has a mix of two serious karmic debts of a personal nature. A 3k is a much bigger and stronger personal debt, but when a 3k and a 6c combine, we get a real boomerang In a past life, 6s adored money, they did everything and wouldn't hesitate to do anything to get it (like when we observe the 28 aspect today) To get money, 6s were willing to do anything in the past life – to cheat you, to screw you over, to deceive you, to steal from you, to find a completely illegal way and path to get money Now, in this life, the 6 is FORBIDDEN from using any illegal means. They must not scheme or cheat for even a penny, because the financial outcome will be very bad. In this life, the 6th is FORBIDDEN from using any illegal means. They must not scheme or cheat, not even for a little money, because the financial outcome will be very bad. So, don't use illegal things of any kind and don't be stingy or deprive yourself of anything financially. So, don't use any illegal means of any kind, and don't be stingy or deprive yourself of anything financially. In fact, the more a 6c spends, the more they have. Saving and being stingy is something that creates pressure for a 6 and burdens them karmically, based on the principle, 'Nothing can come out of a closed hand, but nothing can go in either.' 6ces were murderers in a past life: executioners/hangmen (especially if 6ca with 8ca), infanticides (from the literal sense to abortion, intentional terminations of pregnancy), and people who ran brothels 6ces had many emotional relationships in a past life. Most of them ran brothels and, like the 68 aspect, engaged in short, meaningless one-night stands. 6ces treated every relationship in a past life as if it was insignificant. The only thing that mattered to them was their own pleasure. People that a 6c meets and gets to know in this life (on an emotional level) are those souls that a 6c hurt/left in a past life. The 6 is the only number that, when it meets a certain person on an emotional level, has the feeling that they know that person from somewhere, from before (this applies to those true, great loves). They behaved adventuristically toward these partners, and now the time has come for that to be rectified. Karmic connections will be most often seen in the composite charts of 6cs.6cs with the heaviest karmic burdens, regardless of a favorable marriage and children sector and regardless of good synastry, are forbidden to get married. 6cs with the most severe karmic difficulties, regardless of a favorable marriage and children sector and regardless of good synastry, are forbidden from starting a family, as well as from fulfilling themselves as mothers/fathers To repay the karmic debt, the 6c must: lives and works according to the law and morality don't save and don't be stingy. With 6com, be a jackass when it comes to money bear a child/children (the more, the better). If she does not bear a child, the karma is not paid off and is carried over to a subsequent life The day ruled by the 6 is Friday, but there is no specific action a 6 should take on Fridays to pay off their karmic debt. Friday is, in general, a good day for weddings, celebrations, and festivities. 6ces must not even think about abortion. Some 6ces have had abortions when they were young, and now they have trouble becoming mothers. Through bad actions, 6ces only pile up more karma for themselves 7's Karma: The 7ce has, most likely, lived in a tribe in all of their incarnations, giving and sacrificing themselves and herding for the well-being of others In all her lives, the 7 has engaged in some form of spirituality Some 7s were spiritual leaders involved with various faiths. From Muslim, Orthodox, Catholic, etc., as priests, monks, and hermits. They did this in search of finding themselves in a spiritual and every other sense. They sought answers in faith, religion, and spirituality. However, in none of their past lives did they find all the answers they sought. Some of them were witches, warlocks, and sorcerers Because of this, they were burned at the stake, even though their deeds were, in fact, as humane as it gets. And then, living in those tribes, they fought for spirituality, for the well-being of all people, helped their fellow countrymen, and actually paid for it with their lives, dying in the most agonizing torments. 7ca was seriously intuitive and clairvoyant, and was most often harmed by other people because of these gifts Today, in this life, 7s are clairvoyant, but that is just a fraction of the gift of clairvoyance and superhuman powers they once had. The karma of 7s in this life is to help others through that same spirituality. This doesn't mean they should or must become monks Duty in the sense of esoteric disciplines (astrology, numerology, psychology, etc.), everything that the 7 is and what it should be If the 7 does not dedicate itself to this path of karma, the 7 wanders By working and following their karmic path, a 7 should under no circumstances try to correct the will of God Her work and approach to other people should be based on scientific principles, and she must never force her help or advice on those who do not believe and do not want to help themselves. By working against this principle, 7ca brings karma upon her own shoulders. She will then feel bad, things will turn against her, clients will cancel on her, her brain will become blocked, and her intuition, which was given to her as a gift to help people, will cease to function. Believers are given the gift of faith; non-believers are not, and that should be respected and always kept in mind. Some people aren't meant to be happy; their karma in this life requires them to suffer—it's sad, but it's true. 7ces really want to help others, and it's a strong feeling for them, because they used to help everyone. And in this life, they are quite good and humane, but they are misunderstood. Many times, 7ca selflessly helps friends, approaching them with sincere intentions, only to be betrayed and have a knife stabbed in their back. There is no specific day, no particular task that 7ca needs to perform, but only to selflessly offer help to those who want, deserve, and respect it. 7ca should, at least through a second, additional job, work on their karmic task – to help others through esoteric work. 8ca's KARMA: People usually reincarnate as the same sex, and every 8ce in a past life connected to this one was incarnated as a man 8ce were aggressive people 8ces were warriors, chiefs, and professionals by trade, and they left a serious mark on all of it in a professional sense. 8ca fought and killed. She didn't give a damn about the victims, the losses, or how many dead she left behind. 8c was similar to 4c, but wasn't 100% of the time as ruthless and cruel, wasn't as arrogant and selfish as 4c 8ca, in most cases, did all that simply as part of her job, unaware of her actions A large number of them were professional soldiers who committed mass killings or did something negative For 8cs, karma doesn't care whether you killed willingly or unwillingly. It isn't interested in excuses that you did it because it was your job. 8ca has only that personal karma The day ruled by 8ca is Tuesday, and it's most common for 8ca to get angry and lash out at someone on that very day. 8ca is not tasked with doing anything to anyone at a specific time or on a specific day Her only concern is to be careful not to show aggression, anger, and rage. If she does that, 8ca loses on all fronts. First friends, then partners, and as a third item, finances and everything else.", "9": "Nines were people whose emotions ran wild in a past life The 9 has cried the most out of all the numbersHer only thing is to be careful not to show aggression, anger, and rageIf she does that, the 8ca loses on all fronts. Primarily friends, then partners, and as a third item, finances and everything else9's KARMA:9s were people whose emotions ran wild in a past life. A good part of her past life, the 9 spent in the company of A good part of her past life, the 9 spent in the company of refugees, suffering people, the sick Now, the 9 is cautious Now she rarely cries The 9 now observes, and that's because the 9 is the law of karma, the conclusion. When she is next to a number, she speaks of the end of that number's karmic debt. She has her own way of behaving in life, but her thought and mission is to sort out the number next to her. 9k3 – repayment of karma related to the 3, 9k6 – repayment of karma related to the 6, ... The 9 indicates that in this life, at this moment, that cycle related to the number next to it is ending, and that this karmic burden will not be, nor can it be, carried over into the next incarnation. That's why 9 has such heavy karmic burdens – because it signals the end The 9 is a number that is still betrayed many times by other people today, but now much, much less than in the past life, because in this life it is the total opposite of what it was before. The 9 is now an observer and is only seemingly cold, but in reality, we're talking about the most emotional number ever It can be said that this karmic influence has given the 9 a certain degree of caution, which they feel on that karmic level, and that is probably the reason why they don't fully open up to people, but instead remain mystical and, in a way, unfinished and unfathomable. That's excellent for the 9. She stands on the throne of all numbers and, from that position, seems to be saying that one should be cautious and not rush into things. Earlier, in a past life, the 9 made a mistake and revealed some important information that they were supposed to keep to themselves. It just slipped out, and it came back to bite them, which is a rare occurrence for them (it happens in about 10% of cases). They have now come to finish their karma, to put an end to it, and to ensure there are no more reincarnations of that karmic part in the next life. That's why we say that a 9 has passed the game. Many 9s, as they grow up and mature, if they get betrayed by a friend, they don't suffer much; it's as if they breathe a sigh of relief and know that this was how it was supposed to happen, that some karma is ending with it. The Life Path Number is our first karmic challenge. A Life Path 1 has the karma of a 1, a Life Path 2 has the karma of a 2, and so on... A square is the second karmic affliction, but it is quite difficult because squares are the aspects we suffer from the most. No one has only one karmic burden. Two for sure, and some have more. The personal number is linked to karma, and that personal number is merged with codes and you see from whom it is, why, why,... ADDITIONAL NUMBERS, RUSSIAN KARMIC MATRICES AND INCARNATIONS ADDITIONAL KARMA NUMBERS: The first additional number is obtained by adding all the numbers from the birth date, but without reducing them to a single digit. Once this number is obtained, it is written below the date: 07/15/1973 = 33 33 The second additional number is obtained by adding the digits of the first additional number. If the result is a two-digit number, it is not reduced to a single digit. When this number is obtained, it is written below the date of birth, immediately next to the first additional number: 07/15/1973. 3+3=6 33 6 The third supplementary number is obtained by subtracting the product of the first number from the date (0 is not counted) multiplied by 2 from the first supplementary number. When this number is obtained, and if it is two digits, it is not reduced to a single digit and is signed below the date, next to the second supplementary number: July 15, 1973. 33 – (1x2) = 33 – 3 = 31 33 6 31 The fourth supplementary number is obtained by adding the digits of the third supplementary number. When this number is obtained and is two digits, it is not reduced to a single digit and is signed below the date, next to the third supplementary number: July 15, 1973. 3+1 = 4 33 6 31 4 INTERPRETATION OF THE ADDITIONAL KARMA NUMBERS: When a 6ca is found on the second or fourth additional number, this indicates family/generational karma. The presence of family karma means that it is attached to another member of our family. This karma is created and indicates that at the beginning, while the mother was in the early months of pregnancy, that child was not wanted by someone. This can be the parents or the child's grandparents. This karma has nothing to do with whether the child was later loved and accepted by family members, or even by the person or persons who were against the pregnancy. This karmic burden is reflected later, creating trials in that person's emotional and family life. It creates real problems, like when we observe the influence of the number 4 according to Pythagoras. It's a constant obstacle that they face for most of their lives. ADDITIONAL KARMA NUMBERS THAT SHOW A PERSON HAS KARMA FROM BOTH PARENTS: 29 11 / 19 10 / 28 10 / 38 11 / 39 12 / 37 10. 29 11 – The strongest and rarest karma. This combination is like having master numbers 22 and 33. The first is the karma of both parents, and Pythagorean numerology shows from which parent that karma is greater. For 29/11, as with 19/10, this indicates that these children, even from a young age, had the attitude and mindset that they did not want to be like their parents. They disliked something about their parents' behavior and attitudes. 29 11 speaks of individuals whose desire is to help other people in life more than themselves. Here we are talking about natural-born psychologists, even natural-born esotericists. They must find themselves in the sphere of esoteric studies, and so they will. In any case, whether they have studied or not, the path to esotericism will open up for them. This is their destiny. It is important for them to stay on this path, but they must choose only one direction in esotericism for themselves. Once they do so, they must develop to the fullest in that direction, give their all, and work on themselves through that practice. After the age of 40 (around 45), for the 29 11, it happens that they develop healing hands. They start to feel heat in their hands, almost like a burning sensation, and a kind of electricity inside them, and they don't understand what's happening. For 29/11 and 19/10, in 90% of cases, especially women, they find partners who are a copy-paste of their father. 19 10 – Along with 29 11, the strongest and most serious karmic burdens of both parents. These are people who know how to climb very high on the ladder of spiritual development. To the point that they can achieve a certain amount of success and fame, and become extremely respected and esteemed. These individuals are fantastic at passing on their knowledge and experiences to others. This is, in essence, their mission in this life. They must not be selfish, but rather share the knowledge and experience they have acquired with others. In other words, in addition to their own spiritual growth, they should also venture into teaching in some branch of esotericism. It is very important with 19/10 people to see how many 1s they have. They must not have more than four 1s. Otherwise, they unconsciously drain energy from others, no matter how much they help people. After working/talking with them, people feel sick and drained. Also, if they have more than four 1cs, they know they show arrogance through their work, as well as mix business and family. 28 10 – These people, in addition to finding themselves through some form of ancient esoteric disciplines, such as numerology and astrology, should also find themselves in a creative pursuit (art, architecture, etc.). By engaging in such work, their karma is reduced and neutralized. These people have the best chance if they find themselves by the age of 28. That is the deadline for them to realize all their spiritual, esoteric, and creative potentials. They don't have to pursue them professionally, but it is important that they become familiar with these disciplines. It is also important for them to figure out what they want from life and what they want to do. If they don't find themselves by the age of 28, and there are many who haven't by then, they wander from job to job, from topic to topic, from school to school, entering a whirlwind and a labyrinth from which they find it difficult to escape. Also, if they don't find themselves in time, they can unconsciously and inappropriately approach their clients. Women with a 28-10 combination absolutely must have a career. They must remain professionally active. Under no circumstances should they give themselves over to the life of a housewife, because that is when their married and family life begins to suffer, and their karma is stifled in that area. 38 11 – This is a combination where the biggest problem is that they know they are living a life that is not their own. This means they are living the path in life that their parents have imposed on them. The life my dad chose for me, the school my mom thinks is good for me, but I don't like it, so I don't study, I get bad grades, and I want to repeat the year. My parents meddle in my work, in my emotional life, and I live mechanically, programmed. I'm alive, but it's as if I'm not living my own desires. These people then lose their compass in life, and for them, this karmic influence from their parents hits the hardest in this way. Unconscious of their numbers, they allow their parents to create their lives, to direct them. This is how they end up living their parents' lives, not their own. 39 12 – These are people who were at the very bottom, but managed to reach the very top. 39 12 has fallen a million times and gotten up a million and one times. They are destined to be successful, even popular, and to leave a mark on generations to come. This mark is left mostly through creativity or by teaching others. There is no third option. They fulfill themselves through creative work of every kind (including art) and by lecturing in psychology or esoteric disciplines. In this way, they gradually pay off their karmic debt. These are people who love to learn and spend a lot of money on education and training. Over time, they are also capable of creating new training courses, methods, and programs. 37 10 – This is a combination where the karmic issues of both parents are the least prominent. Of course, karma is present here as well, but it can be said that here, too, it is the 3-7 aspect that relates to fortunate circumstances. These fortunate circumstances favor these people in the form of the least karmic burden, which manifests as them seeing and recognizing their parents in themselves, in their parenting, behavior, and attitude toward their own children. This, of course, is not good. They are an example of someone who must change this about themselves. People 37 10 are people of incredible intuition, and it is their strongest weapon in life. The fortunate circumstances that happen to them are that they somehow always find themselves in the right place at the right time. They always manage to get out of trouble, even if it's major, to solve things at the last minute, to have the pieces fall into place to get a job done,... Their flaw is that they compare themselves to others, which they absolutely must not do. For this combination, the key to success is family. If they don't find fulfillment in family life and as parents, all that intuition and all those lucky breaks are worthless to them. All their predestination to grow on that spiritual and esoteric ladder is then useless to them. These are people who, without a family and a family environment, are empty, and many doors in life are then closed to them. As the additional numbers go from the weakest to the strongest, so does the child's anger toward their parents become stronger. It gets to the point where the anger never subsides. When the surplus number is in the second, third, or fourth position, it has less of an effect and partially influences the person in question with its meaning. The children may have been abandoned; they witnessed bad scenes in their parents' family life, alcoholism,... When we say 'karmic burden,' it doesn't mean someone is petting me and I'm having a good time. MATRICES: July 15, 1973. 33 6 31 4 Diagonal 1,5,9 – The Spiritual Diagonal Diagonal 2,5,8 – The Family Diagonal Diagonal 3,5,7 – The Diagonal of Sex and Intimate Life INKARNATIONS (Soul Age) The 9th, 10th, and 11th incarnations belong to the category of young souls. These are the souls of the new age. The 9th incarnation is very rare. The 10th and 11th can be encountered more often. In this group of young souls, the karmic demand for the repayment of their karmic debts is considered the lowest. This doesn't mean they have no karmic burdens, but what karma demands of them is negligible, and the tests they face are the most trivial and easiest compared to those of older incarnations. Of course, if you ask them, they will complain, because everyone's own suffering is the hardest, but they can never compare to people from other incarnations. For example, a person born on 09/14 who is a 9th incarnation and a person born on 09/14 who is a 14th or 15th incarnation cannot be compared in terms of the severity of their karmic burdens. The person who is a 9th incarnation would fare better; their life would be easier. If you are a 9th, 10th, or 11th incarnation and you still live by moral standards, your life is very beautiful. Their belonging to the new age and to the new souls speaks to the fact that they know they behave in a youthful way for a good part of their lives and that they have a somewhat restless, dynamic nature. We'll even have some who behave very childishly, to the point where we can conclude that there isn't much excessive spiritual maturity here. Their perception of spirituality will probably be in a specific way; they might not even be interested in it. There isn't any deep spiritual maturity here. They might think that's how it's supposed to be, that it's right and the best way. 12th and 13th incarnations are people of average age of incarnation. This means that the majority of souls incarnated on the planet today are 12th and 13th incarnations. 70-80% of people are 12th or 13th incarnations, 10-15% are 9th, 10th, or 11th, and 10-15% are 14th and 15th incarnations. If we compare the 12th and 13th, it's logical that people who are in their 13th incarnation have already passed the tests of the 12th and are, therefore, in a slightly easier position. In any case, the 12th and 13th incarnations are the toughest tests and have the greatest karmic demands. Karma beats them throughout their entire life. The demand of karma means that the tests to be passed here will be the greatest. These souls are 'middle-aged' souls. The test for these souls is the test of the material world. Today, 70-80% of the world strives for materialism and rushes to satisfy those urges. Of course, 80% of the world's population isn't a materialist, but the vast majority has, unconsciously, subordinated their lives to earning a living, their careers, jobs, money, and other material things. As a result, other spheres of life have been unconsciously neglected because they are subordinated to this 300-mph rat race. This test of the material world is passed in the most difficult way possible for these incarnations, but it is also closely linked to another test that the 12th and 13th incarnations must pass, which is the test of poverty. This test does not mean that the 12th/13th incarnation should be without money, or that the person must be poor on a material level, but rather it pertains to subordinating oneself to that material acquisition, so that the other spheres remain 'poor'. In a way, this can be understood as a kind of commercialization of one's own life, so the test of poverty here is actually a test of spirituality. The 12th and 13th incarnations have the task of understanding and distinguishing spirituality from religion. This means that here, unlike in the 9th, 10th, and 11th incarnations, spirituality will not be at a low level, nor will I be uninterested in it or detached from it. The 12th and 13th are a different category altogether, and here spirituality is already perceived, but because of these two tests that merge and need to be passed, we end up misunderstanding and approaching spirituality in the wrong way, and the 12th and 13th lack faith in what spirituality truly is. Very often, we already equate spirituality with religion, customs, the church as an institution, monasteries as buildings, and the spiritual with the customs and rituals prescribed by the church. For 70% of people of the 12th and 13th incarnations, that is what spirituality is. This narrow perception and equating is, in fact, the greatest test here. That's why many people in the 12th and 13th incarnations will feel like they are living mechanically, that certain things are imposed on them, that things are being done just because they have to be done. In fact, that sense of being imposed is actually there as part of karma. The 14th and 15th incarnations are the ones where things are brought to a close. At that point, the person has nowhere to go. The tests of the 12th and 13th incarnations should have already been passed. The time is past when you could mess around, when karma forgave all sorts of things in the 9th, 10th, or 11th. You were supposed to have passed all the tests of the 12th and 13th and to have understood where you went wrong and what mistakes you were making. Now there is no room for error, or rather, there must not be. Here we're talking about seriously old souls, where both Russian and Indian numerology believe these incarnations are on the right path to spinning th , the so-called wheel of samsara (a guarantee for eternity). This is where we come to the conclusion that there is no more rebirth and death. The question arises whether that eternity is for good or for bad. 90% of those in the 14th and 15th incarnations successfully understand many things during their lifetime and guarantee themselves a good eternity. However, there will also be that 10% who don't understand and who are capable of making cardinal mistakes. In any case, the 14th and 15th incarnations are given the greatest opportunities, the greatest potentials. These greatest opportunities are for spiritual development. If anyone has the chance to grow spiritually, to turn toward psychology, esotericism, spirituality at the highest level, those are the 14th and 15th incarnations. The opportunity given to them brings with it a huge responsibility. This responsibility means they must use their potential wisely, and not frivolously squander it all at once and without meaning. Unlike the youngest incarnations, the 14th and 15th incarnations have that wise quality, and they even act like adults their entire lives. They know they have different attitudes than other people. What can pull them in is senselessly spending those potentials on other people. They must not do that at all. That is the greatest trap of the 14th and 15th incarnation – to enter that labyrinth of senselessly spending the potentials they have been given, senselessly spending potentials on people who will not understand them, and senselessly wasting energy. Why is this mentioned here? Because you can't expect to get to the end and have to explain yourself to people who don't understand you. That must not happen, because by doing so, a person automatically descends to lower levels and to a level below themselves. The test of the 14th and 15th incarnation is a test of pride/arrogance. This is not about pride in the sense of a 1ce's pride, where one's nose is in the air because of it. Here, pride refers to the fact that the 14th and 15th incarnations must understand the other incarnations that are on a lower level, accept them as they are, not lecture them, and not get angry with them. Even though they are on a higher level, they must not let it bother them. Furthermore, we are talking about people who bear a great responsibility, not only for themselves but also toward others, because their actions can trap them and then the karmic demand for debts becomes incredibly strong, hitting you in every area of your life. The people they are responsible for are those in their family, but also everyone in their surroundings. An old soul bears the greatest responsibility for unleashing its potential in the realm of spirituality, esotericism, and psychology. This means that an old soul helps others, and its mission is to be there for them as well. If she honors this, helps others in the right way, properly uses the potential she has been given, and passes the test of pride—meaning she has no pride and doesn't allow others to trap her—then the greatest happiness that one incarnation can offer is experienced. What reward the universe will grant them is the universe's business, but the reward of karma will certainly come in that case. These people have also passed the test of poverty and the test of the material world, and here, very often, we have people you cannot buy with material things, or rather, with money. Secondly, for them, spirituality is not a matter of religion. As they grow and mature throughout their lives, they won't go to church, they won't perform rituals that are a product of fear, and people will look at them in wonder or argue with them. They understand that religion is man-made, while spirituality is God-given. Therefore, the 14th and 15th incarnations, in addition to the tests they must pass, also have to learn to listen to themselves and their intuition and to never succumb to the opinions of others, which is constantly set up as a trap for them throughout their lives. The 14th and 15th incarnation has the power and ability to perfectly control the flow of their thoughts whenever they choose, so they can attract both the best and the worst things. They just need to concentrate to the fullest. An essential point for these incarnations is to engage in esotericism. They need to work on themselves and with others. The advice for the 14th and 15th incarnation is that, if possible, they should not eat meat or should reduce it to a minimum."}, "ESS": {"0": "the deep well — old lessons, instinct, and a perspective most people lack", "1": "will and leadership — a need to feel free rather than commanded", "2": "feeling and instinct — sensing a room before a word is said", "3": "expression — made to talk, create, and lift the mood", "4": "the builder — a craving for stability, able to hold a life together", "5": "freedom and the senses — magnetic, restless, many-sided", "6": "love and responsibility — relationships are the point, though the grip can be too tight", "7": "the mind — a seeker whose gift is depth and whose wound is overthinking", "8": "quiet power — calm for a long time, then it moves with real force", "9": "the old soul — vision and compassion, dreaming further than they admit"}};</script>
<script>

function pyramid(d,m,y){var base=(String(d).padStart(2,'0')+String(m).padStart(2,'0')+String(y)).split('').map(Number);var rows=[base],cur=base;while(cur.length>1){var nx=[];for(var i=0;i<cur.length-1;i++)nx.push(r(cur[i]+cur[i+1]));rows.push(nx);cur=nx;}var two=rows.find(x=>x.length===2);return{first:two?two[0]:cur[0],second:two?two[1]:cur[0],third:rows[rows.length-1][0]};}
