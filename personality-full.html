<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Personality Code — Occultics</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Montserrat',sans-serif;background:#f5f0e8;color:#15171f;-webkit-font-smoothing:antialiased;line-height:1.75}
.wrap{max-width:760px;margin:0 auto;padding:24px 20px 80px}
.hero{background:#0a0e2e;color:#fff;border-radius:16px;padding:40px 32px;text-align:center;margin-bottom:8px}
.wm{font-family:'Cormorant Garamond',serif;font-size:13px;letter-spacing:6px;text-transform:uppercase;color:#4db8ff;margin-bottom:16px}
.htitle{font-family:'Cormorant Garamond',serif;font-weight:400;font-size:clamp(30px,7vw,44px);line-height:1.05;margin-bottom:8px}
.htitle em{font-style:italic;color:#4db8ff}
.hsub{font-size:11px;color:#aab3d6;letter-spacing:1px;margin-bottom:22px}
.triad{font-family:'Cormorant Garamond',serif;font-size:clamp(40px,11vw,62px);letter-spacing:.12em;color:#4db8ff;line-height:1}
.pyr{font-size:13px;color:#aab3d6;letter-spacing:2px;margin-top:10px}
.pyr b{color:#fff;font-weight:500}
.name{font-size:15px;color:#fff;letter-spacing:1px;margin-top:12px}
.sess{margin-top:30px;padding-top:24px;border-top:1px solid #e0d8c8}
.se{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#1a2aff;font-weight:600;margin-bottom:4px}
.st{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:26px;color:#0a0e2e;margin-bottom:12px;line-height:1.15}
.sb p{margin-bottom:14px}
.prow{display:flex;gap:14px;align-items:flex-start;margin-bottom:12px;background:#fff;border-radius:12px;padding:14px 16px}
.prow .pn{flex:none;width:40px;height:40px;border-radius:50%;background:#0a0e2e;color:#4db8ff;font-family:'Cormorant Garamond',serif;font-size:22px;display:flex;align-items:center;justify-content:center}
.prow .pt{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:#1a2aff;font-weight:600;margin-bottom:3px}
.prow p{font-size:14px;margin:0}
.cta{background:#0a0e2e;color:#fff;border-radius:14px;padding:26px;margin-top:30px;text-align:center}
.cta .h{font-family:'Cormorant Garamond',serif;font-size:24px;color:#4db8ff;margin-bottom:8px}
.cta p{color:rgba(255,255,255,.82);font-size:14px;margin-bottom:16px}
.cta a{display:inline-block;font-size:14px;font-weight:600;color:#0a0e2e;background:#4db8ff;text-decoration:none;padding:13px 30px;border-radius:100px}
.actions{text-align:center;margin-top:34px}
.btn{display:inline-block;font-size:14px;font-weight:600;letter-spacing:.3px;color:#0a0e2e;background:#4db8ff;text-decoration:none;padding:15px 34px;border-radius:100px;border:none;cursor:pointer;font-family:'Montserrat',sans-serif}
.foot{margin-top:40px;text-align:center;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#9ca3af}
.form{max-width:520px;margin:40px auto;background:#fff;border-radius:16px;padding:28px}
.form h2{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:24px;color:#0a0e2e;margin-bottom:18px;text-align:center}
.row{display:flex;gap:12px;margin-bottom:14px}
.row input{flex:1;padding:12px 14px;border:1px solid #d8cfbf;border-radius:10px;font-family:'Montserrat',sans-serif;font-size:14px;background:#faf7f1}
.form label{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:#1a2aff;font-weight:600;display:block;margin:6px 0 4px}
.form .btn{width:100%;margin-top:10px}
.hidden{display:none}
@media print{body{background:#fff}.wrap{max-width:100%;padding:0}.actions,.form,.cta{display:none!important}.hero{background:#0a0e2e!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}.sess{page-break-inside:avoid}}</style></head><body><div class="wrap">
  <div id="form" class="form">
    <h2>Your Personality Code — free</h2>
    <label>Name</label><div class="row"><input id="nm" placeholder="Name"></div>
    <label>Date of birth</label><div class="row"><input id="bd" type="date" max="2025-12-31"></div>
    <button class="btn" onclick="fromForm()">Reveal my code &rarr;</button>
  </div>
  <div id="reading" class="hidden"></div>
  <div id="actions" class="actions hidden"><button class="btn" onclick="window.print()">&#8595; Save as PDF</button></div>
  <div class="foot">Occultics &middot; Numerology of personality</div>
</div>
<script>var KB={"BIO": {"1": ["Leader energy. {N} takes charge almost immediately, and people feel that authority before a word is spoken. There is a directness to {N} — a way of moving into a room and quietly setting its pace. People look to {N} to decide, to start, to go first, and most of the time {N} obliges, because waiting for permission has never felt natural.", "The gift of this energy is initiative: {N} begins the things other people only talk about. The cost is that it can be hard to soften, to be led, to admit need — and the people closest to {N} sometimes wish they were let in more. The work of a biorhythm 1 is to stay strong without becoming hard, and to let leading and loving live in the same body."], "2": ["Emotional, fated energy. People feel something pulling them toward {N} without quite knowing why. {N} moves through the world on instinct and feeling, reading the mood of a room before anything is said, remembering what others forget. This is a deeply sensitive nature that cares, in equal measure, about emotional fulfilment and material security — for {N}, feeling safe and feeling loved are the same need.", "The gift is attunement: {N} senses what people need before they ask, and loves with a depth that is rare. The shadow is the mood-tide — feeling everything at once, swinging between closeness and withdrawal, and going quiet instead of saying the hard thing. {N} is at their best when they name the feeling out loud rather than letting it build into silence."], "3": ["Passion and expression. With {N}, things are felt immediately — attraction, enthusiasm, warmth arrive on contact. {N} carries a creative, communicative charge: made to talk, to make, to lift the mood of whoever is nearby. Life around {N} is rarely flat; it runs warm, expressive, sometimes turbulent, but always heartfelt.", "The gift is colour — {N} brings life, words and creativity that keep things from going stale. The challenge is scatter and tone: the same expressiveness that delights can wound when it spills, and the same fire can burn out if it chases applause. {N} thrives when the energy is aimed at something made, not just performed."], "4": ["A serious, composed presence. People sense they are dealing with someone measured and self-possessed; {N} takes time before deciding, and rarely rushes. There is a steadiness here that others lean on — {N} is the one who stays calm, who builds slowly, who can hold a situation together when it matters.", "The gift is reliability: {N} builds things that last and keeps promises long after others have moved on. The shadow is rigidity — holding on too tightly to the plan, to control, to the way things should be. {N} grows by protecting the structure they build while leaving a little room for it to breathe."], "5": ["A free, communicative energy — neither fated nor karmic, but healthy and quick. {N} leads with intellect and conversation, and is wired for movement, variety and new information. People find {N} stimulating and a little unpredictable; routine and confinement are the fastest way to lose them.", "The gift is adaptability and range — {N} can talk to anyone, learn anything, and keep a connection alive through change. The shadow is restlessness: the pull to escape the moment something gets heavy. {N} flourishes when freedom is built in on purpose, so it doesn't have to be taken by leaving."], "6": ["Warm, magnetic, oriented toward love. With {N}, affection and attraction tend to arrive early and run deep; this is a nature drawn to beauty, harmony and care, and connections like this often move toward commitment. {N} makes the people around them feel held.", "The gift is devotion — {N} loves generously and makes life more beautiful for being in it. The challenge is the grip: care can tip into over-giving, control, or losing oneself in someone else's needs. {N} is healthiest when they give from fullness and let themselves be cared for in return."], "7": ["A spiritual, searching energy — the sense of a higher pull drawing things together around {N}. There is something unusual and a little unpredictable here; {N} carries a sensitive, inward quality and a mind that wants the truth beneath the surface. People feel that {N} is not quite like everyone else.", "The gift is depth and insight — {N} sees what others miss and is drawn to the real rather than the obvious. The shadow is the retreat into the head: overthinking, distance, a sensitivity that can tip into anxiety. {N} does best with chosen solitude to think, and a few trusted people to think out loud with."], "8": ["A stable, self-contained personality with real weight to it. {N} is cautious at first and needs time to open up, sizing things up before committing — but what {N} builds, {N} builds to last. Underneath the composure is genuine force; calm for a long time, and then decisive.", "The gift is endurance and power — {N} can move mountains once aligned, and protect their own fiercely. The shadow is the slow burn that finally erupts, and tying self-worth to results and control. {N} is at their strongest when the intensity is aimed at a shared goal rather than at the people nearby."], "9": ["Karmic, old-soul energy — the deepest and most demanding of the rhythms. {N} loves and lives in a way that asks much and gives much; connections around {N} tend to carry weight, history, a sense of having been here before. There is compassion in {N} that reaches wide, and a feeling of completing something.", "The gift is wisdom and big-hearted compassion — {N} understands suffering and can hold what others can't. The shadow is the weight: carrying the past into the present, giving past the point of depletion, struggling to let go. {N} grows by laying down what was never theirs to carry, and choosing the present version of the people they love."]}, "GEN": {"1": ["In the people closest to them, {N} needs intelligence and eloquence above all, and cannot tolerate narrow-mindedness. {N} is drawn to those who can think, who can hold a real conversation, who lead their own lives rather than orbiting someone else's.", "What drains {N} is dullness and smallness of mind — being managed, talked down to, or surrounded by people who won't grow. {N} is met well by a partner who is an equal, who admires without shrinking, and who has their own fire to bring."], "2": ["{N} needs emotional expression and visible care, and cannot tolerate coldness. Love, for {N}, has to be shown — in words, attention, the small daily proofs that they matter. A connection that runs on assumption rather than warmth slowly starves them.", "What wounds {N} is being unseen, dismissed, or made to feel like too much. {N} is met well by someone steady and openly affectionate, who doesn't make them guess, and who can hold their depth of feeling without flinching from it."], "3": ["{N} dreams of unconditional love and the widest possible tolerance — to be accepted fully, expressively, without having to shrink. {N} wants a partner who delights in their colour rather than trying to contain it, and who can play, talk and create alongside them.", "What drains {N} is criticism, heaviness, and being made to feel like a problem to be managed. {N} flourishes with someone warm and generous of spirit, who keeps things light when they can and forgives quickly when words land wrong."], "4": ["{N} seeks stability, shared values and honesty above everything. Trust is built slowly and means more than grand gestures; {N} wants a partner who is solid, consistent, and says what they mean. Security is not boring to {N} — it is love.", "What unsettles {N} is unpredictability, dishonesty, and pressure to open up before they're ready. {N} is met well by someone patient and dependable, who proves themselves over time and lets the bond deepen at its own pace."], "5": ["{N} loves an intelligent, communicative partner — and holds freedom sacred. The fastest way to lose {N} is to cage them; the surest way to keep them is to stay interesting. {N} wants a companion for the adventure, not a supervisor of it.", "What drains {N} is monotony, possessiveness, and being smothered. {N} flourishes with someone who has their own life and curiosity, who gives space freely, and who keeps choosing them precisely because nothing is forced."], "6": ["{N} adores beauty, harmony and refinement, and does not separate love from material comfort — a beautiful, cared-for shared life is part of how {N} feels loved. {N} gives generously and wants to build a warm home, whatever form that takes.", "What hurts {N} is neglect, ugliness, conflict, and feeling that their care goes unnoticed. {N} is met well by someone who reciprocates the devotion, notices the effort, and helps create the harmony {N} works so hard to provide."], "7": ["{N} wants intellectual depth and sincerity, and withdraws from anything shallow or dishonest. Surface talk and games exhaust them; {N} is drawn to people who think, who mean what they say, and who can sit comfortably in real conversation — or in silence.", "What closes {N} off is manipulation, superficiality, and pressure to perform. {N} flourishes with someone honest and curious who respects their need for solitude and reads their occasional retreat as restoration, not rejection."], "8": ["{N} is drawn to strength and authority, and needs a protective figure to feel safe — someone with presence who can hold weight without flinching. {N} does not want to be the strong one every hour of every day; what they crave is to be able to lean.", "What drains {N} is weakness they have to carry, and partners who waver or need mothering. {N} is met well by someone solid and capable who can meet their storms without collapsing — and whose strength earns {N}'s deep, absolute loyalty."], "9": ["{N} is the essence of empathy, and needs someone they can trust completely. Love, for {N}, is built on loyalty and sincerity; {N} gives a great deal and quietly hopes for the same depth in return. Connections often feel fated rather than chosen.", "What breaks {N} is betrayal and insincerity — and once trust is gone, the withdrawal tends to be total. {N} flourishes with someone genuine and steadfast, who honours how much {N} gives and gives the same loyalty back."]}, "LP": {"1": ["Independence and leadership define {N}'s destiny. {N} is here to stand on their own, to carve their own road, and to be recognised for what they make happen. The drive to lead is not vanity — it is the spine of the whole life, and {N} feels most alive when steering rather than following.", "The lesson is to lead without isolating — to let people in without feeling that needing them is weakness. {N}'s deepest growth comes when strength and connection stop competing, and the life they build has room for both the crown and the heart."], "2": ["{N}'s path runs through partnership and emotional depth — {N} grows through relationships, not away from them. The major lessons, gifts and turning points of this life tend to arrive through other people, through cooperation, sensitivity, and the courage to stay close.", "The lesson is to keep their own centre while loving deeply — to give without dissolving, and to value their own needs as much as everyone else's. {N} thrives when they pair their gift for connection with a steady sense of self."], "3": ["Expansion, creativity and joy run through {N}'s path. {N} is here to express, to create, to communicate and to lift — a life meant to be visible and felt, not hidden. When {N} is making and sharing, the whole life tends to open up.", "The lesson is focus over scatter, and depth over applause. The same creative fire can dissipate across too many things or chase being liked rather than being true. {N} flourishes when the gift is poured into something built, and seen for substance, not just sparkle."], "4": ["Structure, discipline and karma shape {N}'s path — for {N}, things come later, but they last. This is a life built brick by brick, where rewards are earned through patience and work rather than handed over early. What {N} builds tends to outlive the effort it took.", "The lesson is endurance without rigidity — to keep faith through the slow stretches while leaving room for change. {N}'s reward is the rare one: a life, a body of work, a foundation that genuinely holds."], "5": ["Freedom, travel and change define {N}'s path — {N} reinvents themselves more than once and is not meant to live one narrow life. Movement, variety and new experience are not distractions for {N}; they are the curriculum.", "The lesson is to channel the freedom rather than be scattered by it — to choose change from wisdom, not just from restlessness. {N} thrives when they stop resisting movement and treat it as their natural element, with enough of a centre to come home to."], "6": ["Love, family and responsibility are the heart of {N}'s path. {N} is here to care, to create harmony, and to build something warm that others can belong to — the home, the family, the circle, whatever shape it takes. Relationships are not a side-plot for {N}; they are the work.", "The lesson is to care without losing the self, and to choose who deserves that devotion. {N} flourishes when they give from fullness rather than obligation, and let themselves be held as generously as they hold."], "7": ["{N} walks the unconventional path — success comes from being different, not from fitting in. {N} is here to seek, to understand, to go deeper than the obvious, and to find their own truth even when it sets them apart. The well-trodden road rarely satisfies them.", "The lesson is to trust the difference and not retreat too far into solitude or doubt. {N} thrives when they honour the pull toward the deep and the unusual, and let a few trusted people in along the way."], "8": ["Power, achievement and material success shape {N}'s destiny. {N} is built to master the practical world — to lead, to build, to achieve at scale. Ambition is not a flaw in {N}; it is part of the design, and {N} is happiest when stretching toward something big.", "The lesson is to use the power for more than the self, and not to tie their whole worth to results. {N}'s strength grows when it serves something beyond ambition, and when winning never costs them the people who matter."], "9": ["Karma, completion and wisdom mark {N}'s path — {N} is here to finish what others could not, to give, and to close cycles. There is an old-soul quality to this life; much of what {N} experiences feels less like chance and more like resolution.", "The lesson is to give without depleting, and to let go when the work is done. {N}'s deepest freedom comes from laying down old weight — debts, patterns, what was inherited — and trusting that completion is not loss but release."]}, "GIFTS": {"1": "{N}'s gifts point toward leadership and authority — running things, owning things, standing at the front. {N} belongs in roles where someone has to decide and be accountable: heading a venture, leading a team, public life, anything where the buck stops with them.", "2": "{N}'s gifts are for the inner world of people — psychology, counselling, and the esoteric. {N} reads what others feel and works best where intuition and care matter: guiding, advising, healing, and (often later in life) the spiritual and esoteric arts.", "3": "{N}'s gifts are expressive — writing, publishing, communication, commerce and the arts. {N} belongs where words, ideas and creativity are the product: media, marketing, performance, design, anything that needs colour and a voice.", "4": "{N}'s gifts are for building what lasts — structure, craft, institutions, long-term work. {N} excels where patience, reliability and solid foundations matter: organisation, construction in the broad sense, and roles that reward endurance over flash.", "5": "{N}'s gifts are ideas, movement and communication. {N} thrives in independent, self-directed ventures, in anything that resists routine, and in work that involves variety, travel, persuasion and constant new information.", "6": "{N}'s gifts are for beauty, care and harmony — art, design, aesthetics, and the work of looking after people. {N} belongs where things are made more beautiful or more whole: the creative arts, hospitality, healing, and the home.", "7": "{N}'s gifts run toward the hidden and the deep — the occult sciences especially (tarot, astrology, numerology), research, religion and spiritual work, and the unconventional. {N} is built to decode what others can't see and to work outside the obvious path.", "8": "{N}'s gifts are for the material world of power and results — business, finance, and politics. {N} turns things into ventures and tends to rise where ambition, strategy and command are rewarded. Few numbers handle scale and stakes as naturally.", "9": "{N}'s gifts are for service and the bigger picture — helping professions, medicine, philanthropy and philosophy. {N} is built to give, to ease suffering, and to work in service of something larger than themselves."}, "ESS": {"0": "the deep well — old lessons, instinct, and a perspective most people lack", "1": "will and leadership — a need to feel free rather than commanded", "2": "feeling and instinct — sensing a room before a word is said", "3": "expression — made to talk, create, and lift the mood", "4": "the builder — a craving for stability, able to hold a life together", "5": "freedom and the senses — magnetic, restless, many-sided", "6": "love and responsibility — relationships are the point, though the grip can be too tight", "7": "the mind — a seeker whose gift is depth and whose wound is overthinking", "8": "quiet power — calm for a long time, then it moves with real force", "9": "the old soul — vision and compassion, dreaming further than they admit"}};</script>
<script>
function r(n){n=Math.abs(n);while(n>9)n=String(n).split('').reduce((s,d)=>s+(+d),0);return n;}
function codes(d,m,y){var bio=r(d+m);var gen=r(String(y).split('').reduce((s,x)=>s+(+x),0));var lp=r(bio+gen);return{bio,gen,lp};}
function pyramid(d,m,y){var base=(String(d).padStart(2,'0')+String(m).padStart(2,'0')+String(y)).split('').map(Number);var rows=[base],cur=base;while(cur.length>1){var nx=[];for(var i=0;i<cur.length-1;i++)nx.push(r(cur[i]+cur[i+1]));rows.push(nx);cur=nx;}var two=rows.find(x=>x.length===2);return{first:two?two[0]:cur[0],second:two?two[1]:cur[0],third:rows[rows.length-1][0]};}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');}
function paras(arr,name){return arr.map(function(p){return '<p>'+p.replace(/\{N\}/g,name)+'</p>';}).join('');}
function one(t,name){return t.replace(/\{N\}/g,name);}
function parseDob(s){s=(s||'').trim();var iso=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);if(iso)return{d:+iso[3],mo:+iso[2],y:+iso[1]};var m=s.match(/(\d{1,2})\D+(\d{1,2})\D+(\d{4})/);if(!m)return null;return{d:+m[1],mo:+m[2],y:+m[3]};}
function render(name,d,m,y){
  var c=codes(d,m,y),py=pyramid(d,m,y),N=esc(name);
  var h='';
  h+='<div class="hero"><div class="wm">Occultics</div><div class="htitle">The Personality <em>Code</em></div>'
   +'<div class="hsub">A numeric portrait, read from the Occultics knowledge base</div>'
   +'<div class="triad">'+c.bio+' &middot; '+c.gen+' &middot; '+c.lp+'</div>'
   +'<div class="pyr">Pyramid <b>'+py.first+' &middot; '+py.second+' &middot; '+py.third+'</b></div>'
   +'<div class="name">'+N+'</div></div>';
  h+='<div class="sess"><div class="se">First Glance</div><div class="st">Your code, '+c.bio+'&middot;'+c.gen+'&middot;'+c.lp+'</div><div class="sb"><p>Your three numbers come straight from your birth date. Your <b>biorhythm</b> ('+c.bio+') is the energy people feel from you and how you move through the world; your <b>generational</b> number ('+c.gen+') is what you need from the people closest to you; your <b>life path</b> ('+c.lp+') is the direction your life is built to take. Read together they are your Personality Code &mdash; '+c.bio+'&middot;'+c.gen+'&middot;'+c.lp+', carried through the architecture of your pyramid '+py.first+'&middot;'+py.second+'&middot;'+py.third+'.</p></div></div>';
  h+='<div class="sess"><div class="se">Biorhythm '+c.bio+'</div><div class="st">The energy you carry</div><div class="sb">'+paras(KB.BIO[c.bio],N)+'</div></div>';
  h+='<div class="sess"><div class="se">Generational '+c.gen+'</div><div class="st">What you need</div><div class="sb">'+paras(KB.GEN[c.gen],N)+'</div></div>';
  h+='<div class="sess"><div class="se">Life path '+c.lp+'</div><div class="st">Your direction</div><div class="sb">'+paras(KB.LP[c.lp],N)+'</div></div>';
  
  h+='<div class="sess"><div class="se">Your Pyramid '+py.first+'&middot;'+py.second+'&middot;'+py.third+'</div><div class="st">The architecture of your life</div><div class="sb"><p>Your pyramid reduces your whole birth date to three points &mdash; where you began, the work in the middle, and where you are heading.</p>'
   +'<div class="prow"><div class="pn">'+py.first+'</div><div><div class="pt">Where you began</div><p>You came in with '+KB.ESS[py.first]+'.</p></div></div>'
   +'<div class="prow"><div class="pn">'+py.second+'</div><div><div class="pt">The work of your life</div><p>The centre of your pyramid is '+KB.ESS[py.second]+' &mdash; the lesson you return to.</p></div></div>'
   +'<div class="prow"><div class="pn">'+py.third+'</div><div><div class="pt">Where you are heading</div><p>You are building toward '+KB.ESS[py.third]+'.</p></div></div></div></div>';
  h+='<div class="sess"><div class="se">Your Gifts &amp; Path</div><div class="st">Where your numbers point</div><div class="sb"><p>'+one(KB.GIFTS[c.lp],N)+'</p><p>Your biorhythm '+c.bio+' and generational '+c.gen+' colour this further &mdash; the way you carry yourself and what you need from others shape how these gifts actually show up in a life.</p></div></div>';
  h+='<div class="sess"><div class="se">The Complete Picture</div><div class="st">All of it, together</div><div class="sb"><p>You move through the world as a biorhythm '+c.bio+', you need a '+c.gen+'-style love, and your life is built around the '+c.lp+' path &mdash; carried from where you began ('+py.first+') through the lesson at your centre ('+py.second+') toward where you are heading ('+py.third+'). The biorhythm is how people first feel you; the generational number is the love and care you reach for; the life path is the road the whole life is bent toward. Read as one, this is your code in full.</p></div></div>';
  h+='<div class="cta"><div class="h">Now decode a connection</div><p>Your Personality Code is the start. The Compatibility Code reads two birthdays together &mdash; how you met, what you build, and whether it lasts.</p><a href="/compatibility.html">Reveal a Compatibility Code &rarr;</a></div>';
  document.getElementById('reading').innerHTML=h;
  document.getElementById('reading').classList.remove('hidden');
  document.getElementById('actions').classList.remove('hidden');
  document.getElementById('form').classList.add('hidden');
}
function fromForm(){var name=document.getElementById('nm').value||'You';var b=parseDob(document.getElementById('bd').value);if(!b){alert('Please enter your birthday');return;}render(name,b.d,b.mo,b.y);}
(function(){var p=new URLSearchParams(location.search);if(p.get('d')&&p.get('m')&&p.get('y')){render(p.get('n')||'You',+p.get('d'),+p.get('m'),+p.get('y'));}})();
</script>
</body></html>
