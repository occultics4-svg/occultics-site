<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Personality Code — Occultics</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Montserrat',sans-serif;background:#f5f0e8;color:#15171f;-webkit-font-smoothing:antialiased;line-height:1.78}
.wrap{max-width:760px;margin:0 auto;padding:24px 20px 80px}
.hero{background:#0a0e2e;color:#fff;border-radius:16px;padding:40px 32px;text-align:center;margin-bottom:8px}
.wm{font-family:'Cormorant Garamond',serif;font-size:13px;letter-spacing:6px;text-transform:uppercase;color:#4db8ff;margin-bottom:16px}
.htitle{font-family:'Cormorant Garamond',serif;font-weight:400;font-size:clamp(30px,7vw,44px);line-height:1.05;margin-bottom:8px}
.htitle em{font-style:italic;color:#4db8ff}
.hsub{font-size:11px;color:#aab3d6;letter-spacing:1px;margin-bottom:22px}
.triad{font-family:'Cormorant Garamond',serif;font-size:clamp(40px,11vw,62px);letter-spacing:.12em;color:#4db8ff;line-height:1}
.pyr{font-size:13px;color:#aab3d6;letter-spacing:2px;margin-top:10px}
.pyr b{color:#fff;font-weight:500}
.name{font-size:15px;color:#fff;letter-spacing:1px;margin-top:12px}
.sess{margin-top:30px;padding-top:24px;border-top:1px solid #e0d8c8}
.se{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#1a2aff;font-weight:600;margin-bottom:4px}
.st{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:26px;color:#0a0e2e;margin-bottom:12px;line-height:1.15}
.sb p{margin-bottom:14px}
.spin{width:26px;height:26px;border:2px solid #e0d8c8;border-top-color:#1a2aff;border-radius:50%;animation:spin .8s linear infinite;margin:6px 0}
@keyframes spin{to{transform:rotate(360deg)}}
.actions{text-align:center;margin-top:34px}
.btn{display:inline-block;font-size:14px;font-weight:600;letter-spacing:.3px;color:#0a0e2e;background:#4db8ff;text-decoration:none;padding:15px 34px;border-radius:100px;border:none;cursor:pointer;font-family:'Montserrat',sans-serif}
.cta{background:#0a0e2e;color:#fff;border-radius:14px;padding:26px;margin-top:30px;text-align:center}
.cta .h{font-family:'Cormorant Garamond',serif;font-size:22px;color:#4db8ff;margin-bottom:8px}
.cta p{color:rgba(255,255,255,.82);font-size:14px;margin-bottom:16px}
.cta a{display:inline-block;font-size:14px;font-weight:600;color:#0a0e2e;background:#4db8ff;text-decoration:none;padding:13px 30px;border-radius:100px}
.foot{margin-top:40px;text-align:center;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#9ca3af}
.form{max-width:520px;margin:40px auto;background:#fff;border-radius:16px;padding:28px}
.form h2{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:24px;color:#0a0e2e;margin-bottom:18px;text-align:center}
.row{display:flex;gap:12px;margin-bottom:14px}
.row input{flex:1;padding:12px 14px;border:1px solid #d8cfbf;border-radius:10px;font-family:'Montserrat',sans-serif;font-size:14px;background:#faf7f1}
.form label{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:#1a2aff;font-weight:600;display:block;margin:6px 0 4px}
.form .btn{width:100%;margin-top:10px}
.hidden{display:none}
@media print{body{background:#fff}.wrap{max-width:100%;padding:0}.actions,.form,.cta{display:none!important}.hero{background:#0a0e2e!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}.sess{page-break-inside:avoid}}
</style></head>
<body><div class="wrap">
  <div id="form" class="form">
    <h2>Your Personality Code — free</h2>
    <label>Name</label><div class="row"><input id="nm" placeholder="Name"></div>
    <label>Date of birth</label><div class="row"><input id="bd" type="date" max="2025-12-31"></div>
    <button class="btn" id="gobtn" onclick="start()">Reveal my code &rarr;</button>
  </div>
  <div id="reading" class="hidden"></div>
  <div id="actions" class="actions hidden"><button class="btn" onclick="window.print()">&#8595; Save as PDF</button></div>
  <div class="foot">Occultics &middot; Numerology of personality</div>
</div>
<script>
var DECODE_URL='https://occultics-decode.occultics4.workers.dev';
// ---- Life Code Alignment formula: the exact 7 session prompts (copied from alignment.html) ----
var TITLES=['Your Mathematical Blueprint','Your Emotional Frequency','Your Core Drivers','Your Relationship Patterns','Your Karmic Blueprint','Where You Are Right Now','Your Alignment'];
var SESSION_PROMPTS=[
 "Based on {name}'s date of birth, their code is {code} and pyramid is {pyr}. Using the knowledge base, give a complete mathematical blueprint. Explain what each number means for this specific person - biorhythm {bio}, generational {gen}, life path {lp}. Birth day description: {dayDesc}. Reference the degree, the step, and what the pyramid reveals. Be specific to their numbers. Use their name. Respond in English only.",
 "Based on {name}'s biorhythm number {bio} and generational number {gen}, explain their emotional frequency. How do they process feelings? What triggers them? How do they express love and pain? Use the knowledge base descriptions for these specific numbers. Be direct and personal. Use their name.",
 "Based on {name}'s life path {lp} and pyramid {pyr}, explain what fundamentally drives them. What careers fit their code according to the PROFESIJE data? What are they built for? What should they avoid? Reference their specific degree and step. Use their name.",
 "Based on {name}'s code {code}, explain their relationship patterns. What does their biorhythm {bio} attract? What does their generational {gen} truly need in a partner? What patterns repeat? Use the compatibility knowledge and birth day description: {dayDesc}. Use their name.",
 "Based on {name}'s pyramid code {pyr} and life path {lp}, explain their karmic blueprint from the KARMICKA NUMEROLOGIJA knowledge. What karmic debts do they carry? What inherited patterns from family? What do they need to release? Be specific to their numbers.",
 "Based on {name}'s date of birth {dob}, calculate their personal year for 2026 using the CIKLUSI ZIVOTA knowledge. Where are they in their life cycle? What does this period demand? What opportunities are present? What should they watch for? Be specific.",
 "Bring everything together for {name} with code {code} and pyramid {pyr}. Synthesize their identity, emotions, drivers, relationships, karma, and current cycle into one powerful alignment statement. Tell them who they are and what they are built for. End with something they will remember. Do not ask questions."
];
var profile=null,userName='You';
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');}
function parseDob(s){s=(s||'').trim();var iso=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);if(iso)return{d:+iso[3],m:+iso[2],y:+iso[1]};var m=s.match(/(\d{1,2})\D+(\d{1,2})\D+(\d{4})/);if(!m)return null;return{d:+m[1],m:+m[2],y:+m[3]};}

async function start(){
  var b=parseDob(document.getElementById('bd').value);
  userName=document.getElementById('nm').value.trim()||'You';
  if(!b){alert('Please enter your birthday');return;}
  var btn=document.getElementById('gobtn');btn.textContent='Calculating your code...';btn.disabled=true;
  try{
    var res=await fetch(DECODE_URL+'/decode',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({day:b.d,month:b.m,year:b.y})});
    profile=await res.json();
  }catch(e){btn.textContent='Reveal my code →';btn.disabled=false;alert('Could not reach the engine. Please try again.');return;}
  renderShell(b);
  for(var s=0;s<7;s++) generateSession(s,b);
}

function renderShell(b){
  var h='<div class="hero"><div class="wm">Occultics</div><div class="htitle">The Personality <em>Code</em></div>'
   +'<div class="hsub">Your Life Code Alignment, read from your date of birth</div>'
   +'<div class="triad">'+profile.pyth.biorhythm+' &middot; '+profile.pyth.generational+' &middot; '+profile.pyth.lifePath+'</div>'
   +'<div class="pyr">Pyramid <b>'+profile.pyramid.first+' &middot; '+profile.pyramid.second+' &middot; '+profile.pyramid.third+'</b></div>'
   +'<div class="name">'+esc(userName)+'</div></div>';
  for(var i=0;i<7;i++){
    h+='<div class="sess"><div class="se">Step '+(i+1)+' of 7</div><div class="st">'+TITLES[i]+'</div>'
      +'<div class="sb" id="sb-'+i+'"><div class="spin"></div></div></div>';
  }
  h+='<div class="cta"><div class="h">Now decode a connection</div><p>Read two birthdays together &mdash; how you met, what you build, and whether it lasts.</p><a href="/compatibility.html">Reveal a Compatibility Code &rarr;</a></div>';
  document.getElementById('reading').innerHTML=h;
  document.getElementById('reading').classList.remove('hidden');
  document.getElementById('form').classList.add('hidden');
  document.getElementById('actions').classList.remove('hidden');
}

async function generateSession(idx,b){
  var code=profile.pyth.biorhythm+'.'+profile.pyth.generational+'.'+profile.pyth.lifePath;
  var pyr=profile.pyramid.first+'.'+profile.pyramid.second+'.'+profile.pyramid.third;
  var dob=b.d+'.'+b.m+'.'+b.y;
  var prompt=SESSION_PROMPTS[idx]
    .replace(/\{name\}/g,userName).replace(/\{code\}/g,code).replace(/\{pyr\}/g,pyr)
    .replace(/\{bio\}/g,String(profile.pyth.biorhythm)).replace(/\{gen\}/g,String(profile.pyth.generational))
    .replace(/\{lp\}/g,String(profile.pyth.lifePath)).replace(/\{dob\}/g,dob)
    .replace(/\{dayDesc\}/g,profile.birthDayDesc||'');
  try{
    var res=await fetch(DECODE_URL+'/ask',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({question:prompt,profileData:profile,partnerData:null,compatibilityData:null,history:[],gender:'other'})});
    var data=await res.json();
    var text=data.response||data.error||'This section could not be generated.';
    var html=text.split('\n\n').filter(function(p){return p.trim();}).map(function(p){return '<p>'+esc(p.trim())+'</p>';}).join('');
    document.getElementById('sb-'+idx).innerHTML=html;
  }catch(e){
    document.getElementById('sb-'+idx).innerHTML='<p>This section could not be generated. Please try again.</p>';
  }
}
(function(){var p=new URLSearchParams(location.search);if(p.get('d')&&p.get('m')&&p.get('y')){document.getElementById('nm').value=p.get('n')||'';document.getElementById('bd').value=p.get('y')+'-'+String(p.get('m')).padStart(2,'0')+'-'+String(p.get('d')).padStart(2,'0');start();}})();
</script>
</body></html>
