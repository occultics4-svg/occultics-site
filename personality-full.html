<script>const KB = {"TRIADS": {"112": "The opposition of 12 shows an eternal conflict between the masculine and feminine principles, an eternal conflict between a man and a woman. This conflict arises because the relationship is based on a goal, on a healthy foundation, but not on love, emotion, passion, or some other quality that would sustain the relationship in the future. Furthermore, the aspects in conjunction, 11 and 12, show that the individuals are very self-absorbed, each minding their own business, while putting little into the relationship with each other in terms of its survival. 1-2, which is in opposition, indicates that one of these two people will eventually leave home. There, even the vertical line can hardly help. In fact, the vertical can influence and help bring these two people together and let that emotion (2) happen, but the course of the relationship and the outlook will say, 'This is their expiration date, and there's nothing more to it,' like a business marriage. Maybe they even ask themselves why they were in that relationship. Especially when they meet someone they love with all their heart.", "123": "Here, the goal is strong. It is anchored in the destiny that brought us together, in the emotion that connected us. Here, there is already the initial assumption that these two people love each other very much. The 1-3 aspect, which is in opposition (like when it's in a woman's date, or found through her year), indicates meeting the person I will marry, get engaged to, or have something serious with. If this exists in opposition, then it means that this 2nd house goal shows the same thing that destiny shows, meaning that fate has brought us together because we are fated to be with each other and that, very likely, we will also get married with such an aspect. This relationship begins fatedly and from an emotion, and that doesn't disappear over time. That's why the 3 is at the end. That 3 says that this relationship eventually grows into passion and love. So, we love each other, we were drawn to each other. However, we can't say that this relationship is a calm one. That 3 says that too. The vertical axis also likely produces people whose character and behavior make the relationship passionate and explosive. This synastry leads to marriage, and if th is a good vertical axis, that marriage lasts a lifetime. A 1-3 opposition means he meets the one/she meets the one.", "134": "In 80% of cases, a synastry with a 4 guarantees a quality, long marriage. It will bring karmic burdens, but in synastry, it is the highest quality. Here, the goal is passion, love, attraction, and all of that brought these partners together. The very beginning of entering this relationship was like that. Meaning, they entered the relationship because they love each other, without any calculations. The 3rd doesn't calculate. This 4th house ultimately indicates a very high-quality karmic connection (there are two benefics in it). Over time, they will learn to take it easy a bit, which isn't such a bad thing, because they don't need to be fighting their whole lives. Over time, they learn to control and restrain that passion, but the passion doesn't disappear; it's still there. You just learn to rein it in, which is the very wisdom, tolerance, and compromise that this synastry provides. An opposition, 1-4, indicates that the beginning guarantees quality, or rather durability. This synastry ends in a relationship/marriage, and it can only fall apart if the 4 is derived from the 49 verticals, because those are two different worlds that, by their very behavior, undermine that goal (the 4 and the 9 are not compatible).", "145": "The goal is karma, and that is the strongest possible goal that can exist. There is a serious karmic connection between the partners here. The fact that it is karmic, in itself, leads to problems. A karmic connection cannot be avoided. This immediately, in the very same moment, demands formalization, a verdict, it demands that these two people get married. 90% of people with this synastry get married. There are many whose vertical axis is good, so they stay married for the rest of their lives. However, only in the beginning do they feel the weight of karma on their shoulders, and this burden lasts for a minimum of 8 years, because the 4 is linked to the 8. This means the karma hits the hardest during the first 8 years. Here, the 5th house is at the end, but there isn't much interference from the outside. This is because the 1st house is across from it. If there is interference, it's peripheral and not that significant. In this synastry, the biggest karmic difficulties are brought by the children. There are problems with the children here. The synastry represents the union of the mother and father, and they are dealing with this problem together, because the children have issues with their health and behavior, and they, as parents, are watching. The most alarming problem here is having children. This 5th house in the purpose also indicates a need for freedom, but that need isn't that great, because this 4th house in front of it holds back that abnormal need for freedom. This means the partners give the necessary space for freedom, so that there is also a private part of life, their own time. The 1-5 opposition indicates that this giving of respect, this giving of freedom, space, and privacy, doesn't threaten anyone; there are no arguments or abandonments. This means the freedom is present just enough.", "156": "The opposition is our mutual relationship. The very beginning is based on a casual start. The relationship began casually, through some flirting, without knowing that, after some time, love would blossom and that these two would fall in love and probably get married. Given that the goal is 5ca, children will most likely be born here as well. The opposition is 1-6, an aspect that represents 'rose-colored glasses.' They indicate that we don't want to see certain things in the relationship, even though deep down we are aware that these circumstances exist. Here, the eyes are closed to infidelity. This is because of the 5-6 aspect, which is in a second conjunction. This means that, over time, a betrayal will occur. But, if there is a 1-6 opposition, meaning we turn a blind eye, this indicates that the two of them will not separate. Here, for the most part, it's the children who keep these people together, as well as the love that has grown. In most cases, a 5th house Cancer gives this relationship an unconventional nature, which can be incomprehensible to other people who are stereotypical or some kind of 4s. Here, the need for freedom is quite strong.", "167": "Two aspects, 16 and 67. The goal is marriage, love, and strong family karma. It is very possible to fall in love and enter a relationship. They will very likely also consider marriage. However, this 1-7 opposition guarantees instability. At the beginning, it's 1-6, rose-colored glasses. So, they started the relationship, they're wearing rose-colored glasses, they've fallen in love and don't want to see the bad parts of the relationship. Here, at the beginning, there are rose-colored glasses, which continue into the 6-7 aspect, indicating that the love is not of the true kind, or in the true sense of the word. They're under the impression that they're in love because they're looking through rose-colored glasses. People who have been in a relationship or marriage for a few months or years with this synastry will say that's not true, that they really love each other. Unfortunately, when the 6-7 aspect kicks in—which is the illusion of loving someone, when in reality we've outgrown them—and they have 1-7 in opposition, which constantly seeks surprises and doesn't like to be smothered, problems arise. So, at the very beginning, they fall in love, they're attracted to e , someone is beautiful, attractive, charismatic to the other, but those rose-colored glasses cost them dearly, because as soon as that 6-7 takes over, it leads to the end of the relationship, which, at the very least, ends very turbulently and very abruptly. Even the divorces that end with the 6-7 aspect end abruptly, suddenly, very stressfully, and very turbulently. That's why it's not surprising that with the opposition, the very beginning, from both sides, is a sure guarantee of instability; they're just not ready to see it at the start. 167 can't. It can for a while, but it can't last forever.", "178": "The goal is spirituality, and that is a very strong force that pulls you together. However, the opposition of 1-8 leads to constant poking, constant prodding, constant provocation. This is eternal, because the synastry itself is unchangeable. In fact, it's this poking and prodding that creates the storm seen through the 1-7 aspect, which feeds into the 7-8, but also through the personal 8th house, which is plagued by constant arguments and reconciliations. All this arguing and making up can be very exhausting and difficult, and it can even lead to aggression, especially if the vertical axis also points to it. In that case, people with a 0 and pathological numbers are not advised to enter into such a relationship at all, as it can end tragically. On the other hand, the 8th house, besides reconciliations and breakups, also represents the symbol of finances in synastry. When we distinguish the principles – 1, 7, 8 – they are all masculine principles. There are no feminine principles here. Therefore, the man is dominant here. However, it can happen that a woman is also a carrier of masculine principles, so the primary numbers of both partners must be examined to establish this. However, the fact is that the masculine principle is dominant here, so he is the one who earns the money. This means someone is living off of someone else's back.", "189": "Goal 8ce – built on passion and material support, where the beginning of the relationship starts through passion and attraction, but also temporary or frequent prodding, provocations, and teasing (1-8). The opposition of 1-9 prevents a clear view of the real picture, because 19 is an aspect that indicates turning something into a fairy tale, and that 'something' can never be a fairy tale. Many people with this synastry lie to themselves, convincing themselves that something is good, only for it to come back to bite them later, because it's only a matter of time before the 8-9 aspect kicks in, when someone will 'stab someone else in the back.' This backstabbing usually takes the form of deceptions, which can be determined through the verticals. At a minimum, dishonesty occurs here. And in a business relationship, serious malfeasance happens here (the goal is 8ca!). From the start, it's clear they won't see past this fairy tale (1-9). 1 – eyes, 9 – as if they're wearing black glasses, invisible, as if they're blind/can't see. Their goal is united by passion and financial support. Most synastry charts with an 8ca as the goal indicate that both parties are working and building. 8ces derived from 4s are particularly strong, because in synastry, the 4 and the 8 are friends. At the end, there is the 9, intrigue, and there is cheating, lies, dishonesty. One party will be disappointed, and the vertical axis will show which party it is.", "191": "This goal is strong and leads to a relationship, and possibly to marriage. Opposition, 1 looks at 1. This speaks of a set of personalities that are self-centered. Here, we can't say it's all passion and they're cutting each other's veins. Instead, it's more about each person being focused on their own side, but it was karma that connected and bound them. 1-9 follows 9-1. This says we idealize, we're looking for a fairytale (1-9), and then it follows 9-1, which says they don't have a stable relationship. I want to have a stable relationship, but a 9-1 can't have a stable relationship. You can't say that everything is bursting with emotion, that the people love each other very much. Here, karma has done its work, and this entire relationship is karmic in nature, without strong emotion. These two stay together depending on the verticals. The 19 vertical is the best, maybe the 55. They can lead to them staying together for life, but even then, they're more like friends. The 46 vertical, and even worse the 28, can't last at all. In the case of the 46, the 6ca will cheat on the 4 and use them. That's where the things that 19 showed will come from, which leads to 91 – again I idealized something, I lied to myself again, I wasn't aware that 91 would kick in sooner or later. That 91 can't tell me that I have a strong and stable relationship. 91 – The 9 is at the beginning, and then it lies 10x more than in 19", "213": "It begins with a fated connection, which has no strong purpose, and is further compounded by the 21 aspect, which is a conflict between the masculine and feminine principles. Because of the final sum of 3, that conflict between the masculine and feminine principles escalates and becomes turbulent. That very sequence, which follows, is already doomed from the start. On the other hand, that 2 in the biorhythm indicates indecision, psychological crises, a 'should I stay or should I go' dilemma... and as soon as that happens, it means there's no life in it. That 2 opposes the 3, and that says that, over the years, that indecision, that instability, the fact that you're not emotionally fulfilled, the relationship just gets worse, because the 3 amplifies things. In fact, with age, it will be 10 times worse than it was at the beginning. There's no way around it.", "224": "Here the goal is destiny, the opposition of 2-4, and in the end, karma, but it starts with destiny. This cannot be avoided. It's clear that this is difficult in all areas of life. 2-4 imposes life limitations in all areas, and in synastry, especially on the emotional and psychic level. However, this cannot be avoided, even if you want to. In 90% of cases, this ends in marriage and lasts for decades. Here, only female principles are present, which means the burden of this karmic relationship falls on the woman's shoulders. It is the woman who feels the impact of the karma, who is channeled, she is the pillar of the family and that marriage, she is the one who remains silent, endures, and swallows all these problems for the sake of peace and the family's survival. All of this is because the spears are broken on her back and karma is being paid off. Not on the back of the masculine principle. This is an example of a classic karmic pattern where the woman did something very wrong in a past life and, very likely, left the man she has now met. Certain synastry charts will tell us that the one who suffers now is the one who did the leaving in the past life. Here, symbolically, we see that fate has also played its part, and it is often the case that the woman, in addition to all the burdens she has carried in such a synastry, also ends up a widow.", "235": "These two people love each other, and from the very beginning, they were fated and emotionally drawn to one another through great passion. Those children (5), who are at the end, will be born from the great emotion that exists between them. However, through the opposition, we have 2-5, where the 5th house is at the end and indicates interference from the side. 5th house opposes the 2nd house. That's the house of home, family; someone from the family is interfering. This synastry has the strength to withstand this interference because it's for the benefit of the 3rd house, which is a very powerful emotion. There are many couples with this synastry who endure interference from their parents, in-laws, etc. That's why the opposition itself says – the house (2) on two levels (5). This means that they shouldn't live together, either in one partner's home or the other's. For these people, living together is a death sentence. The synastry itself is turbulent because the 3rd house is in the target, but the most important thing is that these two people love each other. Their peace can only be disturbed by a third party, and unfortunately, it's people very close to them.", "246": "A fated beginning, but the connection is karmic (4), not fated, and the goal is the most important thing. He is the one who saves and holds the relationship together. The opposition of 2-6, which is an aspect of marriage, says that we love each other and that, literally, from the moment we met, we got under each other's skin and were already thinking about starting a family, getting married, having children,... Since this 2-6 is in opposition, it means that these two think about each other in this way. Here we have three feminine principles, which means that the woman is the pillar. She is also the victim of that family, because the karma is being paid off on her shoulders. 4-6 is the aspect of a love curse. However, this woman knows how to act wisely; she (2) is devoted to her partner (6), and this 4 says that she acts this way even when she doesn't feel like it, because she is wise. In a way, when we translate the body parts: 2 – body, emotions, 4 – skin, 6 - skin. So, she knows how to get under his skin, she knows when to be quiet, to step back, and she is the pillar, the symbol, the wall of that house. Without her tolerance, without her wisdom, this marriage would not have survived. In fact, because of such a strong purpose and such an incredibly good opposition, this synastry is perhaps one of the most beautiful and strongest karmic stories, which in 99% of cases ends in marriage. Very often, it lasts a lifetime. A breakup rarely happens, unless the verticals are catastrophic. The synastry itself is in the top five of the most beautiful and strongest karmic stories.", "257": "Here we have interference from a third party (7), which is much more destructive than the one with the 5. Here, the goal is 5c, which means there isn't a strong enough emotion or passion to preserve the relationship. Here, only the children can keep this relationship going. But, those children will grow up and leave, and one partner will push the other away... because it will all break down. Here, what happens is that due to the 2, you enter the relationship fatedly, but from the very start, you can see that indecisiveness, that doubt. In the beginning, someone didn't know what they wanted; the relationship/marriage was entered into hastily. Anything that's fast is , and that's why most of these synastry charts end in failure. The only thing that can save this is a good marital synastry. You certainly don't stay together because of 257. And, on top of all that, interference from the outside only adds fuel to the fire. Here, a third party is dangerously sticking their nose where it doesn't belong. These aren't just people from the family circle, but also from the circle of friends. The opposition of the partners, 2-7, how they behave towards each other – it's as if their house is turned upside down. This means there's constant tension, they're constantly under stress, and that can't lead to anything good.", "268": "Interwoven aspects: 2-6 – a symbol of attachment, a symbol of marriage, which follows 6-8 – a symbol of fire and fiery infatuation, good sex, and great attraction. So, just looking at the target and the two aspects that have merged creates a relationship that contains everything a relationship should contain: love, attraction, 'I love you,' 'I'm attracted to you,' 'I'm crazy about you,' 'we have good sex,'... However, here the 8ca will cause these two people to often argue, break up, and make up. That 8ca will do its thing, especially because of the 2-8 opposition (the energy of argument). It will be difficult for the partners to control this within themselves, and that's what's so sad here, because these two people have a fantastic synastry and it's evident that they love each other. The goal here is strong and is based on love and attraction. Therefore, any break-up that occurs between these people will also lead to a reconciliation. This turbulence between them subsides after 2 to 3 break-ups. Having children is not a problem here. Although there is no 5th house, there is a 2nd house, which is a symbol of fertility.", "279": "The goal here is a church wedding, and in fact, this synastry demands it. 2-9 in opposition says: I love someone, I pathologically attach myself to someone. Given that the flow of this relationship goes 2-7, and then continues to 7-9, this relationship is not a calm one. It is full of intrigue. Who is disrupting that peace? 7-9 are intrigue and scheming. Because of these intrigues and scheming, they are unsettled, nervous, and yet they love each other. The 9th engages in intrigue and scheming that most likely comes from the side of friends. However, this also translates to female figures, very possibly from the husband's side of the family (the 7 of Clubs represents the masculine principle). This means that in 90% of cases, this is someone from the husband's family. Furthermore, when we translate the symbolism, we get that 29 is a female person, and 7ca is a male principle, so this is a symbol of the mother-in-law. But, it doesn't necessarily mean it will be just her, but his family. If a woman's numbers include male principles (1, 3, 8), then it's from her side. This aspect of intrigue and scheming can also be present if the partner (husband) was cheating. So, it has to be either family or his side. Distance from family means they can't physically interfere, but there are other ways for that interference to occur. The 9 is hidden, secretive, and doesn't need physical contact like the 2 does. If a 9 wants to conspire against you behind your back, they will.", "281": "An opposition, 2-1, indicates a conflict between the masculine and feminine principles. Through the aspects, we have arguments and turbulence (2-8), which don't subside but instead continue with petty jabs and provocations. Here we have a storm on the horizon, a volcano on the horizon. Due to the eternal conflict between the masculine and feminine principles, someone here has to go, because they won't make it. This synastry, besides being aggressive, can also be dangerous. It is not recommended for everyone. People with 0s or 8s don't belong here, because someone is going to seriously hurt or kill another person. This is too turbulent, with no prospect of that turbulence ever subsiding. Of course, people hope it will, but it can't and it won't because the synastry is eternal.", "292": "In opposition, the 2 is looking at the 2 – destiny is looking at destiny, emotion is looking at destiny. The aspects that make up this synastry are 2-9, which continues to 9-2. 2-9 is a pathological attachment to someone, so now they can't let go. This means that this person remains in my heart forever. 292, due to the influence of all the numbers, gives rise to cinematic stories, fatal loves, where one loves without any calculation or reservation and with a pure, whole heart. Although these two get married, a 292 relationship can be turbulent, because when a 2 looks at a 2, it can be indecisive, hold you back, and this causes certain pressures in the relationship. Some also complain about stalking. In any case, this synastry ends in marriage, although there are also stories where it has fallen apart, and bad verticals are to blame for that. However, even when they do separate, they never forget each other. Never! For the rest of their lives! They leave an indelible mark on each other's memory. Blessed are those who have felt this synastry firsthand, because the love and the way it's loved here is immense. 2-9 is that fatal love.", "314": "The goal is 1ca, 3ka in opposition looks at 4ka and two aspects, 3-1 and 1-4. Here, the 1st house provides a healthy foundation because the 3rd house is in front of it and the 4th house is behind it. This 3-1 aspect alludes to the fact that I have met someone I will marry and with whom I have a karmic connection, which will be lasting and meaningful. However, that passion and intensity from the beginning won't last forever, because of the 3-4 opposition, which indicates that the passion will diminish and quiet down over time. It will still be present, but not to the same degree it was at the very beginning. In this case, this is a good thing, and it's what sustains this relationship and gives it that extra, necessary quality. Every karmic relationship is difficult because of the accompanying trials it brings, but 314 falls into the category of quality karmic stories that end in marriage and last for decades.", "325": "Here, destiny is the goal, which cannot be avoided, but the level of emotion isn't as high as it would be, say, with a 3. There are outside influences (5) here, which are 10 times greater than in a 325, and the emotion isn't strong enough to withstand that pressure. Because of this, 325 has no perspective, it has a limited shelf life, and in 99% of cases, it breaks down. The passion is only there at the beginning, then it moves on to 35, where these two people start to see each other as friends rather than emotional partners.", "336": "These are relationships that begin with passion, that have passion as their goal, that are in opposition to abnormally loving someone, that have a 3-3 in their aspects, that continue to a 3-6, where we are talking about the literal phrase 'You'll be mine or nobody's'. The way love is expressed here is abnormal and incredibly strong, and there is absolutely no calculation or self-interest. This is a relationship of pure and immense love, but it can be very obsessive. The fact that it will be turbulent, due to the influence of two 3s, is a minor detail. This relationship can, in fact, be riddled with serious obsession, where, under the influence of that possessiveness, serious, not-so-innocent jealous scenes arise. There will be examples of people who are married, but a scene will happen where they argue, the woman leaves the house, says terrible things about that man, and then after a month they are back together and act as if nothing happened. Here, it's like a good day. He'll buy her gifts, sing her serenades,... but as such, it's too turbulent and can be ranked among the dangerous ones, along with 281 and 178. There are no betrayals here, because that person is the center of your world, you live only for them, but it's OBSESSIVE! Here, we cannot interpret 3-6 as an aspect of two marriages and infidelity.", "347": "Not recommended, but do as you please! The passion here is only at the beginning. Unfortunately, the goal is very strong and it, as such, demands to be made official, demands a verdict, and leads to marriage. With this synastry, people get divorced and/or suffer a lot in the marriage. This is because that passion from the beginning transitions into 4-7, which is an aspect of destruction. So, everything good that I thought I had at the beginning, and that I thought was good, will be torn down to the ground, both emotionally and passionately. Often, it happens that in the end, the partners can't stand each other. The 4th house is about hatred, but you can't say they hate each other, rather that they can't stand each other, they can't even look at each other. This is not recommended, because people will tear each other's nerves to shreds and suffer a lot, and in the end, they won't get anything. At the beginning, you can't feel or see what the outcome will be. Divorce is certain, and if they don't get divorced, the suffering is immense.", "358": "The opposition aspect, 3-8, has the same effect as 31/13. It indicates an aspect of marriage, engagement, or meeting a significant figure in our life. And in the 38th year itself, engagements, weddings, or, if we are single, meeting a significant figure in our life occurs. So, the presence of such an opposition means that as soon as we met, we immediately recognized each other; a great love and a powerful passion that unites us was born. The goal is children, and very likely a business as well, or rather a business partnership between the partners. This opposition also shows that they form a great (3) pair (8). The fact that they make a great pair is also seen in the personal number 8, which appears at the end of the synastry. Here, freedom (5) is also very important. This is an unconventional story, where there is no limiting of the partner due to this mutual need for freedom. There is no aggression or arguing here, which means we are talking about a relationship based on mutual respect, specifically respect for our partner. The relationship is very passionate, with supportive partners, and as such, it is very difficult to break. It is destined to last for years, but one should always also look at the verticals.", "369": "The goal is seriously strong - love, marriage, karma on a family level. We, one opposite the other, the 3-9 aspect - two great friends, supporting each other, we bring each other great support in life, we have each other's backs, we protect each other. The 3-6 aspect continues the 6-9. The question arises whether a betrayal will happen here, and the answer is - very rarely. In a 639 synastry, where 6-9 is in opposition, everyone cheats on each other left and right. However, in a 369 synastry, the 3-9 opposition is very different. Here, we move from passion (3) to love (6), and from love (6) to respect (9). Three related numbers are packed together: the 9, as the higher octave of the 6; the 6, as a little 3. They have a fantastic understanding, and this synastry creates some of the most beautiful love stories. Of course, because of the 3, they aren't peaceful, but they are very strong and based on a powerful emotion, support, and understanding. Practice shows that there are cases of infidelity, but out of 100%, it's about 10%, and that infidelity always shows a vertical line of the personal color.", "371": "The goal is a spiritual bond. A very strong goal. A 3-1 in opposition says that someone is destined for me. If you have a 3-1 in opposition, with the goal of spirituality (7), this leads to marriage. But, that relationship is not peaceful. In addition to the turbulence of the 3s, a 7ca follows. The masculine principle dominates everywhere. Here, the man is the problem. He is elusive. The man, or the masculine principle, is struggling here; he cannot commit. He seeks more freedom and finds it difficult to bond, giving the other person a headache and being responsible for most of the conflicts that arise in such a relationship. These kinds of relationships, even if they lead to marriage and the partners are madly in love with each other, can never be peaceful. They are extremely turbulent and very passionate, but the male principle bears most of the blame for all this turbulence and all these 'slipping through the fingers' moments. Since the goal is spirituality, a church wedding is advised to save the marriage. In most of these cases, the man has some unstable numbers; he got scared because he fell in love, so he's wavering.", "382": "3-8 is an aspect of marriage, so this leads to marriage. The 3 looks at the 2. Is the passion from the 3, the attraction and love looking at the 2, present? Yes. We're talking about a big emotion here, but as soon as 38 continues to 82, it's turbulent, arguments in the house. And it starts turbulent, it continues turbulent, and it's constantly turbulent. A very strong opposition saves me, a very strong emotion through opposition. This means I get constant breakups, constant makeups, and so on until someone goes crazy. The great emotion and love are the trigger for why they stay together, but here, the disagreements in both the relationship and marriage are like clockwork.", "393": "Because of the karmic goal and the two 39/93 combinations, we can say that these people love each other. However, these relationships fail in 90% of cases because they are too passionate (3 looking at 3 in opposition). This is even worse than 336. Terrifying turbulence, arguments, disagreements... that's what's almost sickeningly impulsive. You can't call it hysterical, but it's impulsive, argumentative, where most of these arguments stem from such intense passion, and that doesn't calm down, given that the synastry is unchangeable. It's always like this, constantly. That's why people can't keep up with the pace. Those who have survived with this synastry are rare. They are the ones whose vertical is 3+9=3, but they too go through all the same things. In any case, because of the immense pressure from the turbulence, which here happens daily as if it were a good day, people can't handle it due to the jealousy and possessiveness. It all just grows and gets bigger with the years. There are no compromises here because 3 looks at 3. This is pure madness in the making.", "415": "1ca in the goal provides a healthy foundation. The relationship begins with the influence of karma, but it's a good thing that this karmic number is only present at the beginning. There is no karmic influence on the second and third numbers, which means that this karma, which is in first place as the strongest possible in synastry, right from the start gives this relationship the necessary quality, but also karmic difficulties. These karmic difficulties will only be present in the first years, up to about 8 years. That 4 is in opposition to the 5, so the partners will experience these difficulties in their daily lives, in the form of obstacles in everyday life, from financial issues, possible physical separation, and, simply put, an inability to live a peaceful and normal life without problems. However, we see that this 4, as a karmic influence, leans on the 1, which says that through this karmic influence, it gives this relationship an added quality in the years to come and provides the strength and stability for this relationship to last a lifetime. This 5, which is at the end, brings interference from the side, but it opposes the 4, and that says this interference hits a wall. You can't knock it down. OK, that interference annoys me a bit; maybe that's the karmic issue, but the partners see th t as a temptation, not as something they can't overcome. It won't affect them like, for example, in synastry 235 and 325. Also, it won't be strong enough to affect the partners to the point of causing them to break up. Ultimately, the 5ca, which is composed of the partners' personal numbers, gives the relationship the necessary dynamic and keeps it from being dry and overly serious (as the 4 would demand). Instead, the 5ca adds an extra note of dynamism and mystery to the relationship. We can't say that these partners' need for freedom is abnormally large, because the 5ca combines with the 4, which means the need for freedom is exactly what is necessary in a marriage, where the partners do not exploit that need for freedom and understanding of each other, They don't abuse it, but rather, because of the 4, they make some kind of compromise with each other. This is an example of a synastry that leads to marriage, and it alone cannot be the reason someone grows apart or gets divorced. Other numbers would be responsible for that, and most often, it's the vertical. Nothing more than that. This synastry can only be a trigger for entering into marriage and that this marriage will, most likely, be long-lasting and, just looking at these numbers, last a lifetime. This is also an example of a synastry that creates a karmic difficulty related to children. In comparison to 145, here we can say that with 415 it is in a slightly stronger degree because here the difficulty is present through an opposition, 4-5, and an opposition is the relationship between two spouses for their entire lives. So, that karmic difficulty is somewhat greater, but that doesn't mean they won't or can't have children. However, it can mean that they have some problem with children and that, as parents, they face and deal with that problem on a daily basis. These problems can be health-related or something else, which the other numbers will show us. Since there is an aspect 41 in this synastry, we need to investigate the man's other numbers and see if the problem of not having children is on his end. It could be that the man doesn't want children, or that he is the one holding things back, or that he has health problems, for example, with infertility. For example, if the man was born on 08/14 and makes a square with an 8, it means that the sperm (1) have slowed function and mobility (4), and all of this is connected to potency (8), which means there is a problem with potency.", "426": "The goal is destiny, and this goal is a good one. A fated, invisible bond connects these people and draws them into an emotional relationship. The opposition is 4-6. It's not the same to have 4-6 and 6-4 in opposition, because the first number is always the most dominant, and the number next to it further explains the first number. For 426, it says that there is a dominance of feminine principles here, which tells us that the entire marriage is on the woman's, or feminine principle's, shoulders. Here, through the opposition, we see that the woman suffers greatly. Not only are all the principles on her shoulders, but there is also the karma of the 4, which influences the 6's marriage. It is inevitable that this synastry will lead to marriage, and that most people, whether due to the influence of karma or destiny, will eventually get married. However, the strength of this marriage can in no way be measured against the strength of 246, because 426 will, over time, become a habit, a form of endurance, especially for the feminine principle. That coldness of the 4, which is looking at the 6, will inevitably lead to that initial emotion dying out, and that's not OK, because there are synastry charts where people love each other just as well after 50 years as they did at the beginning. But that's not the problem here. The problem here is that the karmic-fated suffering grows over the years, and these people say their marriage has become a burden, that something has started to choke and press on them, and because of that, they show dissatisfaction in the marriage. That dissatisfaction manifests through their psychological state, through their dissatisfaction, and the 426 is a karmic link that can snap. That's where you need to look at the verticals to get an answer to that question. If the vertical of that 6 is good, it provides the added quality to endure this opposition, but in the way previously explained. If that vertical is bad, there is no one to endure it, no one to bear that weight, then this synastry falls apart at the seams and the marriage collapses. Due to karmic-fated influence, very often, after 10, 15, 20 years of marriage. Here, through the opposition, there can also be physical distance between the partners.", "437": "The opposition is the flow of a relationship, and it shows their mutual, everyday relationship throughout their entire lives. Through opposition, we see what they make of their relationship, how they treat each other... It's not the same whether, in a 4-7 synastry, they are in conjunction or in opposition. The 4-7 opposition is how I behave toward the other person. The 7th house indicates interference from the side, and here it is present; however, this interference doesn't hit a wall (4th house). Nevertheless, this interference is not the trigger and is not the main reason for the collapse of this relationship, because this interference, or rather this 4th-7th opposition, indicates that the partners themselves, through their own daily behavior, are ing this relationship. Here, we have the weight of a 4, which points to something that is upside down and that constantly forces you to do something wrong and contrary to what a quality relationship should have. Furthermore, in the opposition, there is the 4-7 aspect, which represents an aspect of destruction. This means that the partners themselves, through their actions and existence within the relationship, are destroying absolutely everything, and they don't even need outside interference for this, although that is also present. However, here, the potential breakup and separation don't happen peacefully; rather, that 3rd from the goal is tumultuous, explosive, and passionate. We can say that this goal is what attracted them to each other in the first place, but nothing more than that. You'll hear that partners in a relationship like this are like a dog and a cat. Neither one gives in. There's so much back-and-forth, so many arguments, distorted communication, and such an inability to have a normal conversation. We can say that no one comes out of a 437, or a 347 for that matter, unscathed. You can't come out of this relationship mentally okay and normal, because these partners mentally drain each other. They are tense, nervous, and angry, and after leaving this relationship, it takes them a long time to recover. Here, karma doesn't look at the 1st house, which would give them permanence, but rather at the 7th house, where it's only a matter of time before that karma breaks, and the relationship ends. The 7th house signifies a break (4), and it will end in a terribly stressful and negative way for both partners. This relationship has no future; it has an expiration date, and a breakup is inevitable. Numerology says and advises against entering into such a marriage or relationship at all, especially if the 7th house is derived from the 1st and 6th houses. It's a painful and shocking breakup, where the 6th house suffers the most, as they are the more emotional partner. 1ca is more self-focused, while 6ca is more inclined to sacrifice for others. 4-8 – In synastry, 4-8 is not a bad aspect. The 8th house, which is at the end of the synastry, leads to financial support, but also to breakups and reconciliations. The 8th house also signifies passion. The 4-8 conjunction indicates that there is passion, but that passion is directed at the 4th house, and therefore it is not dangerous. In synastry, 4-8 are harmonious because the 4 is linked to the 8. 4-8, both vertically and horizontally, represent two of the greatest friends, who complement each other because they each contain what the other has. The 4 as a goal is extremely strong and cannot prevent a 4-8 from getting married. These 4-4 and 4-8 conjunctions, as well as the 4-8 opposition, provide that necessary quality: durability and a passion that exists in such measure that it doesn't limit the partners from functioning normally. This synastry does not lead to a breakup. The end of the 4-8 synastry indicates that the relationship ends with the death of one of the partners, most often the man.", "459": "The goal is children, and the beginning is karmic. In opposition, karma (4) looks at the repayment of karma and, in such cases, this lasts a lifetime, or until that karma is repaid. As soon as karma looks at karma, it means this synastry leads to a marriage that will not break, at least not until the karma is repaid. However, that repayment, since it comes at the end, means it happens after many years. 459 introduces a karmic difficulty regarding children, which is somewhat greater in karmic relationships with a 4 than in others. However, it also sometimes indicates that children are not wanted, which is seen in synastry as a difficulty for the children. The reason for not having children is not important to synastry. It simply states that there is some problem with children. Either you can't have children, you don't want to have them, or some problem will arise with the children. The problem that can be had with children is either a communication issue or the children being in poor health. Therefore, you need to look further and investigate what the problem is. This 5th house ties and calms the 4th and 9th houses. A 4th-5th issue is a communication problem. The 5th house connects with the 9th, which indicates that something is being hidden for the good of all. The 5-9 aspect isn't in opposition, where partners would lie to each other at every turn and be dishonest; rather, they are in a conjunction, which implies, 'I know when to keep quiet, I know when to pull over, and I have to do it for the good of the relationship.' The intrigues, represented by the 9, are looking at the 4, so it gets blocked, hits a wall, can't disrupt them. They resolve it; tomorrow, it won't be a reason for them to get a divorce.", "461": "The goal is family and emotional karma. The opposition of 4-1 signifies permanence, survival, quality, and the longevity of the marriage. The 4-6 conjunction indicates separation, a difference in age, religion, nationality, etc. If the opposition were 6-1, which is rose-colored glasses, it would be terrible, because when you look past them, there's nothing nice to see. In conjunctions, 6-1 is good.", "472": "Here, the 7th house in the goal section pulls for the relationship to be formalized very quickly, very likely through a church wedding. So, this relationship, whether they want to or not, they cannot avoid. This is due to a strong goal, and also because karma and destiny are at play, pulling from all sides to enter into the relationship. The 4-2 opposition, as with the 4-1 opposition, (because the 2 is both the life number and the number of partnerships), indicates the longevity of a relationship. When the conjunctions are considered, it's clear that this relationship is not easy at all and is fraught with problems in communication, family issues, and very often, financial problems for the two of them. There are difficult and challenging things here, and the woman, through both the opposition and the principles of the 4th and 2nd houses, is the one who bears the full weight of the karma. You won't find anyone who would say or admit that such a marriage is easy, but there are no divorces. This is a synastry that indicates the partners were previously friends, perhaps even since childhood (in 40-50% of cases, this is the case). Years (4) have passed, and we have been friends (7), where those years are very often 20, 30 years, and then we met again and became partners from that long-standing friendship.", "483": "One of the best karmic stories. The credit for this goes to the 4-8 aspect, which is at the beginning and also provides the karmic knot for male children. Meanwhile, the 4-8 are two friends in the synastry. For 483, this 3 at the end only helps and provides additional support in all of this. Fortunately, here the karma comes first, which means that once that karma is paid off in the first few years, we live the 8 and the 3. That karma is still there, but we can say that the first few (7 to 8) years are somehow the hardest, with the greatest pressures. However, here there is passion, financial stability, and a shared building and creation, and because of the 3, there is also support, passion, and emotion, so sometimes it can be a bit impulsive, but because of the opposition with the 4, the relationship isn't harmed. 483 is an example of a synastry that ends in marriage, which lasts for decades and ends with the passing of one of the partners. (Example of a 483 breaking up after 20 years due to the 1+2 vertical).", "494": "Repaying karma as a goal, which adds an extra problem to this relationship. With this synastry, you enter marriage, whether you want to or not. Not only is the goal to repay karma, but karma itself is also looking at karma. This cannot be avoided. Here, karma is repaid in a very difficult way and is repaid over decades. So, its minimum repayment period is (+/-) 30 years, because the 9 is tied to the 3, and the 4 represents decades. It's not necessarily that a synastry like this will fall apart. But for this synastry not to break after 20 or 30 years of karma repayment, the vertical axis plays the most important role and must be strong. Why do karmic repayments cause synastry to break after so many decades? Because of the 4-9 and 9-4 conjunctions. This is a very closed relationship between partners, which leads to them not being 100% honest with each other. Maybe they thought they were hiding something for the greater good, but over the years, it became too much for them, those secrets turned into undefined relationships, those undefined relationships created problems, and these 4-9 and 9-4 conjunctions led to the collapse of their dreams. Therefore, unfortunately, we will see that many 494 synastry combinations have broken down. Ideally, the woman would be a personal 3 and the man a personal 1.", "516": "This synastry is one of those where the 5th house continues onto a fairly healthy foundation, which will calm that restless 5th house and provide additional stability. That is why we see that over time, love (6) does indeed blossom between the partners here. This love will be the catalyst for them to get married, start a family, and we even see children together here, whom they will have during their life together. Here, we don't have any karmic burdens related to children; in fact, it can be said that they will very likely have a daughter (in 90% of cases). When looking at the 5-6 opposition, we see that their communication is exceptionally pleasant and will remain so for most of their relationship, but not for their entire lives. This relationship is filled with understanding, and what could potentially arise is some flirting on the side, because these rose-colored glasses (6-1) we have in the conjunction mean that I certainly won't leave that partner, but will instead turn a blind eye and move on with life. 516 rarely breaks, and we are usually talking about very beautiful and enduring marriages.", "527": "5-7 in opposition causes a daily nervous breakdown. 5th house represents the everyday, and it's constantly looking at the 7th house, which means upside down, chaos. This is like nerves looking at nerves every day. Here, the goal is good, but not strong enough to sustain this relationship. Here, the partners are falling apart at the seams. It's better for this relationship to end with a fling, some kind of get-together, just as it began. Here, very often, we also have relationships that aren't lasting in the sense of flings or adventures, which are short-lived and, as such, fall apart. Some can even end i y, but only if the vertical axis is strong (if it even exists, which it doesn't). However, when they get married, that's when hell breaks loose, and nothing can save them. Of the 100% of people who have gotten married with this synastry, 100% have gotten divorced. This is one of those that has no future. Just destruction and brokenness, disrespect, poor communication, no love, no passion. If you asked them why they got married, they wouldn't know how to tell you.", "538": "The goal is passion and emotion, which isn't small and which was born from the 5c, from some flirting, hanging out, or collaboration, and which continues on from that. Passion and attraction definitely exist. The 5-8 opposition – that passion (8) merges with the 5c, which says: you're going to get boring! This is because the 5th house loves freedom. There isn't the same intensity as with a 3-8, where the passion of the 3rd house looks at the passion of the 8th house; it's very strong, spreads over time, and remains, thus providing that essential quality. With a 5-8, the mystery disappears, and here the partners start to wander. Here, there are no physical attacks, but there are verbal ones. The 5-8 is an aspect known as the razor (8) on the tongue (5). The more times the 5-8 aspect is repeated, the sharper it gets, and they know how to insult each other badly. This is what happens in this synastry as well, where the verbal conflicts and verbal attacks are significant, and they, in turn, further contribute to the breakup of this relationship. The 5-8 aspect has no perspective because it lacks the stability to last and endure. Passion, adventure, something casual—yes, but something serious to build—no!", "549": "A strong goal, which leads me to enter a relationship with that person, and this relationship will probably last a bit longer because of this goal—8 to 10 years. However, the opposition of 5-9 creates a problem here. Someone here is not being honest; there is some deception. We can only idealize (and lie to ourselves) that this isn't the case because of the 9. To better understand, we need to translate the principles. The 5 is a genderless principle, the number of freedom, the number of flirtation. Next to it are the 4 and the 9, as feminine principles, and they stand next to the number of freedom. Is the feminine principle, in most cases a woman, here acting like someone who is evasive and desperately wants freedom, or is she the one who wants to formalize the relationship, and is she the one who bears that karmic repayment on her shoulders? THE SECOND ONE! 5ca is freedom, and next to it stand two feminine principles. The feminine principle is holding back freedom, the feminine principle is paying off karma, the feminine principle strives to formalize the relationship into something more, and to get something more out of it. There are no masculine principles here. Where is the man? He dodges! You can't catch him. They can be in a relationship for a long time, but as soon as a woman mentions marriage, he changes the subject. Does he maybe have a fear because of the 4, does he resist because of the 4,... God only knows, but he's not ready to commit, that's for sure! He's simply running and dodging. With this synastry, it's hard for the woman to make him commit. In this case, 10 years could pass while the karma is being paid off, and we might get nothing out of this relationship. This synastry will only lead to marriage if the vertical axis approves it and if she says it's OK. If things are bad in the marriage, it will fall apart anyway, but if we look at 549 alone, it has no future, and as soon as the karma is paid off as an unmarried partnership, it falls apart. It has a definite expiration date.", "551": "This is a marriage made in Las Vegas and it lasts 5 hours! (5ca attaches to 2; 2+2=4+1=5). There are no arguments, discussions,... Here, there is nothing. We can say, business relationship – yes, friendly relationship – yes, emotional relationship – NO! It's possible for them to live together like roommates, without an emotional relationship, without emotions. They most likely sleep in separate rooms. It starts the way it ends. (It's important for them to get themselves together, show off, and travel).", "562": "A very strong goal, a repayment of karma on a family level, a need to start a family, to get married,... It starts from flirting, especially since it begins with 5-6, which is an aspect of partnerships, and then continues with 6-2, which indicates that the need for marriage has arisen. It's very important that the 5-6 comes first, which leads to the 6-2, because this means that over time, the relationship gains more depth, a more mature quality, and more love, emotion, and respect than at the beginning. And perhaps, if it started as a fling and they weren't sure if they loved each other, over time they fell even more deeply in love. The 5-2 opposition here leaves that need for freedom, that need for respect, with no possibility, through that opposition, for cheating, conflicts, or arguments. A synastry like this even indicates more than two children. Here, through 562, there is room for at least two children (because of the 5ce, which is associated with a double), but it often happens that they have more than two. Women with the 562 code are very fertile, and a large number of them have three children. This is a beautiful, long-lasting, and fruitful marriage.", "573": "Spirituality is the goal here, and that strong goal pulls for something more serious to happen in this relationship. The 5-7 here is in conjunction, thus giving two friends, whom the 3 only helps in all of this and provides additional support, passion, attraction, and love. The opposition of 5-3 adds a bit of impulsive tension. Relationships like this are never calm. They are chaotic, passionate, impulsive, fast-paced, but lasting. This synastry shows partners who have gotten married and have been married for 20 or 30 years, but even at 60 years old, they behave the same way they did when they were 20, that is, at the beginning of the relationship. So, it's never calm here. A little bit of arguing, a little bit of loving, it's constant turbulence, but we love it. This synastry says: the dynamic I'm looking for and getting in this relationship is forever like this. There are no divorces here, but the marriage is always stormy.", "584": "The 8ce goal brings passion, breakups and makeups, sometimes money, sometimes a little turbulence. The key aspect here is the 8-4, and it gives this relationship the necessary strength. There are karmic burdens for the children here, but because of the 8-4, a synastry like this ends in marriage and, if it comes from a good vertical, it will never break. Woman 3, man 1 – it's good and it doesn't break. 6th and 7th – it breaks up, because the 7th complicates things. 4th and 9th – it breaks up", "595": "It's for the purpose of paying off karma. Unfortunately, what happens here is that people get married because of this karmic debt, and they stay in the relationship due to the opposition, which is their children. As soon as the karma is paid off, and it's paid off very quickly, they continue living in that relationship like roommates, like friends. Without any real love that a true relationship needs. 595 can be put in the same category as 551, but here the added strength of that 9 in the target prolongs the survival of this relationship by a year or so, but with no prospect of it lasting forever and with a guaranteed end date. Here, a breakup/divorce is guaranteed. Not even a good vertical can save this relationship.", "617": "At first glance, it provides a stable foundation. And that's true, where, when we divide the relationship into a first part and a second part, we get a 6-1 aspect that says this isn't true love. Here, the rose-colored glasses aspect comes into play, which means someone is in a state of loving another person. The partners won't admit it, but after some time passes, a few years, 3 to 4, they will realize their mistake. Those rose-colored glasses, which are present at the beginning, cast the beauty of the 6th house into one's eyes, and the person is not ready to draw realistic conclusions, is not ready to see things realistically. However, over time, this 1-7 aspect, which is worthless, will kick in. After some time passes, the partners will see the truth, they'll grow cold toward each other, and the relationship will fall apart. The 6-7 aspect, which is in opposition, shows the same thing as the duration of the relationship. 6-7, in partnerships, is the desire to try something new, something different, a bit of forbidden fruit, a desire to try different sex. In fact, 6-7 is an aspect of perversion, as is 7-8. This is why 6-7 is also found among homosexuals, because they try that somewhat perverse, different thing,... You can see that this 6-7 in opposition is identical to 6-1, which is that someone is attractive to me, beautiful, that I'm experiencing something different with someone, something I might not have with someone else. That's what intrigued me here, having an exciting sexual relationship. However, it will pass, because passion and love are not the same thing. That passion will fade, and that relationship, through the 6-7 opposition, will end the same way as the 1-7, which is in a turbulent, stormy, and emotional way, with no prospect of the relationship being renewed afterward or of something better emerging from it.", "628": "Here the goal is a karmic bond, and that goal is very strong. It's some kind of heavenly, invisible bond that draws me to be with someone. Here, at the beginning, there is a 6-2 aspect, which says that love develops very quickly between the partners and they feel a strong need to establish that 6-2 aspect, i.e., a marriage. This 2-8 aspect, which goes further and is fortunate that it's not in opposition, says the relationship will be a bit tense, and that is the ultimate 8ca, which leads to pinching, poking, arguing, making up, and breaking up. The 6-8 opposition shows this as well. However, this opposition isn't like the one in 5-8, where there's a verbal conflict; here, it's a sign of conflict born from pure love at first sight, where you have that aspect of the 8's war and the 6's peace. This is the constant turbulence in the relationship, which arises because the partners love each other, so they are a little jealous, a little possessive, they argue and break up, but they are sure to reconcile, and that passion will eventually calm dow n over time. 8ca says that this calming down happens after 2 to 3 breakups. Then the relationship stabilizes and they continue through life together. That's why 628 produces both passionate and quality marriages, very heartfelt and filled with great love, and they, as such, last for years.", "639": "They entered the relationship because they were attracted to each other and because they loved each other. However, the problem here is the 6-9 opposition. There is dishonesty between them in the marriage; they both lie as much as they can. This synastry indicates infidelity in the marriage, even secret affairs. This has no prospect of ever becoming something more, because the illusion is in constant opposition. This 9, which comes at the end, indicates intrigue from the partner (6) I'm in a relationship with. He is the one who lies to me. It could also be from a non-blood relative (3).", "641": "The goal is strong. There is serious karma here, so we won't be surprised to see that people with this synastry have been married for many years. However, the 6-1 opposition here creates a problem – rose-colored glasses. Also, there is the 6-4 conjunction, which causes a problem in the marriage. Here, idealization is happening (6-1), and karma (4) only adds to the problem. This means there will come a moment when karma will start to weaken and the idealization will cease. That's why it's not surprising that partners with this synastry got divorced after many years of marriage. Of course, a synastry like this is , similar to the 426, which can only be sustained by a good vertical alignment. Otherwise, if we look at just 641, the rose-colored glasses fall off when karma weakens its effect, which, unfortunately, happens after xxx years. The 6-4 aspect is also at play here, which indicates that emotions weaken over time.", "652": "This isn't as nice as 562. The purpose of 562 is much and incomparably stronger, and it creates a need for marriage. 652 does not create a need for marriage. 652 brings children. So, here we have people who have children together. The 6-2 opposition gives emotion and provides the cross-link for these two to get married. That's why it will end in marriage or some kind of emotional relationship, but here the goal is for them to stay together for the sake of the children, and the goal is also freedom. This already makes a big difference. Second, with 562, love is born from the flirtation, and that is what remains in the end. With 652, from the flirtation (65) I'm left with 52, which means that over time, neither the flirtation nor the apparent emotion that existed will last. 652 has no future. Freedom (5) in a partnership (2), each going their own way. 652 are very fertile women.", "663": "Everything is great here. They love each other very much and will get married. The 3 will just make sure it's a little turbulent, passionate, possessive, and jealous, just as a 3 knows how. This is normal here, but exclusively because I love someone, all the more so since the 6-6 aspect is in conjunction here, which says, 'what's mine is mine and I'm not giving it to anyone.' Fortunately, it's not in opposition, but in conjunction, where from that need to protect what is mine from anyone, I safeguard it in every possible way and enrich it over time with a little possessiveness, a little jealousy, a little turbulence that arises simply from loving someone very much. Here we will have slamming doors, singing serenades, writing love letters,... These partners love each other seriously, so it's forgiven for them. And they, in turn, forgive each other everything. The 6-3 aspect here doesn't indicate two marriages, because this is a synastry, a conjunction, which represents the flow of the relationship. A 6-3 in synastry conjunction means a passionate relationship, good flirting; when I get angry, I might lash out philosophically or annoy the other person, but I forgive you for everything. 6-3 means it can be turbulent, where we're not surprised when we see that, for example, a woman kicked her husband out, he came back afterward, and they just continued as if nothing had happened.", "674": "The goal is very strong, it ends in karma, the relationship lasts a long time. At the beginning of the relationship, it's 6-7, which says they have that crazy chemistry; the attraction between them is a little silly at first, but that's what draws them to each other. As soon as a 7-4 is next to it, it means that the storm of that madness and attraction will eventually subside, which is a good thing! So, as soon as the karma is at the end, with this kind of goal, it's going to last. It's a 6-4 opposition, where the 4 doesn't look at the 6, so that love will cool down, but rather the 6 looks at the 4 and says that this quality of marriage will endure and last, as well as that the madness, which was there at the beginning, to diminish, but that what was supposed to be there from the start will still remain – that sort of calm harbor with age. A 6-7-4 won't lead to a divorce, but a ill last for years/decades, but with all these slightly crazy synastry charts, the vertical axis has to be extremely strong. From 2+2 – a tug-of-war; one is depressed, the other is depressed. If 4 looks at 6 – the emotion cools, the ice/wall looks at love. If 6 is aspecting 4 – the marriage that is formed has lasting power; the initial emotion cools, but the one from 6-7 remains.", "685": "6-8 says they will fall in love at first sight. However, that war of the 8s and peace of the 6s, which inevitably leads to turbulence, will happen because of a verbal attack (8-5), but that is not the trigger for this relationship to break. They know how to calm the relationship down. So, here we're talking about a nice 6ce relationship, about marriage, and children together. There are indications here for having two children of different genders. This is also a good synastry for a joint business – 5th house as the final outcome, 8th house in terms of money and good earnings, and the 8th house also representing joint work and building.", "696": "The 9th house, karmic repayment, looks at the 6th house, which in turn looks at the 6th house. It will end in marriage, but it cannot be good. Possessiveness is in opposition (6-6); in the conjunction, 6-9 continues 9-6, which signifies illusions and ideals. The partners will say, \"It's fine! It's OK!\", but that's because they are lying to themselves, because they are idealizing the marriage. There is mutual dishonesty here. It's not that there is no love, but that love here is being paid off through three karmas. Through the karma of the 6s on a family level, they are constantly looking at each other and at the repayment of karma in that very respect. Here, many marriages have fallen apart and people have grown sick of that 6-6 aspect after xxx years, which ultimately led to a divorce.", "718": "7-1 is a finger in the electric current. The very beginning is intense. It continues into 1-8, which brings provocations, tingling, and poking that are constantly present here. Through the opposition, you again have that intensity, which constantly exists, never calms down, and in that opposition, there is no tolerance. Because of this, the relationship has no future and will break down, as the triggers for arguments, turbulence, and nervous breakdowns are not at all minor. In this synastry, it is essential to also examine the primary numbers to see if there are any pathological numbers, as it can be fatal. These provocations are not verbal, like with the 5-8, but rather the bitter arguments, due to the 7s, throw them off balance, especially the masculine principle, which is dominant here. This leads to an injury. So, people with pathological or intense numbers should stay as far away from this kind of relationship as possible if they want to save their skin. In any case, there is no future here, and the relationship's expiration date is guaranteed.", "729": "This synastry leads to marriage. Here, there is not only a strong 2's goal, but also spirituality and the eventual repayment of karma. However, this relationship goes through certain crises that leave the partners with inner turmoil and a psychological scar. These crises are filled with plots and intrigues that come from the outside and which, in this case, are FAKE, that is, they are pure setups to which the partners are susceptible. Whether in a friendship, a relationship between a godfather and godmother, a father and daughter, or a brother and sister, each of these relationships will be filled with setups and intrigues that are 1/1 fake. That's why you have the 7-9 opposition here, which signifies 'the uncovering of the truth.' The 79 aspect is when the truth always comes out in the end, but in that moment, we perceive it as a kind of betrayal. We then react very strongly; it's hard for us to believe at first that it isn't true, and then it can constantly break the partners apart. However, that doesn't mean the 7-9 will break. This is one of the few synastry charts with a 7-9 where the relationship lasts a lifetime, but in that case, the vertical axis has to be very, very strong. Otherwise, a 729 cannot survive through the turbulence of the 7-2 aspect, the chaos that can arise and which causes nervous breakdowns. The 1+8 and 2+7 verticals have no salvation, because they don't have that strength.", "731": "Here we have only passion and emotion. Since the 7 looks at the 1, here we have the 7ca rushing the process too much and getting way ahead of themselves. (If it were 371 – the 3 looks at the 1 and that creates something stable). What is happening here? That passion pulls them, they rush, rush, rush because of the 7ca, and the beginning of the end is there. Here we come to the point that, anything that's fast is also short-lived. 7-1 in opposition signifies a beginning that is guaranteed by an end, where the partners, through their behavior, make the relationship what it is. Furthermore, 7-1 is also a crisis of identity, because the 1ca is my personal self, so I enter a crisis of identity in this very relationship, which leads to mutual , and which inevitably leads to an end, with no turning back. This has no perspective. The calculation, roughly, looks like this: meeting, engagement – 20 days; thinking about kids – 2 to 3 months; they aren't even married for 5, 6 months, the house is shaking with arguments, dissatisfaction, and disrespect, and it's only natural they'll get divorced. That has no future.", "742": "Although it is extremely difficult, the goal is serious and strong. 7ca is spirituality, 2 is destiny. It is a difficult relationship; serious karmic burdens are carried by the woman, who is the one who carries this karma. This relationship ends with the loss of the partner, who is very often a man, or the masculine principle, because the woman is left a widow (42). How and in what way this karmic burden will be paid off will be shown by the other numbers. This can last a lifetime, but this is a very difficult marriage, not because of the 7, but because of the 4's goal.", "753": "The opposition speaks to how we interact with each other in the relationship on a daily basis. If that 7-5 were in opposition, it would be upside down, hysterical, bad, abnormal, and doomed to fail. It would be a backwards (7) communication (5). Then there would also be talk of some outside interference, of a completely reversed relationship, and that would make for the real madness of this relationship. A conjunction represents the course of a relationship, how the partners, through their behavior, create the relationship for themselves. When doing synastry, we said that 48 are the two best friends, which is why the strongest synastry combinations numerology knows are 448, 584, 483, 843, ... The 84 provides that bond between partners, where they understand each other best. The same is true when the vertical line is made of a 4 and an 8. This is how, in synastry, and through both verticals and conjunctions, a 5 and a 7 become the best of friends. However, a 5 and a 7 have a different temperament than a 4 and an 8. A 7-5 conjunction adds extra daily adrenaline to that friendship. With a 3rd house vertical, these people are both fiery and outspoken; both parties are looking for the passion that the 3rd house provides. In synastry, the 3rd house isn't just about passion, but also love, support, and attachment, as well as the 3rd's heartfelt, jealous, and possessive reactions. Given that the 3rd is flanked by the two greatest friends, the 7th and the 5th, this synastry leads to a relationship, and even marriage. A large percentage of people with this synastry have gotten married, had children who are their purpose, and, if their vertical axis is good, have stayed together for life. Their marriage, even at 60, is as turbulent as it was when they were 20, and to those around them watching from the sidelines, the events in this relationship are something extraordinary. This is who they are, and we see this through their opposition as well, where we view the 7th house as the equivalent of the 5th house and see that the communication between them is bitter and impulsive. Through that opposition, we can interpret it as a summer storm—boom, boom, boom—in five minutes we unload everything we have, and after half an hour, we act as if absolutely nothing happened. This is, in fact, how they function. Here, children are had, and the partners can even prosper professionally, given that the goal is 5ca. What symbolizes this relationship through the goal is the unconventionality it carries with it. Of course, as always, the vertical should also be considered. Every aspect of the numbers needs to be considered. Here, it is not recommended for 1ca to be female and 2ca to be male.", "764": "The goal is karma on a family level, marriage, and love. When we look at the goal, we say love, but we observe from the sidelines to see how that love behaves. The 6-4 conjunction says that the love cools over time because it wasn't love to begin with. It was an illusion of loving someone (7-6). That 7-6 aspect is also an aspect of a thoughtless marriage, as is the case with most synastry charts that start with a 7. And, anything that's fast is also short-lived. This 7-6 is much faster than a 6-4. It's a thoughtless entry into marriage, driven by passion rather than true love. OK, that 6-ca from the target initially attracts you to someone, and then you get into the mindset that it might be true love, but the 7-6 says it isn't. 7-6 is physical attraction, passion, a good intimate life,... So, as time goes on, I not only distance myself and grow cold toward my partner, but I realize that I didn't truly love him even at the beginning of the relationship. If I had, I would love him now and for the rest of my life, and a gap like this would never have formed between us. The question arises whether this distance between them is minor or if it's dominated by serious karmic problems, because the synastry ends with karma. As soon as the final number of the synastry is karma, it means it goes on and on, and years can pass. Here, through the opposition, we have an aspect of destruction (7-4). We ourselves, facing each other, and not from interference from the side, bring about this destruction every day and for years. Through our behavior, our actions, we tear down both what was good and what was not. This has no perspective or future, and here we will very often see people part ways , like a dog and a cat. It gets to the point where they can't even sit down and talk to civilly end the relationship. This is an example of synastry where, just as they began bitterly, they also end in no less a bitter way. 76 – whether here someone loves someone or just pretended to love them, and, in fact, was only physically attracted to them. This is an aspect of passion, perversion, a fantastically different sex life, an aspect of physical attraction, magnetic attraction, so it becomes the greatest impulse to enter into a relationship. Opposition 74 is the aspect of destroying what we had at the beginning. As time goes on, that physical attraction and passion will weaken between them, but the love that exists will remain. There is also a thoughtless entry into marriage here (like animal instincts). Even the fact that 76 follows 64, which says that over time love fades, isn't as much of a problem, but what the 74 opposition does is the issue—a constant gap in the partners' behavior, the new versus the old, and this, through the opposition, destroys everything. These people come out of this relationship like dog and cat.", "775": "This is a synastry that, unfortunately, leads to marriage, but has a maximum lifespan of 10 years. The 7ca attaches to the 4 + the other 7ca, and the 5 attaches to the 2. In 90% of cases, that is the maximum duration this couple can last. This is a synastry without strong love, without strong karma, with a huge need for freedom. These numbers make the partners very nervous and tense. In opposition, it's seen that communication from the 5 is totally messed up (7) and wrong. It's clear that this is a synastry with no future and a guaranteed expiration date. What happened here is that they entered the relationship young, swept away by a shared mindset; everything was just in the air, so to speak. Also, this is an example where the breakups are quite intense and rather nasty. There's no aspect of reconciliation here; once it breaks, it breaks in a stressful way, and that's where our paths diverge. This is, perhaps, also logical by metaphorical association, because three numbers representing crossroads are lined up here. The moment you get to that crossroads, when the 10 years are up, everyone goes their separate ways, and that's that. 77/75 – nervous breakdowns", "786": "Here we can recognize aspects of partnership. Actually, 7-8 is not an aspect of partnership, but of sexuality – lust, passion, an unusual intimate relationship. This means that here, the very thought of starting a relationship was a 7ce impulse, a sudden 7ce strike on that lust and the 8ce charisma and passion that captivated and attracted me. The very purpose of 8ce speaks of a financial connection, of breakups and makeups. As soon as it says 'breaks and reconciliations,' it means something is turbulent and fiery, that it's certainly not calm, and where there's a synastry like this, not only does it start that way, but it continues that way, because the 8-6 aspect is one of constant war (8) and peace (6). That aspect is bound to cause conflicts in the emotional life, which arise from passion. So even if we were to say...OK, 8-6 is that love, attraction at first sight, and the first aspect tells me the same thing (I might not have a 6th, but 7-8 – someone attracted me quickly, captivated me quickly, I quickly felt something magnetic that drew me in, but it's all driven by passion
