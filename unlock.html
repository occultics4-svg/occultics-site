<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your reading is ready — Occultics</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Montserrat',sans-serif;background:#0a0e2e;color:#fff;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{max-width:520px;text-align:center}
.wm{font-family:'Cormorant Garamond',serif;font-size:14px;letter-spacing:6px;text-transform:uppercase;color:#4db8ff;margin-bottom:22px}
.check{width:64px;height:64px;border-radius:50%;background:rgba(77,184,255,.15);border:1.5px solid rgba(77,184,255,.5);display:flex;align-items:center;justify-content:center;margin:0 auto 22px;font-size:30px;color:#4db8ff}
.badge{display:inline-block;font-size:11px;letter-spacing:2px;text-transform:uppercase;font-weight:600;color:#0a0e2e;background:#4db8ff;padding:7px 16px;border-radius:100px;margin-bottom:22px}
h1{font-family:'Cormorant Garamond',serif;font-weight:400;font-size:clamp(30px,7vw,44px);line-height:1.1;margin-bottom:16px}
h1 em{font-style:italic;color:#4db8ff}
p{color:rgba(255,255,255,0.72);font-size:15px;line-height:1.75;margin-bottom:14px}
.btn{display:inline-block;margin-top:18px;font-size:15px;font-weight:700;letter-spacing:.3px;color:#0a0e2e;background:#4db8ff;text-decoration:none;padding:17px 40px;border-radius:100px}
.btn:hover{background:#7fccff}
.small{margin-top:22px;font-size:12.5px;color:rgba(255,255,255,0.5)}
.foot{margin-top:30px;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.25)}
</style>
</head>
<body>
<div class="card">
  <div class="wm">Occultics</div>
  <div class="check">&#10003;</div>
  <div class="badge">Payment complete</div>
  <h1>Your reading is <em id="prod">ready.</em></h1>
  <p id="lead">Thank you. Your reading is unlocked and waiting.</p>
  <a class="btn" id="cta" href="/personality-full.html?paid=1">Click here to unlock your reading &rarr;</a>
  <p class="small">On the next page, just enter the birthday and your full reading writes itself — right there, all on one page.</p>
  <div class="foot">Occultics &middot; Numerology of connection</div>
</div>
<script>
  (function(){
    var p=(new URLSearchParams(location.search).get('p')||'personality').toLowerCase();
    var cta=document.getElementById('cta'), prod=document.getElementById('prod'), lead=document.getElementById('lead');
    if(p.indexOf('comp')===0){
      prod.textContent='ready.';
      document.querySelector('h1').innerHTML='Your Compatibility Code is <em>ready.</em>';
      lead.textContent='Thank you. Your full 11-session Compatibility Code is unlocked and waiting.';
      cta.href='/compatibility-full.html?paid=1';
    } else {
      document.querySelector('h1').innerHTML='Your Personality Code is <em>ready.</em>';
      lead.textContent='Thank you. Your full Personality Code is unlocked and waiting.';
      cta.href='/personality-full.html?paid=1';
    }
  })();
</script>
</body>
</html>
