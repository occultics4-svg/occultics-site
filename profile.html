<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Life Code — Occultics</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0e2e;color:#fff;font-family:'Montserrat',sans-serif;min-height:100vh;}
#loading{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;}
#loading svg{opacity:0.4;}
#loading p{font-size:11px;letter-spacing:3px;color:#4db8ff;text-transform:uppercase;}
#notfound{min-height:100vh;display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px;text-align:center;padding:40px;}
#notfound h2{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;}
#notfound p{font-size:13px;color:#8892a4;}
#notfound a{color:#4db8ff;text-decoration:none;}
#main{display:none;width:100%;}
.hdr{background:rgba(10,14,46,0.97);border-bottom:1px solid rgba(77,184,255,0.1);padding:14px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.hdr a{font-weight:700;font-size:12px;letter-spacing:4px;color:#fff;text-decoration:none;}
.hdr span{font-size:10px;color:#8892a4;}
.hero{padding:60px 32px 44px;text-align:center;border-bottom:1px solid rgba(77,184,255,0.08);background:radial-gradient(ellipse at 50% 0%,rgba(26,42,255,0.08) 0%,transparent 70%);}
.eyebrow{font-size:9px;letter-spacing:3px;color:#4db8ff;text-transform:uppercase;font-weight:600;margin-bottom:16px;}
.hero-name{font-family:'Cormorant Garamond',serif;font-size:clamp(32px,5vw,52px);font-weight:300;margin-bottom:8px;}
.hero-sub{font-size:11px;color:#8892a4;margin-bottom:28px;}
.code-box{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:8px;}
.code-num{font-family:'Cormorant Garamond',serif;font-size:52px;font-weight:300;color:#4db8ff;}
.code-dot{font-size:24px;color:rgba(77,184,255,0.3);}
.code-label{font-size:8px;letter-spacing:2px;color:#8892a4;text-transform:uppercase;text-align:center;}
.sessions{max-width:720px;margin:0 auto;padding:40px 24px;}
.session-card{border:1px solid rgba(77,184,255,0.1);border-radius:16px;margin-bottom:16px;overflow:hidden;}
.session-card.unlocked{border-color:rgba(77,184,255,0.2);}
.session-card.locked{opacity:0.5;}
.session-hdr{padding:20px 24px;display:flex;align-items:center;gap:16px;cursor:pointer;background:rgba(255,255,255,0.02);}
.session-hdr:hover{background:rgba(255,255,255,0.04);}
.session-num{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:300;color:#4db8ff;min-width:48px;}
.session-meta{flex:1;}
.session-ey{font-size:9px;letter-spacing:2px;color:#8892a4;text-transform:uppercase;margin-bottom:4px;}
.session-ti{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;}
.session-arr{color:#4db8ff;font-size:18px;transition:transform 0.2s;}
.session-body{display:none;padding:0 24px 24px;}
.session-body.open{display:block;}
.session-body p{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:300;line-height:1.9;color:rgba(255,255,255,0.85);margin-bottom:20px;}
.session-lock{font-size:10px;color:#8892a4;letter-spacing:1px;}
.footer{text-align:center;padding:48px 24px;border-top:1px solid rgba(77,184,255,0.06);}
.footer-quote{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:16px;color:rgba(255,255,255,0.2);margin-bottom:8px;}
.footer-copy{font-size:9px;color:rgba(255,255,255,0.1);}
</style>
</head>
<body>

<div id="loading">
  <svg width="48" height="58" viewBox="0 0 80 100" fill="none"><polygon points="40,2 78,30 40,98 2,30" fill="#1a2aff" opacity="0.3"/><polygon points="40,2 78,30 40,50" fill="#1a2aff" opacity="0.6"/><polygon points="40,2 2,30 40,50" fill="#4db8ff" opacity="0.7"/></svg>
  <p>Loading your profile...</p>
</div>

<div id="notfound">
  <h2>Profile not found</h2>
  <p>This link may be incorrect or expired.</p>
  <a href="/">Return to Occultics</a>
</div>

<div id="main">
  <div class="hdr">
    <a href="/">OCCULTICS</a>
    <span>Expires <span id="expiry">—</span></span>
  </div>
  <div class="hero">
    <div class="eyebrow">The Life Code Alignment</div>
    <h1 class="hero-name" id="pname">—</h1>
    <p class="hero-sub" id="psub">—</p>
    <div class="code-box">
      <div><div class="code-num" id="pbio">—</div><div class="code-label">Biorhythm</div></div>
      <div class="code-dot">·</div>
      <div><div class="code-num" id="pgen">—</div><div class="code-label">Generational</div></div>
      <div class="code-dot">·</div>
      <div><div class="code-num" id="plp">—</div><div class="code-label">Life Path</div></div>
    </div>
  </div>
  <div class="sessions" id="sessions"></div>
  <div class="footer">
    <div class="footer-quote">"Your numbers have always known the way."</div>
    <div class="footer-copy">© 2026 Occultics Publishing</div>
  </div>
</div>

<script>
var SUPABASE_URL = 'https://dtquqaridqyjdgirjczr.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR0cXVxYXJpZHF5amRnaXJqY3pyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3ODYzMjIsImV4cCI6MjA5MDM2MjMyMn0.dp8Xp2mpGZLAr9S-_ZwxYMfUrYKCQLDqcoTwGu3Rp8k';

var SESSION_DEFS = [
  {key:'session1', num:'01', day:'Day 1',  title:'Your Mathematical Blueprint'},
  {key:'session2', num:'02', day:'Day 3',  title:'Your Emotional Frequency'},
  {key:'session3', num:'03', day:'Day 5',  title:'Your Core Drivers'},
  {key:'session4', num:'04', day:'Day 7',  title:'Your Behavioral Code'},
  {key:'session5', num:'05', day:'Day 9',  title:'Your Karmic Blueprint'},
  {key:'session6', num:'06', day:'Day 11', title:'The Architecture of Your Reality'},
  {key:'session7', num:'07', day:'Day 13', title:'Your Energetic Patterns'},
];

function formatDate(str) {
  if(!str) return '—';
  try { return new Date(str).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'}); }
  catch(e) { return str; }
}

function textToHTML(text) {
  if(!text || text === 'Generating...') return '<p style="color:#8892a4;font-style:italic;">Your session is being prepared. Please refresh in a few minutes.</p>';
  return text.split('\n\n').filter(function(p){return p.trim();}).map(function(p){return '<p>'+p.trim()+'</p>';}).join('');
}

function toggleSession(idx) {
  var body = document.getElementById('sb'+idx);
  var arr = document.getElementById('sa'+idx);
  if(body.classList.contains('open')) {
    body.classList.remove('open');
    arr.style.transform = '';
  } else {
    body.classList.add('open');
    arr.style.transform = 'rotate(180deg)';
  }
}

function renderSessions(sections) {
  var html = '';
  SESSION_DEFS.forEach(function(def, idx) {
    var s = sections[def.key] || {};
    var unlocked = s.unlocked || s.text;
    if(unlocked) {
      html += '<div class="session-card unlocked">';
      html += '<div class="session-hdr" onclick="toggleSession('+idx+')">';
      html += '<div class="session-num">'+def.num+'</div>';
      html += '<div class="session-meta"><div class="session-ey">Session '+def.num+' · '+def.day+'</div><div class="session-ti">'+def.title+'</div></div>';
      html += '<div class="session-arr" id="sa'+idx+'">↓</div>';
      html += '</div>';
      html += '<div class="session-body'+(idx===0?' open':'')+'" id="sb'+idx+'">'+textToHTML(s.text)+'</div>';
      html += '</div>';
    } else {
      html += '<div class="session-card locked">';
      html += '<div class="session-hdr">';
      html += '<div class="session-num">'+def.num+'</div>';
      html += '<div class="session-meta"><div class="session-ey">Session '+def.num+'</div><div class="session-ti">'+def.title+'</div></div>';
      html += '<div class="session-lock">Unlocks '+def.day+'</div>';
      html += '</div></div>';
    }
  });
  document.getElementById('sessions').innerHTML = html;
}

function loadProfile() {
  var params = new URLSearchParams(window.location.search);
  var id = params.get('id');
  if(!id) {
    document.getElementById('loading').style.display='none';
    document.getElementById('notfound').style.display='flex';
    return;
  }

  fetch(SUPABASE_URL+'/rest/v1/transformational_profiles?profile_id=eq.'+encodeURIComponent(id)+'&select=*', {
    headers: {'apikey': SUPABASE_KEY, 'Authorization': 'Bearer '+SUPABASE_KEY}
  })
  .then(function(r){ return r.json(); })
  .then(function(data) {
    document.getElementById('loading').style.display='none';
    if(!data || !data.length) {
      document.getElementById('notfound').style.display='flex';
      return;
    }
    var p = data[0];
    document.getElementById('pname').textContent = p.name || '—';
    document.getElementById('psub').textContent = 'Born '+formatDate(p.date_of_birth)+' · 7 Sessions · 14 Days';
    document.getElementById('pbio').textContent = p.biorhythm || '—';
    document.getElementById('pgen').textContent = p.generational || '—';
    document.getElementById('plp').textContent = p.life_path || '—';
    document.getElementById('expiry').textContent = formatDate(p.expires_at);
    document.title = (p.name||'Your')+' Life Code — Occultics';

    var sections = p.sections || {};
    if(typeof sections === 'string') {
      try { sections = JSON.parse(sections); } catch(e) { sections = {}; }
    }
    renderSessions(sections);
    document.getElementById('main').style.display = 'block';
  })
  .catch(function(err) {
    console.error('Load error:', err);
    document.getElementById('loading').style.display='none';
    document.getElementById('notfound').style.display='flex';
  });
}

loadProfile();
</script>
</body>
</html>
