function calcCode(){
  var d=parseInt(document.getElementById('day1').value);
  var m=parseInt(document.getElementById('month1').value);
  var y=parseInt(document.getElementById('year1').value);
  var tod=document.getElementById('tod').value;
  if(!d||!m||!y){alert('Please enter your complete birth date.');return;}

  var bio=r(d+m);
  var gen=r(String(y).split('').reduce(function(s,c){return s+parseInt(c)},0));
  var lp=r(bio+gen);

  // Calculate pyramid
  var digits=String(d).padStart(2,'0').split('').concat(String(m).padStart(2,'0').split('')).concat(String(y).split(''));
  digits=digits.map(Number);
  var pyramid=[digits];
  var row=digits;
  while(row.length>1){
    var next=[];
    for(var i=0;i<row.length-1;i++) next.push(r(row[i]+row[i+1]));
    pyramid.push(next);
    row=next;
  }
  // Pyramid code from last 3 rows (without birth date row)
  // pyramid[0] is birth date, pyramid[1] is row 2, etc.
  // Last row = pyramid[pyramid.length-1] (peak)
  // Second to last = pyramid[pyramid.length-2] (row 7)
  var peak = pyramid[pyramid.length-1][0];
  var row7 = pyramid[pyramid.length-2]; // [left, right]
  var pyrCode = row7[0]+'.'+row7[1]+'.'+peak;
  // Remove birth date row from display pyramid
  var displayPyramid = pyramid.slice(1);

  var ordinal = d + (['','st','nd','rd'][d%10>3?0:(d%100-d%10!=10)*d%10]||'th');

  userData = {day:d, month:m, year:y, tod:tod, bio:bio, gen:gen, lp:lp, pyrCode:pyrCode, displayPyramid:displayPyramid, ordinal:ordinal, code:bio+'.'+gen+'.'+lp};

  buildCarousel();
  document.getElementById('calculator').style.display='none';
  document.getElementById('result').style.display='block';
  window.scrollTo(0,0);
}

  s1+='<div class="s-line"></div>';
  s1+='<div class="s-desc">'+bd.desc+'</div>';
  s1+='</div>';

  // SLIDE 2 - Pythagorean Code
  var s2='<div class="carousel-slide">';
  s2+='<div class="s-logo">OCCULTICS MEDIA</div>';
  s2+='<div class="s-line"></div>';
  s2+='<div class="s-eyebrow">YOUR PYTHAGOREAN CODE</div>';
  s2+='<div class="s-code" style="margin:12px 0">'+d.bio+' . '+d.gen+' . '+d.lp+'</div>';
  s2+='<div class="s-line"></div>';
  s2+='<div class="s-num-label">BIORHYTHM — '+d.bio+'</div>';
  s2+='<div class="s-num-desc">'+(BIO_DESC[d.bio]||'')+'</div>';
  s2+='<div class="s-num-label">GENERATIONAL — '+d.gen+'</div>';
  s2+='<div class="s-num-desc">'+(GEN_DESC[d.gen]||'')+'</div>';
  s2+='<div class="s-num-label">LIFE PATH — '+d.lp+'</div>';
  s2+='<div class="s-num-desc">'+(LP_DESC[d.lp]||'')+'</div>';
  s2+='</div>';

  // SLIDE 3 - Pyramid
  var s3='<div class="carousel-slide">';
  s3+='<div class="s-logo">OCCULTICS MEDIA</div>';
  s3+='<div class="s-line"></div>';
  s3+='<div class="s-eyebrow">YOUR NUMERICAL PYRAMID</div>';
  s3+='<div class="s-pyramid">';
  var dp=d.displayPyramid;
  var totalRows=dp.length;
  for(var ri=0;ri<totalRows;ri++){
    s3+='<div class="s-pyr-row">';
    for(var ci=0;ci<dp[ri].length;ci++){
      var isHL=(ri>=totalRows-2);
      s3+='<div class="s-pyr-num'+(isHL?' hl':'')+'">'+dp[ri][ci]+'</div>';
    }
    s3+='</div>';
  }
  s3+='</div>';
  s3+='<div class="s-line"></div>';
  s3+='<div class="s-eyebrow">PYRAMID CODE</div>';
  s3+='<div class="s-code" style="margin:12px 0;font-size:clamp(32px,9vw,48px)">'+d.pyrCode+'</div>';
  var pyrKey=d.pyrCode.replace(/\./g,'');
  s3+='<div class="s-desc" style="font-size:clamp(14px,3.5vw,18px)">'+(PYR_DESC[pyrKey]||'A unique pyramid code. The combined energies create a pattern worth exploring.')+'</div>';
  s3+='</div>';

  // SLIDE 4 - CTA
  var s4='<div class="carousel-slide">';
  s4+='<div class="s-logo">OCCULTICS MEDIA</div>';
  s4+='<svg width="60" height="72" viewBox="0 0 80 100" fill="none" style="margin:20px 0;position:relative;z-index:1"><polygon points="40,2 78,30 40,98 2,30" fill="#1a2aff" opacity="0.12"/><polygon points="40,2 78,30 40,50" fill="#1a2aff" opacity="0.55"/><polygon points="40,2 2,30 40,50" fill="#4db8ff" opacity="0.65"/><polygon points="2,30 40,50 40,98" fill="#1a2aff" opacity="0.35"/><polygon points="78,30 40,50 40,98" fill="#2a7fff" opacity="0.45"/><polygon points="40,15 65,32 40,48" fill="#fff" opacity="0.18"/></svg>';
  s4+='<div class="s-line"></div>';
  s4+='<div class="s-question">What\'s<br><em>YOUR</em><br>code?</div>';
  s4+='<div class="s-line"></div>';
  s4+='<div class="s-sub">Your date of birth already knows who you are and who you\'re compatible with.</div>';
  s4+='<div style="margin:20px 0"><div class="s-sub" style="font-style:italic;color:rgba(255,255,255,0.35)">Self-awareness meets connection.</div></div>';
  s4+='<div class="s-url">occultics.ai</div>';
  s4+='<a href="/match/compatibility.html" class="s-cta-btn" style="margin-top:16px">Check your compatibility</a>';
  s4+='</div>';

  track.innerHTML=s1+s2+s3+s4;

  // Dots
  dots.innerHTML='';
  for(var i=0;i<4;i++){
    var dot=document.createElement('div');
    dot.className='dot'+(i===0?' active':'');
    dot.setAttribute('data-i',i);
    dot.onclick=function(){goToSlide(parseInt(this.getAttribute('data-i')))};
    dots.appendChild(dot);
  }
  currentSlide=0;

  // Swipe support
  var startX=0;
  var carousel=document.getElementById('carousel');
  carousel.addEventListener('touchstart',function(e){startX=e.touches[0].clientX});
  carousel.addEventListener('touchend',function(e){
    var diff=startX-e.changedTouches[0].clientX;
    if(Math.abs(diff)>50){
      if(diff>0&&currentSlide<3)goToSlide(currentSlide+1);
      if(diff<0&&currentSlide>0)goToSlide(currentSlide-1);
    }
  });
}

var currentSlide=0;
function goToSlide(i){
  currentSlide=i;
  document.getElementById('track').style.transform='translateX(-'+i*100+'%)';
  document.querySelectorAll('.dot').forEach(function(d,idx){d.classList.toggle('active',idx===i)});
}

function showCalc(){
  document.getElementById('calculator').style.display='block';
  document.getElementById('result').style.display='none';
  window.scrollTo(0,0);
}

// SHARE FUNCTIONS
function shareIG(){
  // Open Instagram Stories on mobile
  var text='Born on the '+userData.ordinal+'. My code: '+userData.code+'. Pyramid: '+userData.pyrCode+'. Calculate yours at occultics.ai';
  if(navigator.share){
    navigator.share({title:'My Occultics Code',text:text,url:'https://occultics.ai/code.html'}).catch(function(){});
  } else {
    // Fallback - copy to clipboard
    navigator.clipboard.writeText(text+' https://occultics.ai/code.html');
    alert('Copied to clipboard! Paste it in your Instagram Story.');
  }
}

function shareWA(){
  var text='Born on the '+userData.ordinal+'. My Pythagorean code is '+userData.code+'. My pyramid code is '+userData.pyrCode+'. What\'s YOUR code? Calculate it free: https://occultics.ai/code.html';
  window.open('https://wa.me/?text='+encodeURIComponent(text));
}

// Language
var LANG=(navigator.language||'en').substring(0,2);
if(!['en','es','ja'].includes(LANG))LANG='en';
var urlLang=new URLSearchParams(window.location.search).get('lang');
if(urlLang&&['en','es','ja'].includes(urlLang))LANG=urlLang;

var sw=document.getElementById('lang-switch');
['en','es','ja'].forEach(function(l){
  var btn=document.createElement('button');
  btn.className='lang-btn'+(l===LANG?' active':'');
  btn.textContent=l.toUpperCase();
  btn.onclick=function(){var url=new URL(window.location);url.searchParams.set('lang',l);window.location=url.toString();};
  sw.appendChild(btn);
});
</script>
