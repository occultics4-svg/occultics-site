<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculate Your Code — Occultics</title>
<meta name="description" content="Enter your birth date. See your Pythagorean code and pyramid code. Share it.">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--navy:#0a0e2e;--royal:#1a2aff;--crystal:#4db8ff;--gray:#8892a4;--white:#fff}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Montserrat',sans-serif;background:var(--navy);color:var(--white);min-height:100vh}
.page{max-width:520px;margin:0 auto;padding:32px 20px 60px;min-height:100vh}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:40px}
.logo-wrap{display:flex;align-items:center;gap:8px;text-decoration:none}
.logo-name{font-weight:700;font-size:12px;letter-spacing:3px;color:var(--white)}
.lang-switch{display:flex;gap:4px}
.lang-btn{padding:3px 7px;border-radius:4px;font-size:8px;letter-spacing:1px;font-weight:700;cursor:pointer;font-family:'Montserrat',sans-serif;border:1.5px solid rgba(77,184,255,0.15);background:transparent;color:var(--gray);transition:all .2s}
.lang-btn.active{background:var(--royal);color:#fff;border-color:var(--royal)}

/* CALCULATOR */
.calc-hero{text-align:center;margin-bottom:36px}
.calc-hero h1{font-family:'Cormorant Garamond',serif;font-size:clamp(26px,6vw,38px);font-weight:300;line-height:1.15;margin-bottom:10px}
.calc-hero h1 em{font-style:italic;color:var(--crystal)}
.calc-hero p{font-size:12px;color:var(--gray);line-height:1.7;font-weight:300}
.calc-box{background:rgba(255,255,255,0.03);border:1px solid rgba(77,184,255,0.12);border-radius:16px;padding:28px 24px}
.form-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:9px;color:var(--gray);font-weight:500}
.form-group select{padding:10px 12px;background:rgba(255,255,255,0.04);border:1px solid rgba(77,184,255,0.15);border-radius:8px;color:var(--white);font-family:'Montserrat',sans-serif;font-size:13px;outline:none;-webkit-appearance:none;appearance:none}
.form-group select option{background:var(--navy);color:var(--white)}
.time-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.time-row select{padding:10px 12px;background:rgba(255,255,255,0.04);border:1px solid rgba(77,184,255,0.15);border-radius:8px;color:var(--white);font-family:'Montserrat',sans-serif;font-size:13px;outline:none;-webkit-appearance:none;appearance:none}
.calc-btn{width:100%;padding:14px;background:var(--royal);color:var(--white);border:none;border-radius:10px;font-size:11px;letter-spacing:2px;font-weight:700;cursor:pointer;font-family:'Montserrat',sans-serif;text-transform:uppercase;transition:all .2s}
.calc-btn:hover{background:#1420cc}

/* RESULT - CAROUSEL */
#result{display:none}
.carousel-wrap{position:relative;overflow:hidden;border-radius:16px;margin-bottom:20px;aspect-ratio:9/16;background:#0a0e2e}
.carousel-track{display:flex;transition:transform .4s ease;height:100%}
.carousel-slide{min-width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 32px;text-align:center;position:relative;overflow:hidden}
.carousel-slide::before{content:'';position:absolute;width:600px;height:600px;background:radial-gradient(circle,rgba(26,42,255,0.08) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}

/* Slide content */
.s-logo{font-weight:700;font-size:11px;letter-spacing:3px;color:var(--white);margin-bottom:8px;position:relative;z-index:1}
.s-gem{margin-bottom:16px;position:relative;z-index:1}
.s-line{width:120px;height:1px;background:rgba(26,42,255,0.5);margin:16px auto;position:relative;z-index:1}
.s-eyebrow{font-size:10px;letter-spacing:3px;color:var(--crystal);text-transform:uppercase;font-weight:600;position:relative;z-index:1}
.s-born-label{font-size:14px;letter-spacing:2px;color:var(--gray);font-weight:500;position:relative;z-index:1}
.s-born-num{font-family:'Cormorant Garamond',serif;font-size:clamp(60px,16vw,90px);font-weight:300;color:var(--white);line-height:1;position:relative;z-index:1}
.s-degree{font-size:10px;letter-spacing:2px;color:var(--crystal);font-weight:600;position:relative;z-index:1}
.s-desc{font-family:'Cormorant Garamond',serif;font-size:clamp(18px,4.5vw,24px);line-height:1.7;color:rgba(255,255,255,0.75);font-weight:300;position:relative;z-index:1;max-width:380px}
.s-code{font-family:'Montserrat',sans-serif;font-size:clamp(40px,12vw,64px);font-weight:700;color:var(--white);letter-spacing:8px;position:relative;z-index:1}
.s-code-label{font-size:11px;letter-spacing:1.5px;color:var(--crystal);font-weight:600;position:relative;z-index:1}
.s-num-label{font-size:10px;color:var(--crystal);letter-spacing:1.5px;font-weight:600;margin-bottom:4px;position:relative;z-index:1}
.s-num-desc{font-family:'Cormorant Garamond',serif;font-size:clamp(15px,3.8vw,19px);line-height:1.7;color:rgba(255,255,255,0.7);font-weight:300;margin-bottom:16px;position:relative;z-index:1;max-width:360px}
.s-pyramid{display:flex;flex-direction:column;align-items:center;gap:4px;position:relative;z-index:1;margin:12px 0}
.s-pyr-row{display:flex;gap:8px;justify-content:center}
.s-pyr-num{width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:rgba(255,255,255,0.25)}
.s-pyr-num.hl{color:var(--crystal);border:1.5px solid var(--crystal);border-radius:50%}
.s-question{font-family:'Cormorant Garamond',serif;font-size:clamp(28px,8vw,42px);font-weight:300;color:var(--white);line-height:1.3;position:relative;z-index:1}
.s-question em{color:var(--crystal)}
.s-sub{font-family:'Cormorant Garamond',serif;font-size:clamp(14px,3.5vw,18px);color:rgba(255,255,255,0.5);line-height:1.7;position:relative;z-index:1;max-width:340px}
.s-url{font-size:14px;font-weight:700;letter-spacing:2px;color:var(--crystal);position:relative;z-index:1}
.s-cta-btn{display:inline-block;padding:12px 32px;background:var(--royal);color:var(--white);border-radius:24px;font-size:11px;letter-spacing:1.5px;font-weight:700;text-transform:uppercase;text-decoration:none;position:relative;z-index:1}

/* Dots */
.carousel-nav{display:flex;justify-content:center;align-items:center;gap:24px;margin-bottom:20px}
.nav-arrow{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.04);border:1px solid rgba(77,184,255,0.2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;color:var(--crystal);font-size:18px}
.nav-arrow:hover{background:rgba(77,184,255,0.1);border-color:var(--crystal)}
.nav-arrow.disabled{opacity:0.2;cursor:default}
.nav-counter{font-size:12px;letter-spacing:2px;color:var(--gray);font-weight:600}
.nav-counter span{color:var(--crystal)}

/* Share buttons */
.share-section{margin-bottom:24px}
.share-title{font-size:10px;letter-spacing:2px;color:var(--gray);text-transform:uppercase;text-align:center;margin-bottom:12px}
.share-btns{display:flex;flex-direction:column;gap:8px}
.share-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;border-radius:10px;font-size:11px;letter-spacing:1px;font-weight:600;cursor:pointer;font-family:'Montserrat',sans-serif;transition:all .2s;text-decoration:none;border:none}
.share-btn.ig{background:linear-gradient(135deg,#833AB4,#E1306C,#F77737);color:#fff}
.share-btn.ig:hover{opacity:0.9}
.share-btn.reel{background:rgba(255,255,255,0.06);color:var(--crystal);border:1px solid rgba(77,184,255,0.2)}
.share-btn.reel:hover{background:rgba(77,184,255,0.1)}
.share-btn.wa{background:#25D366;color:#fff}
.share-btn.wa:hover{opacity:0.9}
.share-loading{display:none;text-align:center;padding:12px;font-size:10px;color:var(--crystal);letter-spacing:1px}

/* Recalc */
.recalc{text-align:center;margin-top:16px}
.recalc a{font-size:11px;color:var(--crystal);cursor:pointer;text-decoration:none}

.footer{text-align:center;margin-top:auto;padding-top:32px}
.footer a{font-size:10px;color:var(--gray);text-decoration:none}
.footer-copy{font-size:8px;color:rgba(255,255,255,0.12);margin-top:8px}

@media(max-width:380px){.form-row{grid-template-columns:1fr}.calc-box{padding:20px 16px}}
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <a href="/" class="logo-wrap">
      <svg width="20" height="24" viewBox="0 0 80 100" fill="none"><polygon points="40,2 78,30 40,98 2,30" fill="#1a2aff" opacity="0.12"/><polygon points="40,2 78,30 40,50" fill="#1a2aff" opacity="0.55"/><polygon points="40,2 2,30 40,50" fill="#4db8ff" opacity="0.65"/><polygon points="2,30 40,50 40,98" fill="#1a2aff" opacity="0.35"/><polygon points="78,30 40,50 40,98" fill="#2a7fff" opacity="0.45"/></svg>
      <div class="logo-name">OCCULTICS</div>
    </a>
    <div class="lang-switch" id="lang-switch"></div>
  </div>

  <!-- CALCULATOR -->
  <div id="calculator">
    <div class="calc-hero">
      <h1 id="t-title">Calculate Your <em>Code</em></h1>
      <p id="t-sub">Enter your birth date. See the numbers hidden in your birthday.</p>
    </div>
    <div class="calc-box">
      <div class="form-row">
        <div class="form-group"><label>Day</label><select id="day1"><option value="">—</option></select></div>
        <div class="form-group"><label>Month</label><select id="month1"><option value="">—</option></select></div>
        <div class="form-group"><label>Year</label><select id="year1"><option value="">—</option></select></div>
      </div>
      <div class="time-row">
        <div class="form-group"><label>Time of birth (optional)</label>
          <select id="tod"><option value="">— select —</option><option value="day">Day (6am - 6pm)</option><option value="night">Night (6pm - 6am)</option></select>
        </div>
      </div>
      <button class="calc-btn" onclick="calcCode()">Calculate Your Code</button>
    </div>
  </div>

  <!-- RESULT -->
  <div id="result">
    <div class="carousel-wrap" id="carousel">
      <div class="carousel-track" id="track"></div>
    </div>
    <div class="carousel-nav"><div class="nav-arrow" id="nav-prev" onclick="prevSlide()">&#8592;</div><div class="nav-counter"><span id="nav-current">1</span> / 4</div><div class="nav-arrow" id="nav-next" onclick="nextSlide()">&#8594;</div></div>

    <div class="share-section">
      <div class="share-title">Share your code</div>
      <div class="share-btns">
        <button class="share-btn ig" onclick="shareIG()">📸 Post to Instagram Story</button>
        <button class="share-btn reel" onclick="downloadReel()">🎬 Download as Reel</button>
        <button class="share-btn wa" onclick="shareWA()">📱 Share on WhatsApp</button>
      </div>
      <div class="share-loading" id="share-loading">Generating your reel...</div>
    </div>

    <div class="recalc"><a onclick="showCalc()">← Calculate another code</a></div>
  </div>

  <div class="footer">
    <a href="/">occultics.ai</a> · <a href="/match/join.html">Join Match</a> · <a href="/match/compatibility.html">Compatibility</a>
    <div class="footer-copy">&copy; 2026 Occultics Media</div>
  </div>
</div>

<script>
// Populate dropdowns
var dayEl=document.getElementById('day1');
for(var d=1;d<=31;d++){var o=document.createElement('option');o.value=d;o.textContent=d;dayEl.appendChild(o);}
var monthEl=document.getElementById('month1');
var months=['January','February','March','April','May','June','July','August','September','October','November','December'];
months.forEach(function(m,i){var o=document.createElement('option');o.value=i+1;o.textContent=m;monthEl.appendChild(o);});
var yearEl=document.getElementById('year1');
var now=new Date().getFullYear();
for(var y=now;y>=1920;y--){var o=document.createElement('option');o.value=y;o.textContent=y;yearEl.appendChild(o);}

// All calculations happen on backend — no algorithm exposed here
var DECODE_URL = 'https://occultics-decode.occultics4.workers.dev';
var userData = {};

async function calcCode(){
  var d=parseInt(document.getElementById('day1').value);
  var m=parseInt(document.getElementById('month1').value);
  var y=parseInt(document.getElementById('year1').value);
  var tod=document.getElementById('tod').value;
  if(!d||!m||!y){alert('Please enter your complete birth date.');return;}

  var btn=document.querySelector('.calc-btn');
  btn.textContent='DECODING...';btn.disabled=true;

  try {
    var res = await fetch(DECODE_URL + '/decode', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({day: d, month: m, year: y})
    });
    var data = await res.json();
    if (data.error) { alert('Error: ' + data.error); btn.textContent='CALCULATE YOUR CODE';btn.disabled=false; return; }

    var ordinal = d + (['','st','nd','rd'][d%10>3?0:(d%100-d%10!=10)*d%10]||'th');
    var pyrRows = data.pyramidRows.slice(1); // remove birth date row
    var pyrCode = data.pyramid.first+'.'+data.pyramid.second+'.'+data.pyramid.third;

    userData = {
      day:d, month:m, year:y, tod:tod,
      bio:data.pyth.biorhythm, gen:data.pyth.generational, lp:data.pyth.lifePath,
      pyrCode:pyrCode,
      displayPyramid:pyrRows,
      ordinal:ordinal,
      code:data.pyth.biorhythm+'.'+data.pyth.generational+'.'+data.pyth.lifePath,
      birthDayDesc:data.birthDayDesc,
      degree:'DEGREE '+data.degree,
      bioDesc:data.bioDesc,
      genDesc:data.genDesc,
      lpDesc:data.lpDesc
    };

    buildCarousel();
    document.getElementById('calculator').style.display='none';
    document.getElementById('result').style.display='block';
    window.scrollTo(0,0);
  } catch(e) {
    alert('Connection error. Please try again.');
  }
  btn.textContent='CALCULATE YOUR CODE';btn.disabled=false;
}

function buildCarousel(){
  var d=userData;
  var bd = {degree: d.degree || '', desc: d.birthDayDesc || ''};
  var track=document.getElementById('track');
  var dots=document.getElementById('dots');

  // SLIDE 1 - Born on the Xth
  var s1='<div class="carousel-slide">';
  s1+='<div class="s-logo">OCCULTICS MEDIA</div>';
  s1+='<div class="s-line"></div>';
  s1+='<div class="s-born-label">BORN ON THE</div>';
  s1+='<div class="s-born-num">'+d.ordinal+'</div>';
  s1+='<div class="s-degree">'+bd.degree+'</div>';
  s1+='<div class="s-line"></div>';
  s1+='<div class="s-desc">'+bd.desc+'</div>';
  s1+='</div>';

  // SLIDE 2 - Pythagorean Code
  var s2='<div class="carousel-slide">';
  s2+='<div class="s-logo">OCCULTICS MEDIA</div>';
  s2+='<div class="s-line"></div>';
  s2+='<div class="s-eyebrow">YOUR PYTHAGOREAN CODE</div>';
  s2+='<div class="s-code" style="margin:12px 0">'+d.bio+' . '+d.gen+' . '+d.lp+'</div>';
  s2+='<div class="s-line"></div>';
  s2+='<div class="s-num-label">BIORHYTHM — '+d.bio+'</div>';
  s2+='<div class="s-num-desc">'+(d.bioDesc||'')+'</div>';
  s2+='<div class="s-num-label">GENERATIONAL — '+d.gen+'</div>';
  s2+='<div class="s-num-desc">'+(d.genDesc||'')+'</div>';
  s2+='<div class="s-num-label">LIFE PATH — '+d.lp+'</div>';
  s2+='<div class="s-num-desc">'+(d.lpDesc||'')+'</div>';
  s2+='</div>';

  // SLIDE 3 - Pyramid
  var s3='<div class="carousel-slide">';
  s3+='<div class="s-logo">OCCULTICS MEDIA</div>';
  s3+='<div class="s-line"></div>';
  s3+='<div class="s-eyebrow">YOUR NUMERICAL PYRAMID</div>';
  s3+='<div class="s-pyramid">';
  var dp=d.displayPyramid;
  var totalRows=dp.length;
  for(var ri=0;ri<totalRows;ri++){
    s3+='<div class="s-pyr-row">';
    for(var ci=0;ci<dp[ri].length;ci++){
      var isHL=(ri>=totalRows-2);
      s3+='<div class="s-pyr-num'+(isHL?' hl':'')+'">'+dp[ri][ci]+'</div>';
    }
    s3+='</div>';
  }
  s3+='</div>';
  s3+='<div class="s-line"></div>';
  s3+='<div class="s-eyebrow">PYRAMID CODE</div>';
  s3+='<div class="s-code" style="margin:12px 0;font-size:clamp(32px,9vw,48px)">'+d.pyrCode+'</div>';
  var pyrKey=d.pyrCode.replace(/\./g,'');
  s3+='<div class="s-desc" style="font-size:clamp(14px,3.5vw,18px)">A unique pyramid code. The combined energies create a pattern worth exploring.</div>';
  s3+='</div>';

  // SLIDE 4 - CTA
  var s4='<div class="carousel-slide">';
  s4+='<div class="s-logo">OCCULTICS MEDIA</div>';
  s4+='<svg width="60" height="72" viewBox="0 0 80 100" fill="none" style="margin:20px 0;position:relative;z-index:1"><polygon points="40,2 78,30 40,98 2,30" fill="#1a2aff" opacity="0.12"/><polygon points="40,2 78,30 40,50" fill="#1a2aff" opacity="0.55"/><polygon points="40,2 2,30 40,50" fill="#4db8ff" opacity="0.65"/><polygon points="2,30 40,50 40,98" fill="#1a2aff" opacity="0.35"/><polygon points="78,30 40,50 40,98" fill="#2a7fff" opacity="0.45"/><polygon points="40,15 65,32 40,48" fill="#fff" opacity="0.18"/></svg>';
  s4+='<div class="s-line"></div>';
  s4+='<div class="s-question">What\'s<br><em>YOUR</em><br>code?</div>';
  s4+='<div class="s-line"></div>';
  s4+='<div class="s-sub">Your date of birth already knows who you are and who you\'re compatible with.</div>';
  s4+='<div style="margin:20px 0"><div class="s-sub" style="font-style:italic;color:rgba(255,255,255,0.35)">Self-awareness meets connection.</div></div>';
  s4+='<div class="s-url">occultics.ai</div>';
  s4+='<a href="/match/compatibility.html" class="s-cta-btn" style="margin-top:16px">Check your compatibility</a>';
  s4+='</div>';

  track.innerHTML=s1+s2+s3+s4;

  currentSlide=0;
  updateNav();

  // Swipe support
  var startX=0;
  var carousel=document.getElementById('carousel');
  carousel.addEventListener('touchstart',function(e){startX=e.touches[0].clientX});
  carousel.addEventListener('touchend',function(e){
    var diff=startX-e.changedTouches[0].clientX;
    if(Math.abs(diff)>50){
      if(diff>0&&currentSlide<3)goToSlide(currentSlide+1);
      if(diff<0&&currentSlide>0)goToSlide(currentSlide-1);
    }
  });
}

var currentSlide=0;
function goToSlide(i){
  currentSlide=i;
  document.getElementById('track').style.transform='translateX(-'+i*100+'%)';
  updateNav();
}
function updateNav(){
  document.getElementById('nav-current').textContent=currentSlide+1;
  document.getElementById('nav-prev').classList.toggle('disabled',currentSlide===0);
  document.getElementById('nav-next').classList.toggle('disabled',currentSlide===3);
}
function prevSlide(){if(currentSlide>0)goToSlide(currentSlide-1);}
function nextSlide(){if(currentSlide<3)goToSlide(currentSlide+1);}

function showCalc(){
  document.getElementById('calculator').style.display='block';
  document.getElementById('result').style.display='none';
  window.scrollTo(0,0);
}

// SHARE FUNCTIONS
function shareIG(){
  var text='Born on the '+userData.ordinal+'. My code: '+userData.code+'. Pyramid: '+userData.pyrCode+'. Calculate yours at occultics.ai/code.html';
  // Try native share (works on mobile - lets user pick Instagram, Stories, etc)
  if(navigator.share){
    navigator.share({
      title:'My Occultics Code — '+userData.code,
      text:text,
      url:'https://occultics.ai/code.html'
    }).catch(function(){});
  } else {
    // Desktop fallback - copy text
    var fullText=text+' https://occultics.ai/code.html';
    navigator.clipboard.writeText(fullText).then(function(){
      alert('Copied! Open Instagram and paste in your Story.');
    }).catch(function(){
      prompt('Copy this text and paste in your Instagram Story:', fullText);
    });
  }
}

function shareWA(){
  var text='Born on the '+userData.ordinal+'. My Pythagorean code is '+userData.code+'. My pyramid code is '+userData.pyrCode+'. What\'s YOUR code? Calculate it free: https://occultics.ai/code.html';
  window.open('https://wa.me/?text='+encodeURIComponent(text));
}

function downloadReel(){
  // Generate a video-like slideshow using canvas
  var loading=document.getElementById('share-loading');
  loading.style.display='block';
  loading.textContent='Generating your reel...';

  // Create canvas for each slide and download as images
  var slides=document.querySelectorAll('.carousel-slide');
  var zip=[];
  var count=0;

  // Use html2canvas approach - but since we can't load external libs,
  // we'll download the slides as screenshots via a simpler approach
  // For now, use the native share or prompt to screen record

  // Simplest approach: prompt user
  loading.textContent='';
  var msg='To post as a Reel:\n\n1. Screen-record while swiping through your code carousel above\n2. Open Instagram → New Reel → Select the recording\n3. Add music and post!\n\nOr screenshot each slide and create a carousel post.';
  alert(msg);
  loading.style.display='none';
}

// Language
var LANG=(navigator.language||'en').substring(0,2);
if(!['en','es','ja'].includes(LANG))LANG='en';
var urlLang=new URLSearchParams(window.location.search).get('lang');
if(urlLang&&['en','es','ja'].includes(urlLang))LANG=urlLang;

var sw=document.getElementById('lang-switch');
['en','es','ja'].forEach(function(l){
  var btn=document.createElement('button');
  btn.className='lang-btn'+(l===LANG?' active':'');
  btn.textContent=l.toUpperCase();
  btn.onclick=function(){var url=new URL(window.location);url.searchParams.set('lang',l);window.location=url.toString();};
  sw.appendChild(btn);
});
