<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messages — Occultics Match</title>
<link rel="manifest" href="/match/manifest.json">
<meta name="theme-color" content="#0a0e2e">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script>
// Safe Supabase loader
window.supabaseLoaded = false;
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js" 
  onerror="console.log('Supabase CDN failed, running in demo mode')"
  onload="window.supabaseLoaded=true">
</script>
<style>
:root{--navy:#0a0e2e;--royal:#1a2aff;--crystal:#4db8ff;--gray-mid:#8892a4;--white:#fff}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Montserrat',sans-serif;background:var(--navy);color:var(--white);min-height:100vh;display:flex;flex-direction:column}
.app-header{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid rgba(77,184,255,0.1);background:rgba(10,14,46,0.95);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100}
.logo-wrap{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-gem{width:24px;height:28px}
.logo-name{font-weight:700;font-size:13px;letter-spacing:3px;color:var(--white)}
.app-nav{display:flex;gap:4px}
.nav-item{padding:8px 14px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;letter-spacing:0.5px;transition:all .2s;text-decoration:none;color:var(--gray-mid);border:none;background:transparent;font-family:'Montserrat',sans-serif}
.nav-item.active,.nav-item:hover{background:rgba(26,42,255,0.2);color:var(--crystal)}

.messages-layout{display:flex;flex:1;height:calc(100vh - 57px)}

/* LEFT PANEL */
.conversations-panel{width:320px;border-right:1px solid rgba(77,184,255,0.1);overflow-y:auto;flex-shrink:0}
.panel-header{padding:16px 20px;border-bottom:1px solid rgba(77,184,255,0.08)}
.panel-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300}
.conv-list{}
.conv-item{display:flex;gap:12px;padding:14px 20px;border-bottom:1px solid rgba(255,255,255,0.04);cursor:pointer;transition:background .2s;text-decoration:none;color:inherit}
.conv-item:hover,.conv-item.active{background:rgba(26,42,255,0.08)}
.conv-avatar{width:44px;height:44px;border-radius:50%;background:rgba(26,42,255,0.3);border:1.5px solid rgba(77,184,255,0.2);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;color:var(--crystal)}
.conv-avatar img{width:100%;height:100%;object-fit:cover}
.conv-info{flex:1;min-width:0}
.conv-name{font-size:13px;font-weight:600;color:var(--white);margin-bottom:3px}
.conv-preview{font-size:11px;color:var(--gray-mid);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:300}
.conv-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.conv-time{font-size:10px;color:var(--gray-mid)}
.conv-unread{width:18px;height:18px;background:var(--royal);border-radius:50%;font-size:9px;display:flex;align-items:center;justify-content:center;font-weight:700}

/* RIGHT PANEL - CHAT */
.chat-panel{flex:1;display:flex;flex-direction:column;overflow:hidden}
.chat-header{padding:14px 20px;border-bottom:1px solid rgba(77,184,255,0.1);display:flex;align-items:center;gap:12px}
.chat-avatar{width:36px;height:36px;border-radius:50%;background:rgba(26,42,255,0.3);border:1.5px solid rgba(77,184,255,0.2);overflow:hidden;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:var(--crystal)}
.chat-name{font-size:14px;font-weight:600}
.chat-code{font-size:10px;color:var(--gray-mid)}
.chat-messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px}
.msg-bubble{max-width:70%;padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.5;font-weight:300}
.msg-bubble.sent{background:rgba(26,42,255,0.3);border:1px solid rgba(26,42,255,0.4);align-self:flex-end;border-bottom-right-radius:4px}
.msg-bubble.received{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);align-self:flex-start;border-bottom-left-radius:4px}
.msg-time{font-size:9px;color:var(--gray-mid);margin-top:4px;text-align:right}
.chat-input-bar{padding:14px 20px;border-top:1px solid rgba(77,184,255,0.1);display:flex;gap:10px;align-items:center}
.chat-input{flex:1;padding:12px 16px;background:rgba(255,255,255,0.05);border:1.5px solid rgba(77,184,255,0.15);border-radius:10px;color:var(--white);font-family:'Montserrat',sans-serif;font-size:13px;outline:none;transition:border-color .2s}
.chat-input:focus{border-color:var(--crystal)}
.chat-input::placeholder{color:rgba(136,146,164,0.4)}
.send-btn{padding:12px 20px;background:var(--royal);color:var(--white);border:none;border-radius:10px;font-size:11px;letter-spacing:1px;font-weight:700;cursor:pointer;font-family:'Montserrat',sans-serif;transition:all .2s}
.send-btn:hover{background:#1420cc}

/* EMPTY CHAT */
.empty-chat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;text-align:center}
.empty-chat-gem{width:60px;height:72px;margin:0 auto 20px;opacity:0.3}
.empty-chat-title{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:300;margin-bottom:8px}
.empty-chat-sub{font-size:12px;color:var(--gray-mid);font-weight:300;line-height:1.6}

/* SUBSCRIBE WALL */
.subscribe-wall{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;text-align:center}
.sub-wall-card{background:rgba(26,42,255,0.08);border:1px solid rgba(77,184,255,0.2);border-radius:20px;padding:40px;max-width:360px}
.sub-wall-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;margin-bottom:10px}
.sub-wall-sub{font-size:12px;color:var(--gray-mid);line-height:1.7;font-weight:300;margin-bottom:24px}
.sub-wall-btn{display:block;padding:14px 32px;background:var(--royal);color:var(--white);border:none;border-radius:10px;font-size:11px;letter-spacing:2px;font-weight:700;cursor:pointer;font-family:'Montserrat',sans-serif;text-transform:uppercase;transition:all .2s;text-decoration:none}
.sub-wall-btn:hover{background:#1420cc}

/* MOBILE */
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(10,14,46,0.95);backdrop-filter:blur(12px);border-top:1px solid rgba(77,184,255,0.1);padding:8px 0;z-index:100}
.mobile-nav-items{display:flex;justify-content:space-around}
.mobile-nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 16px;cursor:pointer;text-decoration:none;color:var(--gray-mid);transition:color .2s}
.mobile-nav-item.active{color:var(--crystal)}
.mobile-nav-icon{font-size:18px}
.mobile-nav-label{font-size:9px;letter-spacing:0.5px;font-weight:600}

@media(max-width:768px){
  .app-nav{display:none}
  .mobile-nav{display:block}
  .messages-layout{height:calc(100vh - 57px - 56px)}
  .conversations-panel{width:100%;border-right:none;display:none}
  .conversations-panel.show{display:block}
  .chat-panel{display:none}
  .chat-panel.show{display:flex}
}
</style>
</head>
<body>

<header class="app-header">
  <a href="https://occultics.ai" class="logo-wrap">
    <svg class="logo-gem" viewBox="0 0 80 100" fill="none">
      <polygon points="40,2 78,30 40,98 2,30" fill="#1a2aff" opacity="0.12"/>
      <polygon points="40,2 78,30 40,50" fill="#1a2aff" opacity="0.55"/>
      <polygon points="40,2 2,30 40,50" fill="#4db8ff" opacity="0.65"/>
      <polygon points="2,30 40,50 40,98" fill="#1a2aff" opacity="0.35"/>
      <polygon points="78,30 40,50 40,98" fill="#2a7fff" opacity="0.45"/>
      <polygon points="40,15 65,32 40,48" fill="#fff" opacity="0.18"/>
    </svg>
    <div class="logo-name">MATCH</div>
  </a>
  <nav class="app-nav">
    <a href="/match/dashboard.html" class="nav-item">My Matches</a>
    <a href="/match/messages.html" class="nav-item active">Messages</a>
    <a href="/match/settings.html" class="nav-item">Profile</a>
  </nav>
</header>

<div class="messages-layout">
  <!-- LEFT: Conversations -->
  <div class="conversations-panel show" id="conv-panel">
    <div class="panel-header">
      <div class="panel-title">Messages</div>
    </div>
    <div class="conv-list" id="conv-list">
      <!-- Populated by JS -->
    </div>
  </div>

  <!-- RIGHT: Chat or Empty -->
  <div class="chat-panel" id="chat-panel">
    <div class="empty-chat" id="empty-chat">
      <svg class="empty-chat-gem" viewBox="0 0 80 100" fill="none">
        <polygon points="40,2 78,30 40,98 2,30" fill="#1a2aff" opacity="0.3"/>
        <polygon points="40,2 78,30 40,50" fill="#1a2aff" opacity="0.5"/>
        <polygon points="40,2 2,30 40,50" fill="#4db8ff" opacity="0.5"/>
      </svg>
      <div class="empty-chat-title">Select a conversation</div>
      <div class="empty-chat-sub">Your messages with matches<br>will appear here.</div>
    </div>

    <div id="subscribe-wall" class="subscribe-wall" style="display:none">
      <div class="sub-wall-card">
        <div class="sub-wall-title">Subscribe to Message</div>
        <div class="sub-wall-sub">Messaging is available to founding members. Join now at $29/month — first 100 spots only.</div>
        <a href="/match/join.html" class="sub-wall-btn">Become a Founding Member</a>
      </div>
    </div>

    <div id="active-chat" style="display:none;flex:1;flex-direction:column">
      <div class="chat-header" id="chat-header"></div>
      <div class="chat-messages" id="chat-messages"></div>
      <div class="chat-input-bar">
        <input type="text" class="chat-input" id="msg-input" placeholder="Type a message..." onkeypress="handleKeyPress(event)">
        <button class="send-btn" onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>
</div>

<nav class="mobile-nav">
  <div class="mobile-nav-items">
    <a href="/match/dashboard.html" class="mobile-nav-item">
      <span class="mobile-nav-icon">💎</span>
      <span class="mobile-nav-label">Matches</span>
    </a>
    <a href="/match/messages.html" class="mobile-nav-item active">
      <span class="mobile-nav-icon">✉</span>
      <span class="mobile-nav-label">Messages</span>
    </a>
    <a href="/match/settings.html" class="mobile-nav-item">
      <span class="mobile-nav-icon">◈</span>
      <span class="mobile-nav-label">Profile</span>
    </a>
  </div>
</nav>

<script>
var SUPABASE_URL='https://dtquqaridqyjdgirjczr.supabase.co';
var SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR0cXVxYXJpZHF5amRnaXJqY3pyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3ODYzMjIsImV4cCI6MjA5MDM2MjMyMn0.dp8Xp2mpGZLAr9S-_ZwxYMfUrYKCQLDqcoTwGu3Rp8k';
var supabase = null;
try {
  if(window.supabase && typeof window.supabase.createClient === 'function' && SUPABASE_URL !== 'https://dtquqaridqyjdgirjczr.supabase.co') {
    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  }
} catch(e) {
  console.log('Running in demo mode:', e.message);
}
var currentUser=null;
var currentProfile=null;
var activeConnectionId=null;
var realtimeChannel=null;

async function init(){
  if(!supabase || SUPABASE_URL === 'https://dtquqaridqyjdgirjczr.supabase.co'){showDemoConversations();return}
  var session=await supabase.auth.getSession();
  if(!session.data.session){window.location.href='/match/join.html';return}
  currentUser=session.data.session.user;
  var profileRes=await supabase.from('profiles').select('*').eq('user_id',currentUser.id).single();
  if(profileRes.error){window.location.href='/match/join.html';return}
  currentProfile=profileRes.data;
  if(!currentProfile.is_subscribed){
    document.getElementById('empty-chat').style.display='none';
    document.getElementById('subscribe-wall').style.display='flex';
  }
  await loadConversations();
}

async function loadConversations(){
  var res=await supabase.from('connections').select('*,profiles!connections_from_user_id_fkey(*),profiles!connections_to_user_id_fkey(*)').eq('status','accepted').or('from_user_id.eq.'+currentUser.id+',to_user_id.eq.'+currentUser.id);
  if(res.error||!res.data){return}
  var list=document.getElementById('conv-list');
  list.innerHTML='';
  if(res.data.length===0){
    list.innerHTML='<div style="padding:32px 20px;text-align:center;font-size:12px;color:var(--gray-mid);font-weight:300">No conversations yet.<br>Connect with your matches to start chatting.</div>';
    return;
  }
  res.data.forEach(function(conn){
    var other=conn.from_user_id===currentUser.id?conn['profiles!connections_to_user_id_fkey']:conn['profiles!connections_from_user_id_fkey'];
    if(!other)return;
    var item=document.createElement('div');
    item.className='conv-item';
    item.onclick=function(){openChat(conn.id,other)};
    var avatarHtml=other.photo_url?'<img src="'+other.photo_url+'" alt="'+other.name+'">':other.name.charAt(0);
    item.innerHTML='<div class="conv-avatar">'+avatarHtml+'</div><div class="conv-info"><div class="conv-name">'+other.name+'</div><div class="conv-preview">'+other.biorhythm+' · '+other.generational+' · '+other.life_path+'</div></div>';
    list.appendChild(item);
  });
}

async function openChat(connectionId,other){
  if(!currentProfile.is_subscribed){
    document.getElementById('empty-chat').style.display='none';
    document.getElementById('subscribe-wall').style.display='flex';
    return;
  }
  activeConnectionId=connectionId;
  document.getElementById('empty-chat').style.display='none';
  document.getElementById('subscribe-wall').style.display='none';
  var activeChat=document.getElementById('active-chat');
  activeChat.style.display='flex';
  activeChat.style.flexDirection='column';
  var avatarHtml=other.photo_url?'<img src="'+other.photo_url+'" alt="'+other.name+'" style="width:36px;height:36px;border-radius:50%;object-fit:cover">':other.name.charAt(0);
  document.getElementById('chat-header').innerHTML='<div class="chat-avatar">'+avatarHtml+'</div><div><div class="chat-name">'+other.name+'</div><div class="chat-code">'+other.biorhythm+' · '+other.generational+' · '+other.life_path+'</div></div>';
  await loadMessages(connectionId);
  subscribeToMessages(connectionId);
}

async function loadMessages(connectionId){
  var res=await supabase.from('messages').select('*').eq('connection_id',connectionId).order('created_at',{ascending:true});
  var container=document.getElementById('chat-messages');
  container.innerHTML='';
  if(res.data){
    res.data.forEach(function(msg){appendMessage(msg)});
    container.scrollTop=container.scrollHeight;
  }
  // Mark as read
  await supabase.from('messages').update({is_read:true}).eq('connection_id',connectionId).neq('sender_id',currentUser.id);
}

function appendMessage(msg){
  var container=document.getElementById('chat-messages');
  var div=document.createElement('div');
  var isSent=msg.sender_id===currentUser.id;
  div.className='msg-bubble '+(isSent?'sent':'received');
  var time=new Date(msg.created_at).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  div.innerHTML=msg.content+'<div class="msg-time">'+time+'</div>';
  container.appendChild(div);
  container.scrollTop=container.scrollHeight;
}

function subscribeToMessages(connectionId){
  if(realtimeChannel)supabase.removeChannel(realtimeChannel);
  realtimeChannel=supabase.channel('messages:'+connectionId).on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',filter:'connection_id=eq.'+connectionId},function(payload){
    if(payload.new.sender_id!==currentUser.id)appendMessage(payload.new);
  }).subscribe();
}

async function sendMessage(){
  var input=document.getElementById('msg-input');
  var content=input.value.trim();
  if(!content||!activeConnectionId)return;
  input.value='';
  var tempMsg={sender_id:currentUser.id,content:content,created_at:new Date().toISOString()};
  appendMessage(tempMsg);
  if(supabase){
    await supabase.from('messages').insert({connection_id:activeConnectionId,sender_id:currentUser.id,content:content});
  }
}

function handleKeyPress(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}}

function showDemoConversations(){
  var list=document.getElementById('conv-list');
  var demos=[{name:'Sofia',code:'2 · 5 · 7',preview:'Hey! I saw our compatibility code is 4·4·8...'},
    {name:'Marco',code:'3 · 6 · 9',preview:'That\'s such an interesting code!'}];
  demos.forEach(function(d){
    var item=document.createElement('div');
    item.className='conv-item';
    item.innerHTML='<div class="conv-avatar">'+d.name.charAt(0)+'</div><div class="conv-info"><div class="conv-name">'+d.name+'</div><div class="conv-preview">'+d.preview+'</div></div>';
    list.appendChild(item);
  });
}

document.addEventListener('DOMContentLoaded', function(){
  setTimeout(init, 100);
});
</script>
</body>
</html>
