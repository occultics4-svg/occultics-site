<style>
:root{--navy:#0a0e2e;--navy-light:#0f1538;--royal:#1a2aff;--electric:#2a7fff;--crystal:#4db8ff;--gray-mid:#8892a4;--gray-dim:rgba(136,146,164,0.4);--white:#fff;--card-bg:rgba(255,255,255,0.03);--card-border:rgba(77,184,255,0.1)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Montserrat',sans-serif;background:var(--navy);color:var(--white);min-height:100vh;display:flex;flex-direction:column}

/* NAV */
.app-nav{background:rgba(10,14,46,0.97);border-bottom:1px solid var(--card-border);padding:0 24px;position:sticky;top:0;z-index:100;backdrop-filter:blur(16px)}
.nav-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:56px}
.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none}
.nav-logo svg{width:20px;height:24px}
.nav-logo span{font-weight:700;font-size:11px;letter-spacing:3px;color:var(--white)}
.nav-links{display:flex;gap:4px}
.nav-link{padding:8px 16px;border-radius:8px;font-size:11px;letter-spacing:1px;font-weight:600;color:var(--gray-mid);text-decoration:none;transition:all .2s}
.nav-link:hover{color:var(--white);background:rgba(255,255,255,0.04)}
.nav-link.active{color:var(--crystal);background:rgba(77,184,255,0.08)}
.nav-avatar{width:32px;height:32px;border-radius:50%;background:rgba(26,42,255,0.3);border:1.5px solid rgba(77,184,255,0.3);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--crystal);cursor:pointer;overflow:hidden}
.nav-avatar img{width:100%;height:100%;object-fit:cover}

/* CHAT LAYOUT */
.chat-layout{flex:1;display:grid;grid-template-columns:320px 1fr;max-width:1100px;margin:0 auto;width:100%}
@media(max-width:800px){.chat-layout{grid-template-columns:1fr}.convo-list{display:none}.convo-list.mobile-show{display:block;position:fixed;inset:0;z-index:150;background:var(--navy)}.chat-panel.no-convo{display:none}}

/* CONVERSATION LIST */
.convo-list{border-right:1px solid var(--card-border);overflow-y:auto;height:calc(100vh - 56px)}
.convo-header{padding:20px 20px 12px;border-bottom:1px solid rgba(77,184,255,0.06)}
.convo-header-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300;margin-bottom:8px}
.convo-search{width:100%;padding:8px 12px;background:rgba(255,255,255,0.04);border:1px solid rgba(77,184,255,0.1);border-radius:8px;color:var(--white);font-family:'Montserrat',sans-serif;font-size:11px;outline:none}
.convo-search::placeholder{color:var(--gray-dim)}
.convo-search:focus{border-color:var(--crystal)}
.convo-item{display:flex;align-items:center;gap:12px;padding:14px 20px;cursor:pointer;transition:background .15s;border-bottom:1px solid rgba(255,255,255,0.02)}
.convo-item:hover{background:rgba(255,255,255,0.03)}
.convo-item.active{background:rgba(26,42,255,0.1);border-left:2px solid var(--crystal)}
.convo-avatar{width:40px;height:40px;border-radius:50%;background:rgba(26,42,255,0.2);border:1.5px solid rgba(77,184,255,0.2);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--crystal);flex-shrink:0;overflow:hidden}
.convo-avatar img{width:100%;height:100%;object-fit:cover}
.convo-info{flex:1;min-width:0}
.convo-name{font-size:12px;font-weight:600;margin-bottom:2px;display:flex;align-items:center;gap:6px}
.convo-name .score{font-size:9px;color:var(--crystal);font-weight:400}
.convo-last{font-size:11px;color:var(--gray-mid);font-weight:300;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.convo-time{font-size:9px;color:var(--gray-dim);flex-shrink:0}
.convo-unread{width:8px;height:8px;border-radius:50%;background:var(--crystal);flex-shrink:0}
.convo-empty{text-align:center;padding:60px 20px;font-size:12px;color:var(--gray-mid)}

/* CHAT PANEL */
.chat-panel{display:flex;flex-direction:column;height:calc(100vh - 56px)}
.chat-header{padding:14px 24px;border-bottom:1px solid var(--card-border);display:flex;align-items:center;gap:14px;background:rgba(10,14,46,0.5)}
.chat-back{display:none;background:none;border:none;color:var(--gray-mid);font-size:18px;cursor:pointer;padding:4px 8px}
@media(max-width:800px){.chat-back{display:block}}
.chat-header-avatar{width:36px;height:36px;border-radius:50%;background:rgba(26,42,255,0.2);border:1.5px solid rgba(77,184,255,0.2);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:14px;color:var(--crystal);overflow:hidden}
.chat-header-avatar img{width:100%;height:100%;object-fit:cover}
.chat-header-info{flex:1}
.chat-header-name{font-size:13px;font-weight:600}
.chat-header-sub{font-size:10px;color:var(--gray-mid)}
.chat-header-score{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--crystal)}

/* MESSAGES */
.chat-messages{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:12px}
.msg-row{display:flex;gap:8px;max-width:75%}
.msg-row.mine{align-self:flex-end;flex-direction:row-reverse}
.msg-row.theirs{align-self:flex-start}
.msg-bubble{padding:12px 16px;border-radius:16px;font-size:13px;line-height:1.6;font-weight:300}
.msg-row.mine .msg-bubble{background:var(--royal);color:var(--white);border-bottom-right-radius:4px}
.msg-row.theirs .msg-bubble{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.85);border-bottom-left-radius:4px}
.msg-time{font-size:9px;color:var(--gray-dim);align-self:flex-end;margin:0 4px}
.msg-date-sep{text-align:center;font-size:10px;color:var(--gray-dim);padding:8px;letter-spacing:1px}

/* CHAT INPUT */
.chat-input-wrap{padding:16px 24px;border-top:1px solid var(--card-border);display:flex;gap:10px;background:rgba(10,14,46,0.8)}
.chat-input{flex:1;padding:12px 16px;background:rgba(255,255,255,0.05);border:1.5px solid rgba(77,184,255,0.15);border-radius:12px;color:var(--white);font-family:'Montserrat',sans-serif;font-size:13px;outline:none;resize:none;max-height:100px}
.chat-input::placeholder{color:var(--gray-dim)}
.chat-input:focus{border-color:var(--crystal)}
.chat-send{padding:12px 20px;background:var(--royal);border:none;border-radius:12px;color:var(--white);font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;font-family:'Montserrat',sans-serif;letter-spacing:1px}
.chat-send:hover{background:#1420cc}
.chat-send:disabled{opacity:0.4;cursor:not-allowed}

/* EMPTY CHAT */
.chat-empty{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;padding:40px}
.chat-empty-inner{max-width:300px}
.chat-empty-icon{font-size:40px;margin-bottom:16px;opacity:0.3}
.chat-empty-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;margin-bottom:8px;color:var(--gray-mid)}
.chat-empty-sub{font-size:11px;color:var(--gray-dim);line-height:1.7}
</style>
<script src="/match/i18n.js"></script>
</head>

      <svg viewBox="0 0 80 100" fill="none"><polygon points="40,2 78,30 40,98 2,30" fill="#1a2aff" opacity="0.12"/><polygon points="40,2 78,30 40,50" fill="#1a2aff" opacity="0.55"/><polygon points="40,2 2,30 40,50" fill="#4db8ff" opacity="0.65"/><polygon points="2,30 40,50 40,98" fill="#1a2aff" opacity="0.35"/><polygon points="78,30 40,50 40,98" fill="#2a7fff" opacity="0.45"/></svg>

<div class="chat-layout">

  <!-- CONVERSATION LIST -->
  <div class="convo-list" id="convo-list">
    <div class="convo-header">
      <div class="convo-header-title">Messages</div>
      <input type="text" class="convo-search" placeholder="Search conversations..." oninput="searchConvos(this.value)">
    </div>
    <div id="convo-items"></div>
  </div>

  <!-- CHAT PANEL -->
  <div class="chat-panel" id="chat-panel">
    <div class="chat-empty" id="chat-empty">
      <div class="chat-empty-inner">
        <div class="chat-empty-icon">✦</div>
        <div class="chat-empty-title">Select a conversation</div>
        <div class="chat-empty-sub">Choose a match from the left to start chatting, or <a href="/match/dashboard.html" style="color:var(--crystal)">find new matches</a>.</div>
      </div>

    <div id="chat-active" style="display:none;flex-direction:column;height:100%">
      <div class="chat-header" id="chat-header">

          <div class="chat-header-name" id="chat-name">—</div>

        <div class="chat-header-score" id="chat-score">—</div>

      </div>

</div>

<script>
var SUPABASE_URL = 'https://dtquqaridqyjdgirjczr.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR0cXVxYXJpZHF5amRnaXJqY3pyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3ODYzMjIsImV4cCI6MjA5MDM2MjMyMn0.dp8Xp2mpGZLAr9S-_ZwxYMfUrYKCQLDqcoTwGu3Rp8k';
var _supaLib2 = window.supabase;
var sb = null;
var myProfile = null;
var myUserId = null;
var conversations = [];
var activeConvoUserId = null;
var profilesCache = {};
var realtimeSub = null;

try { if(_supaLib2 && typeof _supaLib2.createClient === "function") sb = _supaLib2.createClient(SUPABASE_URL, SUPABASE_KEY); } catch(e) {}

function r(n){n=Math.abs(n);while(n>9)n=String(n).split('').reduce(function(s,d){return s+parseInt(d)},0);return n}

function calcCompatScore(me, them) {
  if(!me || !them) return {score:50,synCode:'?.?.?'};
  var synBio = r(me.biorhythm + them.biorhythm);
  var synGen = r(me.generational + them.generational);
  var synLP = r(me.life_path + them.life_path);
  var code = ''+synBio+synGen+synLP;
  var score = 50;
  var bestCodes = ['448','268','369','134','246','562','459','628'];
  var goodCodes = ['123','156','358','573','584','854','865','966'];
  var hardCodes = ['911','955','775','797','189','898'];
  if(bestCodes.indexOf(code) > -1) score = 92 + Math.floor(Math.random()*6);
  else if(goodCodes.indexOf(code) > -1) score = 78 + Math.floor(Math.random()*10);
  else if(hardCodes.indexOf(code) > -1) score = 35 + Math.floor(Math.random()*15);
  else score = 55 + Math.floor(Math.random()*25);
  if(me.biorhythm === them.biorhythm) score = Math.min(99, score + 12);
  return {score:Math.min(99,Math.max(20,score)), synCode:synBio+'.'+synGen+'.'+synLP};
}

function getInitial(name) { return name ? name.charAt(0).toUpperCase() : '?'; }
function formatTime(ts) {
  if(!ts) return '';
  var d = new Date(ts);
  var now = new Date();
  if(d.toDateString() === now.toDateString()) return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  var yesterday = new Date(now); yesterday.setDate(yesterday.getDate()-1);
  if(d.toDateString() === yesterday.toDateString()) return 'Yesterday';
  return d.toLocaleDateString([],{month:'short',day:'numeric'});
}

// ---- RENDER CONVERSATION LIST ----
function renderConvoList(convos) {
  var container = document.getElementById('convo-items');
  if(!convos.length) {
    container.innerHTML = '<div class="convo-empty">No conversations yet.<br><a href="/match/dashboard.html" style="color:var(--crystal)">Find matches to message</a></div>';
    return;
  }
  var html = '';
  convos.forEach(function(c) {
    var p = c.profile;
    var isActive = c.userId === activeConvoUserId;
    var avatarHtml = p && p.photo_url ? '<img src="'+p.photo_url+'" alt="">' : getInitial(p ? p.name : '?');
    var score = p ? calcCompatScore(myProfile, p).score : '?';
    html += '<div class="convo-item'+(isActive?' active':'')+'" onclick="openConvo(\''+c.userId+'\')">';
    html += '<div class="convo-avatar">'+avatarHtml+'</div>';
    html += '<div class="convo-info">';
    html += '<div class="convo-name">'+(p?p.name:'Unknown')+' <span class="score">'+score+'%</span></div>';
    html += '<div class="convo-last">'+(c.lastMsg||'Start a conversation...')+'</div>';
    html += '</div>';
    if(c.lastTime) html += '<div class="convo-time">'+formatTime(c.lastTime)+'</div>';
    if(c.unread) html += '<div class="convo-unread"></div>';
    html += '</div>';
  });
  container.innerHTML = html;
}

function searchConvos(query) {
  if(!query) { renderConvoList(conversations); return; }
  var q = query.toLowerCase();
  var filtered = conversations.filter(function(c){ return c.profile && c.profile.name.toLowerCase().indexOf(q) > -1; });
  renderConvoList(filtered);
}

// ---- OPEN CONVERSATION ----
async function openConvo(userId) {
  activeConvoUserId = userId;
  document.getElementById('chat-empty').style.display = 'none';
  document.getElementById('chat-active').style.display = 'flex';

  // On mobile, hide conversation list
  if(window.innerWidth <= 800) {
    document.getElementById('convo-list').classList.remove('mobile-show');
  }

  // Highlight active convo
  renderConvoList(conversations);

  // Load profile
  var profile = profilesCache[userId];
  if(!profile) {
    var res = await sb.from('profiles').select('*').eq('user_id', userId).single();
    if(res.data) { profile = res.data; profilesCache[userId] = profile; }
  }

  if(profile) {
    document.getElementById('chat-name').textContent = profile.name;
    document.getElementById('chat-sub').textContent = profile.pythagorean_code + ' · Synastry ' + calcCompatScore(myProfile, profile).synCode;
    document.getElementById('chat-score').textContent = calcCompatScore(myProfile, profile).score + '%';
    var avatarEl = document.getElementById('chat-avatar');
    avatarEl.innerHTML = profile.photo_url ? '<img src="'+profile.photo_url+'" alt="">' : getInitial(profile.name);
  }

  // Load messages
  var msgRes = await sb.from('messages').select('*')
    .or('and(sender_id.eq.'+myUserId+',receiver_id.eq.'+userId+'),and(sender_id.eq.'+userId+',receiver_id.eq.'+myUserId+')')
    .order('created_at', {ascending:true});

  renderMessages(msgRes.data || []);

  // Mark as read
  await sb.from('messages').update({is_read:true}).eq('receiver_id', myUserId).eq('sender_id', userId).eq('is_read', false);

  // Subscribe to new messages in this conversation
  if(realtimeSub) realtimeSub.unsubscribe();
  realtimeSub = sb.channel('msgs-'+userId).on('postgres_changes', {
    event: 'INSERT',
    schema: 'public',
    table: 'messages',
    filter: 'receiver_id=eq.'+myUserId
  }, function(payload) {
    if(payload.new.sender_id === activeConvoUserId) {
      appendMessage(payload.new);
      sb.from('messages').update({is_read:true}).eq('id', payload.new.id);
    }
    loadConversations(); // refresh sidebar
  }).subscribe();
}

function renderMessages(msgs) {
  var container = document.getElementById('chat-messages');
  if(!msgs.length) {
    container.innerHTML = '<div style="text-align:center;padding:40px;font-size:12px;color:var(--gray-dim)">No messages yet. Say hello!</div>';
    return;
  }
  var html = '';
  var lastDate = '';
  msgs.forEach(function(m) {
    var d = new Date(m.created_at);
    var dateStr = d.toLocaleDateString([],{month:'long',day:'numeric',year:'numeric'});
    if(dateStr !== lastDate) {
      html += '<div class="msg-date-sep">'+dateStr+'</div>';
      lastDate = dateStr;
    }
    var isMine = m.sender_id === myUserId;
    html += '<div class="msg-row '+(isMine?'mine':'theirs')+'">';
    html += '<div class="msg-bubble">'+escapeHtml(m.content)+'</div>';
    html += '<div class="msg-time">'+d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})+'</div>';
    html += '</div>';
  });
  container.innerHTML = html;
  container.scrollTop = container.scrollHeight;
}

function appendMessage(msg) {
  var container = document.getElementById('chat-messages');
  var noMsgDiv = container.querySelector('div[style*="text-align:center"]');
  if(noMsgDiv) noMsgDiv.remove();
  var d = new Date(msg.created_at);
  var isMine = msg.sender_id === myUserId;
  var el = document.createElement('div');
  el.className = 'msg-row ' + (isMine ? 'mine' : 'theirs');
  el.innerHTML = '<div class="msg-bubble">'+escapeHtml(msg.content)+'</div><div class="msg-time">'+d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})+'</div>';
  container.appendChild(el);
  container.scrollTop = container.scrollHeight;
}

function escapeHtml(str) {
  var div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ---- SEND MESSAGE ----
async function sendMessage() {
  var input = document.getElementById('chat-input');
  var text = input.value.trim();
  if(!text || !activeConvoUserId) return;

  input.value = '';
  document.getElementById('send-btn').disabled = true;

  var msg = {
    sender_id: myUserId,
    receiver_id: activeConvoUserId,
    content: text,
    is_read: false
  };

  var res = await sb.from('messages').insert(msg).select().single();
  if(res.data) {
    appendMessage(res.data);
    loadConversations(); // refresh sidebar
  }

  document.getElementById('send-btn').disabled = false;
  input.focus();
}

function handleKey(e) {
  if(e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function showConvoList() {
  document.getElementById('convo-list').classList.add('mobile-show');
}

// ---- LOAD CONVERSATIONS ----
async function loadConversations() {
  // Get all messages involving this user
  var res = await sb.from('messages').select('*')
    .or('sender_id.eq.'+myUserId+',receiver_id.eq.'+myUserId)
    .order('created_at', {ascending:false});

  if(!res.data) { renderConvoList([]); return; }

  // Group by conversation partner
  var convoMap = {};
  res.data.forEach(function(m) {
    var partnerId = m.sender_id === myUserId ? m.receiver_id : m.sender_id;
    if(!convoMap[partnerId]) {
      convoMap[partnerId] = {
        userId: partnerId,
        lastMsg: m.content,
        lastTime: m.created_at,
        unread: m.receiver_id === myUserId && !m.is_read
      };
    }
  });

  // Also add matches who haven't been messaged yet (from URL param)
  var params = new URLSearchParams(window.location.search);
  var targetUser = params.get('user');
  if(targetUser && !convoMap[targetUser]) {
    convoMap[targetUser] = { userId: targetUser, lastMsg: '', lastTime: null, is_read: false };
  }

  // Load profiles for each conversation partner
  var userIds = Object.keys(convoMap);
  if(userIds.length) {
    var profileRes = await sb.from('profiles').select('*').in('user_id', userIds);
    if(profileRes.data) {
      profileRes.data.forEach(function(p) {
        profilesCache[p.user_id] = p;
        if(convoMap[p.user_id]) convoMap[p.user_id].profile = p;
      });
    }
  }

  conversations = Object.values(convoMap).sort(function(a,b) {
    return (b.lastTime||'') > (a.lastTime||'') ? 1 : -1;
  });

  renderConvoList(conversations);

  // Auto-open conversation if user param in URL
  if(targetUser) {
    openConvo(targetUser);
  }
}

// ---- INIT ----
async function init() {
  if(!sb) return;

  var session = await sb.auth.getSession();
  if(!session.data.session) {
    window.location.href = '/match/login.html';
    return;
  }

  myUserId = session.data.session.user.id;

  var res = await sb.from('profiles').select('*').eq('user_id', myUserId).single();
  if(res.error || !res.data) {
    window.location.href = '/match/login.html';
    return;
  }
  myProfile = res.data;

  var navAvatar = document.getElementById('nav-avatar');
  if(myProfile.photo_url) navAvatar.innerHTML = '<img src="'+myProfile.photo_url+'" alt="">';
  else navAvatar.textContent = getInitial(myProfile.name);

  await loadConversations();
}

init();
</script>
