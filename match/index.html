<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Occultics — your numbers introduce you</title>
<link rel="manifest" href='data:application/manifest+json,{"name":"Occultics","short_name":"Occultics","start_url":".","display":"standalone","background_color":"%23f5f0e8","theme_color":"%231a1a2e","icons":[{"src":"data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 192 192%27%3E%3Crect width=%27192%27 height=%27192%27 rx=%2742%27 fill=%27%231a1a2e%27/%3E%3Ccircle cx=%2780%27 cy=%2796%27 r=%2740%27 fill=%27none%27 stroke=%27%234db8ff%27 stroke-width=%274%27/%3E%3Ccircle cx=%27112%27 cy=%2796%27 r=%2740%27 fill=%27none%27 stroke=%27%234db8ff%27 stroke-width=%274%27/%3E%3C/svg%3E","sizes":"192x192","type":"image/svg+xml"}]}'>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;1,6..72,300;1,6..72,400&display=swap" rel="stylesheet">
<style>
  :root{--bg:#f5f0e8;--card:#fff;--border:rgba(10,14,46,.08);--ink:#1a1a2e;--text:#2d3142;--dim:#5b6070;--muted:#9a8f7b;--crystal:#4db8ff;--deep:#1a2aff;--gold:#b08d4f;--rose:#f472b6;--purple:#a78bfa}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Space Grotesk',system-ui,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
  .serif{font-family:'Newsreader',Georgia,serif}
  .app{max-width:440px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;position:relative}
  .hide{display:none!important}
  .ic{font-style:normal}

  /* onboard */
  #onboard{padding:64px 26px 40px;text-align:center;flex:1;display:flex;flex-direction:column;justify-content:center}
  .wm{font-size:11px;letter-spacing:4px;color:var(--gold);text-transform:uppercase;font-weight:600;margin-bottom:24px}
  #onboard h1{font-family:'Newsreader',Georgia,serif;font-weight:300;font-size:34px;line-height:1.12;color:var(--ink);margin-bottom:10px}
  #onboard h1 em{font-style:italic;color:var(--crystal)}
  #onboard .p{font-size:15px;color:var(--dim);margin-bottom:28px;line-height:1.6}
  .field{margin-bottom:14px;text-align:left}
  .field label{font-size:12px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;font-weight:600;display:block;margin-bottom:6px}
  input{width:100%;font-family:inherit;font-size:16px;padding:14px 15px;border:1px solid var(--border);border-radius:13px;background:#fff;color:var(--text)}
  input:focus{outline:none;border-color:var(--crystal)}
  .chips{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px}
  .chip{border:1px solid var(--border);border-radius:20px;padding:11px 8px;text-align:center;font-size:13px;color:var(--dim);cursor:pointer;background:#fff;transition:all .15s}
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .chip.wide{grid-column:1/3}
  .btn{width:100%;background:var(--deep);color:#fff;border:none;border-radius:100px;padding:16px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;margin-top:22px;transition:all .15s}
  .btn:disabled{opacity:.4;cursor:default}
  .btn.ghost{background:transparent;color:var(--dim);border:1px solid var(--border);margin-top:10px}
  .btn.dark{background:var(--ink)}
  .fine{font-size:12px;color:var(--muted);margin-top:16px}

  /* header */
  header.bar{display:flex;align-items:center;justify-content:space-between;padding:18px 22px 12px;position:sticky;top:0;background:var(--bg);z-index:10}
  .logo{font-size:12px;letter-spacing:3px;font-weight:700;color:var(--ink);text-transform:uppercase}
  .codechip{font-size:12px;color:var(--crystal);font-weight:600;background:rgba(77,184,255,.1);padding:5px 11px;border-radius:20px;letter-spacing:1px}
  main{flex:1;padding:6px 22px 100px;overflow-y:auto}

  /* intro card */
  .lead{text-align:center;margin:8px 0 18px}
  .lead .eye{font-size:11px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;font-weight:600;margin-bottom:6px}
  .lead h2{font-family:'Newsreader',Georgia,serif;font-weight:300;font-size:26px;color:var(--ink)}
  .intro{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:26px 22px;text-align:center;box-shadow:0 20px 50px rgba(10,14,46,.06)}
  .av{width:74px;height:74px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;font-family:'Newsreader',serif;color:#fff;margin:0 auto 12px}
  .nm{font-family:'Newsreader',Georgia,serif;font-size:24px;color:var(--ink)}
  .tag{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:3px 9px;border-radius:20px;vertical-align:middle;margin-left:6px}
  .bio{font-size:14px;color:var(--dim);margin:6px 0 16px}
  .codeline{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:16px}
  .codeb{text-align:center}
  .codeb .n{font-family:'Newsreader',serif;font-size:22px;color:var(--ink)}
  .codeb .l{font-size:10px;letter-spacing:1px;color:var(--muted);text-transform:uppercase}
  .plus{color:var(--crystal);font-size:20px}
  .why{background:#eef7ff;border:1px solid #d4ecff;border-radius:14px;padding:14px 15px;text-align:left;margin-bottom:6px}
  .why .k{font-size:10px;letter-spacing:1.5px;color:var(--gold);text-transform:uppercase;font-weight:600;margin-bottom:5px}
  .why .v{font-family:'Newsreader',Georgia,serif;font-size:17px;color:var(--ink);line-height:1.4}
  .rcrow{display:flex;align-items:center;justify-content:center;gap:7px;margin:14px 0 4px;color:var(--muted);font-size:12px;letter-spacing:1px}
  .rctri{font-family:'Newsreader',serif;font-size:18px;color:var(--crystal);letter-spacing:2px}
  .acts{margin-top:18px}
  .small{text-align:center;font-size:12px;color:var(--muted);margin-top:14px}

  /* pending + mutual overlay */
  .pending{text-align:center;padding:60px 20px}
  .pending .ring{width:54px;height:54px;border:3px solid rgba(77,184,255,.25);border-top-color:var(--crystal);border-radius:50%;margin:0 auto 18px;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .pending p{font-family:'Newsreader',serif;font-size:20px;color:var(--ink)}
  .pending .s{font-size:13px;color:var(--dim);margin-top:6px}

  .mutual{text-align:center}
  .mutual .spark{font-size:30px;color:var(--crystal)}
  .mutual h2{font-family:'Newsreader',Georgia,serif;font-weight:300;font-size:30px;color:var(--ink);margin:4px 0 4px}
  .mutual .sub{font-size:14px;color:var(--dim);margin-bottom:18px}
  .pair{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:16px}
  .pair .heart{color:var(--crystal);font-size:18px}
  .opener{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:15px 16px;text-align:left;margin-bottom:6px}
  .opener .k{font-size:10px;letter-spacing:1.5px;color:var(--gold);text-transform:uppercase;font-weight:600;margin-bottom:5px}
  .opener .v{font-family:'Newsreader',Georgia,serif;font-size:18px;color:var(--ink);line-height:1.4}

  /* empty / lists */
  .empty{text-align:center;padding:70px 20px;color:var(--dim)}
  .empty .big{font-family:'Newsreader',serif;font-size:24px;color:var(--ink);margin-bottom:8px}
  .conn{display:flex;align-items:center;gap:13px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px;margin-bottom:10px}
  .conn .ci{flex:1}
  .conn .cn{font-family:'Newsreader',serif;font-size:18px;color:var(--ink)}
  .conn .cw{font-size:13px;color:var(--dim);margin-top:2px}
  .conn .cs{font-size:11px;color:var(--crystal);font-weight:600;letter-spacing:1px}

  /* you */
  .me-head{text-align:center;padding:18px 0 8px}
  .me-code{display:flex;gap:14px;justify-content:center;margin:14px 0}
  .me-num{width:72px;height:72px;border-radius:50%;border:1.5px solid var(--crystal);display:flex;flex-direction:column;align-items:center;justify-content:center;background:#fff}
  .me-num b{font-family:'Newsreader',serif;font-weight:300;font-size:32px;color:var(--crystal)}
  .me-num span{font-size:8px;letter-spacing:1px;color:var(--gold);margin-top:3px}

  /* nav */
  nav{position:sticky;bottom:0;display:flex;background:#fff;border-top:1px solid var(--border);padding:8px 0 calc(8px + env(safe-area-inset-bottom))}
  nav button{flex:1;background:none;border:none;font-family:inherit;font-size:11px;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px}
  nav button .ic{font-size:18px}
  nav button.on{color:var(--crystal)}
</style>
</head>
<body>
<div class="app">

  <!-- ONBOARD -->
  <section id="onboard">
    <div class="wm">Occultics</div>
    <h1 class="serif">Let your numbers <em>introduce you.</em></h1>
    <p class="p">No swiping. No feed. We bring you one person at a time — and tell you why you fit.</p>
    <div class="field"><label>Your name</label><input id="inName" placeholder="Your first name" autocomplete="off"></div>
    <div class="field"><label>Your birthday</label><input id="inDob" type="date" min="1925-01-01" max="2010-12-31"></div>
    <div class="field"><label>I'm open to meeting</label>
      <div class="chips" id="openPick">
        <div class="chip" data-m="friends">A kindred friend</div>
        <div class="chip" data-m="more">Something more</div>
        <div class="chip wide on" data-m="open">Whoever my numbers find</div>
      </div>
    </div>
    <button class="btn" id="goBtn" disabled>Find my person</button>
    <p class="fine">Demo · everyone here is fictional · nothing leaves this page</p>
  </section>

  <!-- MAIN -->
  <header class="bar hide" id="bar">
    <span class="logo">Occultics</span>
    <span class="codechip" id="codechip"></span>
  </header>
  <main class="hide" id="main"></main>

  <nav class="hide" id="nav">
    <button data-nav="intro" class="on"><span class="ic">✦</span>Introductions</button>
    <button data-nav="conn"><span class="ic">♡</span>Connections</button>
    <button data-nav="me"><span class="ic">○</span>You</button>
  </nav>
</div>

<script>
/* ---------- numerology engine (Adriana Saj system) ---------- */
function digitSum(n){n=Math.abs(parseInt(n,10));var s=0;while(n>0){s+=n%10;n=Math.floor(n/10);}return s;}
function reduce(n){while(n>9){n=digitSum(n);}return n;}
function codeFromDob(dob){var p=dob.split('-');var d=+p[2],m=+p[1],y=+p[0];var bio=reduce(digitSum(d)+digitSum(m));var gen=reduce(digitSum(y));var lp=reduce(bio+gen);return{bio:bio,gen:gen,lp:lp,str:bio+'·'+gen+'·'+lp,arr:[bio,gen,lp]};}
function relCode(a,b){var t=[0,1,2].map(function(i){return reduce(a.arr[i]+b.arr[i]);});return{arr:t,str:t.join('')};}
var SUM_MEAN={
 1:{q:80,t:"Stable and structured — one of you quietly leads. Built to endure."},
 2:{q:71,t:"Fated and emotional. Tender, and it asks you both to steady the feelings."},
 3:{q:88,t:"Warm, lucky, full of opportunity. Doors open when you're together."},
 4:{q:54,t:"A karmic teacher. Real and lasting, but it asks for patience."},
 5:{q:75,t:"Communication is the heart of it — ideas, freedom, movement, never dull."},
 6:{q:95,t:"Venus. Love, tenderness and mutual respect — one of the most beautiful matches there is."},
 7:{q:62,t:"Rooted in friendship more than fire. Wonderful allies; gentler as romance."},
 8:{q:78,t:"Passion, drive and ambition. Magnetic — you build things together."},
 9:{q:48,t:"Karmic and intense. A powerful pull with a lesson inside it."},
 0:{q:42,t:"Extremes — transformative or consuming. Eyes open."}
};
var GOODPAIRS={'1-3':6,'3-1':6,'2-6':8,'6-2':8,'3-9':9,'9-3':9,'4-8':6,'8-4':6,'5-7':7,'7-5':7,'1-1':3,'6-9':8,'9-6':8,'2-2':4,'1-5':4,'5-1':4};
function compatibility(me,them){
  var S=reduce(me.lp+them.lp);var base=(SUM_MEAN[S]||{q:60}).q;var rc=relCode(me,them);var bonus=0;
  rc.arr.forEach(function(n){if(n===4)bonus+=4;if(n===6)bonus+=4;if(n===2)bonus+=3;if(n===9)bonus-=4;if(n===0)bonus-=5;});
  bonus+=(GOODPAIRS[me.lp+'-'+them.lp]||0);
  var score=Math.max(40,Math.min(98,Math.round(base+bonus)));
  return{score:score,sum:S,rc:rc,why:(SUM_MEAN[S]||{t:"A distinctive connection with its own rhythm."}).t};
}
var OPENER={
 1:"What's something you're quietly building right now?",
 2:"What do you wish more people understood about you?",
 3:"What's the luckiest accident that ever happened to you?",
 4:"What's something worth being patient for?",
 5:"Where would you go if you could leave tomorrow?",
 6:"Who taught you what love is supposed to look like?",
 7:"What's a question you've never stopped asking?",
 8:"What are you most determined to build this year?",
 9:"What's something you've finally made peace with?",
 0:"What's a belief of yours that's completely changed?"
};

/* ---------- seeded fictional people ---------- */
var PEOPLE=[
 {n:"Maya",age:33,dob:"1992-09-14",bio:"Designer, always two cities at once.",m:"more",c:"#4db8ff"},
 {n:"Daniel",age:37,dob:"1988-06-22",bio:"Builds companies and bonfires.",m:"more",c:"#1a2aff"},
 {n:"Inna",age:43,dob:"1983-01-02",bio:"Painter. Tea before words.",m:"friends",c:"#a78bfa"},
 {n:"Mirko",age:43,dob:"1983-02-07",bio:"Quiet, funny, deeply loyal.",m:"more",c:"#f59e0b"},
 {n:"Noah",age:42,dob:"1983-06-02",bio:"Numbers by day, vinyl by night.",m:"friends",c:"#1a2aff"},
 {n:"Ava",age:35,dob:"1990-09-14",bio:"Reader, runner, romantic realist.",m:"more",c:"#f472b6"},
 {n:"Chloe",age:39,dob:"1986-01-02",bio:"Friends first, always.",m:"friends",c:"#4db8ff"},
 {n:"Tyler",age:35,dob:"1990-09-02",bio:"Photographer chasing good light.",m:"more",c:"#a78bfa"},
 {n:"Lena",age:34,dob:"1991-03-07",bio:"Therapist. Hears the unsaid.",m:"friends",c:"#4db8ff"},
 {n:"Marco",age:36,dob:"1989-11-19",bio:"Chef. Feeds the people he loves.",m:"more",c:"#f472b6"}
];
PEOPLE.forEach(function(p){p.code=codeFromDob(p.dob);});

/* ---------- state ---------- */
var ME=null,MY=null,OPEN='open',QUEUE=[],PTR=0,CONN=[],VIEW='intro';
var $=function(s){return document.querySelector(s);};
function tagFor(m){return m==='more'?{t:'Open to more',c:'#f472b6'}:m==='friends'?{t:'Friendship',c:'#4db8ff'}:{t:'Open',c:'#9a8f7b'};}

/* onboard interactions */
$('#openPick').addEventListener('click',function(e){var el=e.target.closest('.chip');if(!el)return;[].forEach.call(this.children,function(c){c.classList.remove('on');});el.classList.add('on');OPEN=el.dataset.m;});
function ready(){$('#goBtn').disabled=!($('#inName').value.trim()&&$('#inDob').value);}
$('#inName').addEventListener('input',ready);$('#inDob').addEventListener('input',ready);

$('#goBtn').addEventListener('click',function(){
  ME=$('#inName').value.trim();MY=codeFromDob($('#inDob').value);
  $('#codechip').textContent=MY.str;
  var pool=PEOPLE.filter(function(p){return OPEN==='open'?true:p.m===OPEN||p.m==='open';});
  pool=pool.map(function(p){return{p:p,comp:compatibility(MY,p.code)};}).sort(function(a,b){return b.comp.score-a.comp.score;});
  QUEUE=pool;PTR=0;
  $('#onboard').classList.add('hide');
  ['#bar','#main','#nav'].forEach(function(s){$(s).classList.remove('hide');});
  go('intro');
});

/* nav */
$('#nav').addEventListener('click',function(e){var b=e.target.closest('button');if(!b)return;go(b.dataset.nav);});
function go(v){VIEW=v;[].forEach.call($('#nav').children,function(b){b.classList.toggle('on',b.dataset.nav===v);});
  if(v==='intro')renderIntro();else if(v==='conn')renderConn();else renderMe();}

/* ---------- introductions ---------- */
function renderIntro(){
  if(PTR>=QUEUE.length){
    $('#main').innerHTML='<div class="empty"><div class="big serif">That\'s everyone, for now.</div><p>We\'ll find your next person soon. Real introductions arrive a few at a time — never an endless feed.</p></div>';
    return;
  }
  var r=QUEUE[PTR],p=r.p,comp=r.comp,tg=tagFor(p.m);
  $('#main').innerHTML=
   '<div class="lead"><div class="eye">A new introduction</div><h2 class="serif">We found someone.</h2></div>'+
   '<div class="intro">'+
     '<div class="av" style="background:'+p.c+'">'+p.n[0]+'</div>'+
     '<div class="nm serif">'+p.n+', '+p.age+'<span class="tag" style="background:'+tg.c+'22;color:'+tg.c+'">'+tg.t+'</span></div>'+
     '<div class="bio">'+p.bio+'</div>'+
     '<div class="codeline"><div class="codeb"><div class="n">'+MY.str+'</div><div class="l">you</div></div><div class="plus">+</div><div class="codeb"><div class="n">'+p.code.str+'</div><div class="l">'+p.n+'</div></div></div>'+
     '<div class="why"><div class="k">Why your numbers fit</div><div class="v serif">'+comp.why+'</div></div>'+
     '<div class="rcrow">your relationship code <span class="rctri">'+comp.rc.str+'</span></div>'+
     '<div class="acts"><button class="btn" id="yesBtn">Yes, introduce us</button><button class="btn ghost" id="noBtn">Not this time</button></div>'+
   '</div>'+
   '<div class="small">Only you two are seeing this. Nothing happens unless you both say yes.</div>';
  $('#yesBtn').addEventListener('click',function(){sendIntro(r);});
  $('#noBtn').addEventListener('click',function(){PTR++;renderIntro();});
}

function sendIntro(r){
  var p=r.p;
  $('#main').innerHTML='<div class="pending"><div class="ring"></div><p class="serif">Asking '+p.n+'…</p><div class="s">An introduction only opens if you both say yes.</div></div>';
  setTimeout(function(){
    var theyYes=Math.random() < (0.55 + r.comp.score/220); // weighted by compatibility
    if(theyYes){ CONN.push(r); mutual(r); }
    else{ noFromThem(r); }
  },1400);
}

function mutual(r){
  var p=r.p,comp=r.comp;
  $('#main').innerHTML=
   '<div class="mutual" style="padding-top:20px">'+
     '<div class="spark">✦</div><h2 class="serif">It\'s mutual.</h2>'+
     '<div class="sub">You and '+p.n+' both said yes.</div>'+
     '<div class="pair"><div class="av" style="width:48px;height:48px;font-size:18px;background:'+'#cdbd9d'+'">'+ME[0].toUpperCase()+'</div><span class="heart">♥</span><div class="av" style="width:48px;height:48px;font-size:18px;background:'+p.c+'">'+p.n[0]+'</div></div>'+
     '<div class="opener"><div class="k">Start here</div><div class="v serif">"'+p.n+' — apparently we\'re a '+comp.rc.str+' together. '+OPENER[comp.sum]+'"</div></div>'+
     '<div class="acts"><button class="btn dark" id="helloBtn">Say hello to '+p.n+'</button><button class="btn ghost" id="nextBtn">Next introduction</button></div>'+
     '<div class="small">Tip: the best connections move to a real experience fast.</div>'+
   '</div>';
  $('#helloBtn').addEventListener('click',function(){go('conn');});
  $('#nextBtn').addEventListener('click',function(){PTR++;go('intro');});
}

function noFromThem(r){
  var p=r.p;
  $('#main').innerHTML=
   '<div class="empty"><div class="big serif">'+p.n+' isn\'t looking right now.</div>'+
   '<p>That\'s the honest part of real introductions — it only opens when you both feel it. Onward.</p>'+
   '<div class="acts" style="max-width:260px;margin:18px auto 0"><button class="btn" id="nextBtn">Next introduction</button></div></div>';
  $('#nextBtn').addEventListener('click',function(){PTR++;go('intro');});
}

/* ---------- connections ---------- */
function renderConn(){
  if(!CONN.length){$('#main').innerHTML='<div class="empty"><div class="big serif">No connections yet.</div><p>Say yes to an introduction — when they say yes back, they\'ll appear here.</p></div>';return;}
  $('#main').innerHTML='<div class="lead"><div class="eye">Your people</div><h2 class="serif">Connections</h2></div>'+
   CONN.map(function(r){var p=r.p;return '<div class="conn"><div class="av" style="width:46px;height:46px;font-size:18px;background:'+p.c+'">'+p.n[0]+'</div>'+
     '<div class="ci"><div class="cn serif">'+p.n+'</div><div class="cw">'+r.comp.why.split('.')[0]+'.</div></div>'+
     '<div class="cs">'+r.comp.rc.str+'</div></div>';}).join('');
}

/* ---------- you ---------- */
function renderMe(){
  $('#main').innerHTML='<div class="me-head"><div class="lead"><div class="eye">Your code</div><h2 class="serif">'+ME+'</h2></div>'+
   '<div class="me-code"><div class="me-num"><b>'+MY.bio+'</b><span>EVERYDAY</span></div><div class="me-num"><b>'+MY.gen+'</b><span>ROOTS</span></div><div class="me-num"><b>'+MY.lp+'</b><span>LIFE PATH</span></div></div>'+
   '<p style="font-size:14px;color:var(--dim);max-width:300px;margin:0 auto 18px;line-height:1.6">This is the code your introductions are chosen from. The deeper your reading, the better we match you.</p>'+
   '<div class="opener" style="max-width:320px;margin:0 auto;text-align:left"><div class="k">Open to</div><div class="v serif" style="font-size:16px">'+(OPEN==='friends'?'A kindred friend':OPEN==='more'?'Something more':'Whoever my numbers find')+'</div></div>'+
   '</div>';
}
</script>
</body>
</html>
