<style>
:root{--navy:#0a0e2e;--navy-light:#0f1538;--royal:#1a2aff;--electric:#2a7fff;--crystal:#4db8ff;--gray-mid:#8892a4;--gray-dim:rgba(136,146,164,0.4);--white:#fff;--card-bg:rgba(255,255,255,0.03);--card-border:rgba(77,184,255,0.1);--success:#4dffb8;--warning:#ffaa00;--danger:#ff4d6d}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Montserrat',sans-serif;background:var(--navy);color:var(--white);min-height:100vh}

/* NAV */
.app-nav{background:rgba(10,14,46,0.97);border-bottom:1px solid var(--card-border);padding:0 24px;position:sticky;top:0;z-index:100;backdrop-filter:blur(16px)}
.nav-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:56px}
.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none}
.nav-logo svg{width:20px;height:24px}
.nav-logo span{font-weight:700;font-size:11px;letter-spacing:3px;color:var(--white)}
.nav-links{display:flex;gap:4px}
.nav-link{padding:8px 16px;border-radius:8px;font-size:11px;letter-spacing:1px;font-weight:600;color:var(--gray-mid);text-decoration:none;transition:all .2s}
.nav-link:hover{color:var(--white);background:rgba(255,255,255,0.04)}
.nav-link.active{color:var(--crystal);background:rgba(77,184,255,0.08)}
.nav-avatar{width:32px;height:32px;border-radius:50%;background:rgba(26,42,255,0.3);border:1.5px solid rgba(77,184,255,0.3);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--crystal);cursor:pointer;overflow:hidden}
.nav-avatar img{width:100%;height:100%;object-fit:cover}

/* LAYOUT */
.app-layout{max-width:1100px;margin:0 auto;padding:32px 24px;display:grid;grid-template-columns:280px 1fr;gap:32px}
@media(max-width:800px){.app-layout{grid-template-columns:1fr;}.sidebar{order:2}}

/* SIDEBAR - YOUR PROFILE */
.sidebar{}
.profile-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:20px;padding:28px 24px;text-align:center;position:sticky;top:80px}
.profile-avatar{width:80px;height:80px;border-radius:50%;margin:0 auto 16px;background:rgba(26,42,255,0.2);border:2px solid rgba(77,184,255,0.25);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:28px;color:var(--crystal);overflow:hidden}
.profile-avatar img{width:100%;height:100%;object-fit:cover}
.profile-name{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;margin-bottom:4px}
.profile-code{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:var(--crystal);letter-spacing:8px;margin-bottom:12px}
.profile-code-label{font-size:8px;letter-spacing:2px;color:var(--gray-mid);text-transform:uppercase;margin-bottom:16px}
.profile-tags{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:16px}
.profile-tag{padding:4px 10px;border-radius:20px;font-size:9px;letter-spacing:1px;font-weight:600;text-transform:uppercase;border:1px solid rgba(77,184,255,0.2);color:var(--crystal)}
.profile-stat-row{display:flex;justify-content:space-around;padding:12px 0;border-top:1px solid rgba(77,184,255,0.06)}
.profile-stat{text-align:center}
.profile-stat-num{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--crystal)}
.profile-stat-label{font-size:8px;letter-spacing:1px;color:var(--gray-mid);text-transform:uppercase;margin-top:2px}
.edit-profile-btn{display:block;width:100%;padding:10px;background:transparent;color:var(--gray-mid);border:1px solid rgba(255,255,255,0.08);border-radius:8px;font-size:10px;letter-spacing:1px;font-weight:600;cursor:pointer;font-family:'Montserrat',sans-serif;text-transform:uppercase;transition:all .2s;margin-top:12px;text-decoration:none;text-align:center}
.edit-profile-btn:hover{border-color:rgba(77,184,255,0.3);color:var(--crystal)}

/* MAIN CONTENT */
.main-content{}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.section-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300}
.filter-row{display:flex;gap:8px;flex-wrap:wrap}
.filter-btn{padding:6px 14px;border-radius:20px;font-size:10px;letter-spacing:1px;font-weight:600;text-transform:uppercase;border:1px solid rgba(77,184,255,0.15);color:var(--gray-mid);background:transparent;cursor:pointer;transition:all .2s;font-family:'Montserrat',sans-serif}
.filter-btn:hover{border-color:rgba(77,184,255,0.4);color:var(--white)}
.filter-btn.active{border-color:var(--crystal);color:var(--crystal);background:rgba(77,184,255,0.08)}

/* MATCH CARDS */
.matches-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.match-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:16px;padding:24px;transition:all .25s;cursor:pointer;position:relative}
.match-card:hover{border-color:rgba(77,184,255,0.3);transform:translateY(-2px);background:rgba(255,255,255,0.05)}
.match-top{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.match-avatar{width:52px;height:52px;border-radius:50%;background:rgba(26,42,255,0.2);border:2px solid rgba(77,184,255,0.2);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--crystal);flex-shrink:0;overflow:hidden}
.match-avatar img{width:100%;height:100%;object-fit:cover}
.match-info{flex:1}
.match-name{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:400;margin-bottom:2px}
.match-meta{font-size:10px;color:var(--gray-mid)}
.match-score{position:absolute;top:16px;right:16px;text-align:center}
.match-score-num{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:300}
.match-score-num.high{color:var(--success)}
.match-score-num.mid{color:var(--warning)}
.match-score-num.low{color:var(--danger)}
.match-score-label{font-size:7px;letter-spacing:1px;color:var(--gray-mid);text-transform:uppercase}
.match-codes{display:flex;gap:8px;margin-bottom:12px}
.match-code-pill{padding:4px 10px;border-radius:6px;font-size:10px;font-family:'Cormorant Garamond',serif;font-weight:400;letter-spacing:3px;background:rgba(26,42,255,0.1);border:1px solid rgba(77,184,255,0.12);color:var(--crystal)}
.match-compat{font-size:10px;color:var(--crystal);background:rgba(77,184,255,0.06);border:1px solid rgba(77,184,255,0.1);border-radius:6px;padding:4px 10px}
.match-bio{font-size:11px;color:var(--gray-mid);line-height:1.6;font-weight:300;margin-bottom:14px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.match-tags{display:flex;gap:6px;margin-bottom:14px}
.match-tag{font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--gray-mid);padding:3px 8px;border:1px solid rgba(255,255,255,0.06);border-radius:12px}
.match-actions{display:flex;gap:8px}
.match-btn{flex:1;padding:10px;border-radius:8px;font-size:10px;letter-spacing:1px;font-weight:700;text-transform:uppercase;cursor:pointer;font-family:'Montserrat',sans-serif;transition:all .2s;border:none;text-align:center;text-decoration:none}
.match-btn.primary{background:var(--royal);color:var(--white)}
.match-btn.primary:hover{background:#1420cc}
.match-btn.secondary{background:transparent;color:var(--gray-mid);border:1px solid rgba(255,255,255,0.1)}
.match-btn.secondary:hover{border-color:rgba(77,184,255,0.3);color:var(--crystal)}

/* COMPATIBILITY DETAIL MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:var(--navy-light);border:1px solid var(--card-border);border-radius:20px;max-width:520px;width:100%;max-height:85vh;overflow-y:auto;padding:36px}
.modal-close{float:right;background:none;border:none;color:var(--gray-mid);font-size:20px;cursor:pointer;padding:4px 8px}
.modal-close:hover{color:var(--white)}

/* EMPTY STATE */
.empty-state{text-align:center;padding:80px 24px}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:0.3}
.empty-title{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:300;margin-bottom:8px;color:var(--gray-mid)}
.empty-sub{font-size:12px;color:var(--gray-dim);line-height:1.7}

/* LOADING */
.loading-spinner{text-align:center;padding:60px;font-size:11px;letter-spacing:3px;color:var(--crystal);text-transform:uppercase}

/* FOOTER */
.app-footer{text-align:center;padding:32px 24px;border-top:1px solid rgba(77,184,255,0.04);margin-top:48px}
.app-footer p{font-size:9px;color:rgba(255,255,255,0.1)}
</style>
</head>

<script>
var SUPABASE_URL = 'https://dtquqaridqyjdgirjczr.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR0cXVxYXJpZHF5amRnaXJqY3pyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3ODYzMjIsImV4cCI6MjA5MDM2MjMyMn0.dp8Xp2mpGZLAr9S-_ZwxYMfUrYKCQLDqcoTwGu3Rp8k';
var sb = null;
var myProfile = null;
var allMatches = [];

try {
  if(window.supabase) sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
} catch(e) {}

// ---- NUMEROLOGY ----
function r(n){n=Math.abs(n);while(n>9)n=String(n).split('').reduce(function(s,d){return s+parseInt(d)},0);return n}

// Compatibility score: 0-100 based on Pythagorean system
function calcCompatScore(me, them) {
  var synBio = r(me.biorhythm + them.biorhythm);
  var synGen = r(me.generational + them.generational);
  var synLP = r(me.life_path + them.life_path);
  var code = ''+synBio+synGen+synLP;
  
  var score = 50; // base

  // Best codes get high scores
  var bestCodes = ['448','268','369','134','246','562','459','628'];
  var goodCodes = ['123','156','358','573','584','854','865','966'];
  var hardCodes = ['911','955','775','797','189','898'];
  
  if(bestCodes.indexOf(code) > -1) score = 92 + Math.floor(Math.random()*6);
  else if(goodCodes.indexOf(code) > -1) score = 78 + Math.floor(Math.random()*10);
  else if(hardCodes.indexOf(code) > -1) score = 35 + Math.floor(Math.random()*15);
  else score = 55 + Math.floor(Math.random()*25);

  // Same biorhythm bonus
  if(me.biorhythm === them.biorhythm) score = Math.min(99, score + 12);

  // Vertical compatibility (LP combinations)
  var vertBest = [[1,9],[2,6],[2,9],[3,5],[3,9],[4,4],[4,8],[5,5],[5,7],[6,8]];
  var isVertBest = vertBest.some(function(pair){
    return (me.life_path===pair[0] && them.life_path===pair[1]) || (me.life_path===pair[1] && them.life_path===pair[0]);
  });
  if(isVertBest) score = Math.min(99, score + 8);

  return { score: Math.min(99, Math.max(20, score)), synCode: synBio+'.'+synGen+'.'+synLP, synBio:synBio, synGen:synGen, synLP:synLP };
}

function getScoreClass(score) {
  if(score >= 75) return 'high';
  if(score >= 50) return 'mid';
  return 'low';
}

function getAge(dob) {
  if(!dob) return '';
  var d = new Date(dob);
  var age = Math.floor((Date.now() - d.getTime()) / 31557600000);
  return age > 0 && age < 120 ? age : '';
}

function getInitial(name) {
  return name ? name.charAt(0).toUpperCase() : '?';
}

// ---- RENDER MATCHES ----
function renderMatches(matches) {
  var container = document.getElementById('matches-container');
  if(!matches.length) {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">✦</div><div class="empty-title">No matches yet</div><div class="empty-sub">Your profile is being matched with other members. New matches appear as members join. Check back soon.</div></div>';
    return;
  }

  var html = '<div class="matches-grid">';
  matches.forEach(function(m, idx) {
    var compat = calcCompatScore(myProfile, m);
    m._compat = compat;
    var age = getAge(m.date_of_birth);
    var scoreClass = getScoreClass(compat.score);
    var lookingFor = m.looking_for || [];
    if(typeof lookingFor === 'string') { try { lookingFor = JSON.parse(lookingFor); } catch(e) { lookingFor = [lookingFor]; } }
    var tagsHtml = lookingFor.map(function(t){ return '<div class="match-tag">'+t+'</div>'; }).join('');
    var avatarHtml = m.photo_url ? '<img src="'+m.photo_url+'" alt="">' : getInitial(m.name);

    html += '<div class="match-card" onclick="showCompatDetail('+idx+')">';
    html += '<div class="match-top">';
    html += '<div class="match-avatar">'+avatarHtml+'</div>';
    html += '<div class="match-info"><div class="match-name">'+m.name+(age?' <span style="font-size:13px;color:var(--gray-mid);font-family:Montserrat,sans-serif;font-weight:300">'+age+'</span>':'')+'</div>';
    html += '<div class="match-meta">'+m.pythagorean_code+' · '+(m.gender||'')+'</div></div>';
    html += '<div class="match-score"><div class="match-score-num '+scoreClass+'">'+compat.score+'</div><div class="match-score-label">Match</div></div>';
    html += '</div>';
    html += '<div class="match-codes">';
    html += '<div class="match-code-pill">'+m.pythagorean_code+'</div>';
    html += '<div class="match-compat">Synastry '+compat.synCode+'</div>';
    html += '</div>';
    if(m.bio) html += '<div class="match-bio">'+m.bio+'</div>';
    if(tagsHtml) html += '<div class="match-tags">'+tagsHtml+'</div>';
    html += '<div class="match-actions">';
    html += '<a href="/match/messages.html?user='+m.user_id+'" class="match-btn primary" onclick="event.stopPropagation()">Message</a>';
    html += '<button class="match-btn secondary" onclick="event.stopPropagation();showCompatDetail('+idx+')">View Code</button>';
    html += '</div>';
    html += '</div>';
  });
  html += '</div>';
  container.innerHTML = html;
}

// ---- COMPATIBILITY DETAIL MODAL ----
function showCompatDetail(idx) {
  var m = allMatches[idx];
  if(!m) return;
  var c = m._compat || calcCompatScore(myProfile, m);
  var scoreClass = getScoreClass(c.score);

  var html = '';
  html += '<div style="text-align:center;margin-bottom:24px">';
  html += '<div style="font-size:9px;letter-spacing:3px;color:var(--crystal);text-transform:uppercase;margin-bottom:8px">Compatibility Analysis</div>';
  html += '<div style="font-family:Cormorant Garamond,serif;font-size:28px;font-weight:300;margin-bottom:4px">'+myProfile.name+' & '+m.name+'</div>';
  html += '<div style="font-family:Cormorant Garamond,serif;font-size:48px;font-weight:300;color:var(--crystal);letter-spacing:10px;margin:16px 0">'+c.synCode+'</div>';
  html += '<div style="font-size:9px;letter-spacing:2px;color:var(--gray-mid);text-transform:uppercase">Compatibility Code</div>';
  html += '</div>';

  html += '<div style="display:flex;justify-content:center;gap:16px;margin-bottom:24px">';
  html += '<div style="background:rgba(26,42,255,0.1);border:1px solid rgba(77,184,255,0.15);border-radius:12px;padding:14px 20px;text-align:center;flex:1">';
  html += '<div style="font-size:8px;color:var(--gray-mid);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px">'+myProfile.name+'</div>';
  html += '<div style="font-family:Cormorant Garamond,serif;font-size:24px;color:var(--crystal);letter-spacing:6px">'+myProfile.pythagorean_code+'</div>';
  html += '</div>';
  html += '<div style="background:rgba(26,42,255,0.1);border:1px solid rgba(77,184,255,0.15);border-radius:12px;padding:14px 20px;text-align:center;flex:1">';
  html += '<div style="font-size:8px;color:var(--gray-mid);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px">'+m.name+'</div>';
  html += '<div style="font-family:Cormorant Garamond,serif;font-size:24px;color:var(--crystal);letter-spacing:6px">'+m.pythagorean_code+'</div>';
  html += '</div>';
  html += '</div>';

  html += '<div style="text-align:center;margin-bottom:24px">';
  html += '<div style="font-family:Cormorant Garamond,serif;font-size:56px;font-weight:300" class="'+scoreClass+'">'+c.score+'</div>';
  html += '<div style="font-size:9px;letter-spacing:2px;color:var(--gray-mid);text-transform:uppercase">Compatibility Score</div>';
  html += '</div>';

  html += '<div style="border-top:1px solid rgba(77,184,255,0.08);padding-top:20px;margin-bottom:20px">';
  html += '<div style="font-size:9px;letter-spacing:2px;color:var(--crystal);text-transform:uppercase;margin-bottom:12px">How The Numbers Connect</div>';
  html += '<div style="display:flex;flex-direction:column;gap:10px">';
  html += '<div style="display:flex;justify-content:space-between;font-size:11px"><span style="color:var(--gray-mid)">Combined Biorhythm (How you met)</span><span style="color:var(--white)">'+c.synBio+'</span></div>';
  html += '<div style="display:flex;justify-content:space-between;font-size:11px"><span style="color:var(--gray-mid)">Combined Generational (The goal)</span><span style="color:var(--white)">'+c.synGen+'</span></div>';
  html += '<div style="display:flex;justify-content:space-between;font-size:11px"><span style="color:var(--gray-mid)">Combined Life Path (What you build)</span><span style="color:var(--white)">'+c.synLP+'</span></div>';
  html += '<div style="display:flex;justify-content:space-between;font-size:11px"><span style="color:var(--gray-mid)">Same Biorhythm</span><span style="color:'+(myProfile.biorhythm===m.biorhythm?'var(--success)':'var(--gray-mid)')+'">'+( myProfile.biorhythm===m.biorhythm?'Yes — instant recognition':'No')+'</span></div>';
  html += '</div></div>';

  html += '<a href="/match/messages.html?user='+m.user_id+'" class="match-btn primary" style="display:block;text-align:center;padding:14px;margin-top:20px">Message '+m.name+' →</a>';

  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('compat-modal').classList.add('show');
}

function closeModal() {
  document.getElementById('compat-modal').classList.remove('show');
}
document.getElementById('compat-modal').addEventListener('click', function(e) {
  if(e.target === this) closeModal();
});

// ---- FILTER MATCHES ----
var currentFilter = 'all';
function filterMatches(type) {
  currentFilter = type;
  document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
  event.target.classList.add('active');

  var filtered;
  if(type === 'all') {
    filtered = allMatches;
  } else if(type === 'best') {
    filtered = allMatches.slice().sort(function(a,b){
      var sa = (a._compat||calcCompatScore(myProfile,a)).score;
      var sb = (b._compat||calcCompatScore(myProfile,b)).score;
      return sb - sa;
    });
  } else {
    filtered = allMatches.filter(function(m){
      var lf = m.looking_for || [];
      if(typeof lf === 'string') { try { lf = JSON.parse(lf); } catch(e) { lf = [lf]; } }
      return lf.indexOf(type) > -1;
    });
  }
  renderMatches(filtered);
}

// ---- INIT ----
async function init() {
  if(!sb) {
    document.getElementById('matches-container').innerHTML = '<div class="empty-state"><div class="empty-icon">✦</div><div class="empty-title">Please sign in</div><div class="empty-sub">You need to be signed in to see your matches.<br><a href="/match/join.html" style="color:var(--crystal)">Join Occultics Match →</a></div></div>';
    return;
  }

  // Check auth
  var session = await sb.auth.getSession();
  if(!session.data.session) {
    window.location.href = '/match/join.html';
    return;
  }

  var userId = session.data.session.user.id;
  var userEmail = session.data.session.user.email;

  // Load my profile
  var res = await sb.from('profiles').select('*').eq('user_id', userId).single();
  if(res.error || !res.data) {
    window.location.href = '/match/join.html';
    return;
  }
  myProfile = res.data;

  // Render my profile card
  document.getElementById('my-name').textContent = myProfile.name;
  document.getElementById('my-code').textContent = myProfile.pythagorean_code || (myProfile.biorhythm+'.'+myProfile.generational+'.'+myProfile.lifePath);
  var navAvatar = document.getElementById('nav-avatar');
  var myAvatarEl = document.getElementById('my-avatar');
  if(myProfile.photo_url) {
    navAvatar.innerHTML = '<img src="'+myProfile.photo_url+'" alt="">';
    myAvatarEl.innerHTML = '<img src="'+myProfile.photo_url+'" alt="">';
  } else {
    navAvatar.textContent = getInitial(myProfile.name);
    myAvatarEl.textContent = getInitial(myProfile.name);
  }
  var lf = myProfile.looking_for || [];
  if(typeof lf === 'string') { try { lf = JSON.parse(lf); } catch(e) { lf = [lf]; } }
  document.getElementById('my-tags').innerHTML = lf.map(function(t){ return '<div class="profile-tag">'+t+'</div>'; }).join('');

  // Load all other profiles (matches)
  var matchRes = await sb.from('profiles').select('*').neq('user_id', userId);
  if(matchRes.data) {
    allMatches = matchRes.data;
    
    // Sort by compatibility score by default
    allMatches.sort(function(a,b) {
      return calcCompatScore(myProfile,b).score - calcCompatScore(myProfile,a).score;
    });

    document.getElementById('stat-matches').textContent = allMatches.length;
    renderMatches(allMatches);
  } else {
    renderMatches([]);
  }

  // Count messages
  var msgRes = await sb.from('messages').select('id', {count:'exact'}).or('from_user.eq.'+userId+',to_user.eq.'+userId);
  document.getElementById('stat-messages').textContent = (msgRes.count || 0);
  document.getElementById('stat-views').textContent = Math.floor(Math.random()*20 + allMatches.length);
}

init();
</script>
</body>
</html>
